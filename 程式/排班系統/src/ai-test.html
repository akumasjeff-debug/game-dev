<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 排班大腦測試 - 自動偵測版</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { padding: 10px 20px; background-color: #673ab7; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #512da8; }
        #result { margin-top: 20px; padding: 15px; background-color: #f4f4f9; border-left: 5px solid #673ab7; white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>

    <h2>大腦測試：讓 AI 讀取資料庫並排班 🧠</h2>
    <p>這個程式會先去 Firebase 抓出我們剛剛建立的「阿明」，然後自動偵測可用的 AI 模型來產出班表。</p>
    
    <button id="runAiBtn">開始 AI 運算排班</button>
    <div id="result">等待指示...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // Firebase 連線設定
        const firebaseConfig = {
            apiKey: "AIzaSyC8TlY8xg8FnSptymQxT7eCLtfsCK2Jp0M", 
            authDomain: "roster-fadmart.firebaseapp.com",
            projectId: "roster-fadmart",
            storageBucket: "roster-fadmart.firebasestorage.app",
            messagingSenderId: "880597429282",
            appId: "1:880597429282:web:d7b587fe49a2c823b6ee7b"
        };

        // Gemini API Key
        const GEMINI_API_KEY = "AIzaSyBWJkeKgby71FhcnhQM7BMJf2JHH9_uwMA"; 

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('runAiBtn').addEventListener('click', async () => {
            const resultBox = document.getElementById('result');
            resultBox.innerText = "🔄 1. 正在從 Firebase 資料庫抓取員工資料...";

            try {
                // 從 Firebase 撈取 Employees 資料
                const querySnapshot = await getDocs(collection(db, "Employees"));
                let employees = [];
                querySnapshot.forEach((doc) => {
                    employees.push(doc.data());
                });

                // 加入測試員工小美
                employees.push({ name: "小美", role: "PT", skills: ["結帳"], canWorkStores: ["台北店"] });
                resultBox.innerText += `\n✅ 抓取成功！共有 ${employees.length} 位員工加入排班池。`;

                // ==========================================
                // 🚀 終極解法：先問 Google 目前有哪些模型可用！
                // ==========================================
                resultBox.innerText += "\n\n🔍 2. 正在偵測您帳號可用的 AI 模型...";
                const modelsReq = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${GEMINI_API_KEY}`);
                const modelsData = await modelsReq.json();
                
                if (modelsData.error) throw new Error("API Key 無效或權限不足：" + modelsData.error.message);

                let targetModel = "";
                // 過濾出名字有 gemini 且支援 generateContent 的模型
                const validModels = modelsData.models.filter(m => 
                    m.supportedGenerationMethods && 
                    m.supportedGenerationMethods.includes("generateContent") &&
                    m.name.includes("gemini")
                );

                if (validModels.length > 0) {
                    targetModel = validModels[0].name; // 抓清單裡第一個可用的模型
                    resultBox.innerText += `\n🎯 偵測成功！系統決定使用：${targetModel}`;
                } else {
                    throw new Error("找不到支援文字生成的模型，請檢查您的 API 權限。");
                }

                // ==========================================
                // 🧠 呼叫 AI 開始排班
                // ==========================================
                resultBox.innerText += "\n\n🧠 3. 正在呼叫 AI 運算下週一的班表 (請稍候約 3-5 秒)...";

                const promptText = `
                你是一個專業的排班系統大腦。請根據以下員工陣列資料，幫我排出「下週一」的班表。
                員工資料：${JSON.stringify(employees)}
                
                排班規則：
                1. 下週一需要 1 位早班 (09:00-17:00) 和 1 位晚班 (17:00-23:00)。
                2. 每位員工一天只能排一個班，不能同時上早班和晚班。
                3. 早班必須要是會「拉花」的員工。

                請務必「只」回傳 JSON 格式的結果，以便程式解析。不要包含任何 Markdown 標記 (如 \`\`\`json) 或其他說明文字。
                JSON 格式範例：[{"shift": "早班", "time": "09:00-17:00", "employee": "員工名字"}, ...]
                `;

                // 把剛剛找到的 targetModel 塞進網址裡
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${targetModel}:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);

                const aiReply = data.candidates[0].content.parts[0].text;
                resultBox.innerText += "\n\n🎉 運算完成！AI 回傳的純 JSON 班表資料如下：\n\n" + aiReply;

            } catch (error) {
                console.error("錯誤:", error);
                resultBox.innerText += `\n\n❌ 糟糕，發生錯誤了：${error.message}`;
            }
        });
    </script>
</body>
</html>
