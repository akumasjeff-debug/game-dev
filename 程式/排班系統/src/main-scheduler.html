<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 智慧排班 - 嚴格規範防護版</title>
    <style>
        :root { --primary: #1a73e8; --success: #00c853; --danger: #ff5252; --warning: #fb8c00; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .header-card { background: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .api-panel { background: #2c3e50; color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        .api-panel input { flex: 1; padding: 8px; border-radius: 5px; border: none; outline: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 30px; }
        .cal-head { background: #5f6368; color: white; padding: 10px; text-align: center; border-radius: 8px; font-weight: bold; }
        .cal-cell { background: white; min-height: 450px; padding: 10px; border: 1px solid #ddd; border-radius: 12px; }
        .day-label { font-size: 18px; font-weight: bold; border-bottom: 2px solid #eee; margin-bottom: 10px; padding-bottom: 5px; color: #70757a; }
        .store-box { background: #f1f3f4; border-left: 5px solid var(--primary); padding: 8px; margin-bottom: 10px; border-radius: 8px; }
        .under-staffed { background: #fff5f5 !important; border: 2px solid var(--danger) !important; }
        .store-name { font-weight: bold; color: var(--primary); font-size: 12px; display: block; margin-bottom: 5px; }
        .roster-item { background: white; border: 1px solid #e0e0e0; padding: 8px; margin-top: 5px; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .empty-slot { border: 1px dashed var(--danger); color: var(--danger); text-align: center; padding: 8px; margin-top: 5px; font-size: 11px; font-weight: bold; background: #fff5f5; border-radius: 6px; cursor: pointer; }
        .conflict-item { background: #fff3e0 !important; border: 1px solid var(--warning) !important; color: #e65100 !important; }
        .btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .add-extra-btn { width: 100%; padding: 5px; margin-top: 5px; border: 1px dashed var(--success); color: var(--success); background: none; cursor: pointer; font-size: 11px; }
        .stats-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; background: white; }
        .stats-table th, .stats-table td { border: 1px solid #eee; padding: 10px; text-align: center; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; justify-content: center; align-items: center; color: white; flex-direction: column; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 420px; max-height: 80vh; overflow-y: auto; color: #333; }
        .modal-input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-top: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div style="margin-bottom:10px;"><a href="index.html" style="display:inline-flex;align-items:center;gap:6px;color:#1a73e8;text-decoration:none;font-size:14px;font-weight:600;">&#8592; 返回首頁</a></div>

    <div class="loading-overlay" id="loading">
        <div style="font-size: 24px; margin-bottom: 10px;">🤖 Gemini 正在優化排班 (嚴格遵守 6休1)...</div>
        <p id="loadingMsg">正在處理...</p>
    </div>

    <div class="api-panel">
        <span>🔑 API Key:</span>
        <input type="password" id="apiKey" placeholder="貼上 Gemini API Key">
        <button class="btn" style="background:var(--success)" onclick="saveKey()">💾 儲存</button>
        <span id="modelBadge" style="background:#dcfce7; color:#166534; padding:5px 12px; border-radius:20px; font-size:12px; font-weight:bold; display:none;"></span>
    </div>

    <div class="header-card">
        <div>
            <button class="btn" style="background:#666" onclick="changeMonth(-1)">❮</button>
            <span id="monthDisplay" style="font-size:24px; font-weight:bold; margin:0 20px;"></span>
            <button class="btn" style="background:#666" onclick="changeMonth(1)">❯</button>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn" style="background:var(--warning)" onclick="openAiModal()">🧠 AI 智慧排班</button>
            <button class="btn" style="background:var(--danger)" onclick="clearUI()">🗑️ 清空</button>
            <button class="btn" style="background:var(--primary)" onclick="saveData()">💾 儲存結果</button>
        </div>
    </div>

    <div id="storeStatsArea" style="background:#e8f0fe; padding:15px; border-radius:15px; margin-bottom:20px; display:flex; gap:15px; flex-wrap:wrap;"></div>

    <div id="mainGrid" class="calendar-grid"></div>

    <div class="stats-card" style="background:white; padding:20px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
        <h3>📊 員工時數統計與設定</h3>
        <table class="stats-table">
            <thead>
                <tr><th>員工</th><th>當前工時</th><th>Min (H)</th><th>Max (H)</th><th>連休 2天+</th></tr>
            </thead>
            <tbody id="statsBody"></tbody>
        </table>
        <div style="margin-top:15px; text-align:right;"><button class="btn" style="background:var(--primary)" onclick="saveHoursRange()">💾 儲存區間設定</button></div>
    </div>

    <div id="aiModal" class="modal"><div class="modal-content">
        <h3>🤖 AI 智慧排班設定</h3>
        <p style="font-size:13px; color:#666;">系統會自動避開連上 7 天的情況，並優先填補缺口。</p>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin: 20px 0;">
            <div><label>開始日期</label><input type="number" id="aiStart" class="modal-input" value="1"></div>
            <div><label>結束日期</label><input type="number" id="aiEnd" class="modal-input" value="31"></div>
        </div>
        <button class="btn" style="background:var(--warning); width:100%;" onclick="startAiScheduler()">執行 AI 專家排班</button>
        <button class="btn" style="background:#ccc; width:100%; margin-top:10px; color:black;" onclick="closeModal('aiModal')">取消</button>
    </div></div>

    <div id="editModal" class="modal"><div class="modal-content">
        <h3>手動調整</h3>
        <label>選擇班別：</label><select id="modalShiftSelect" class="modal-input" style="margin-bottom:15px;"></select>
        <div id="empList" style="border:1px solid #eee; border-radius:8px; max-height:300px; overflow-y:auto;"></div>
        <button class="btn" style="background:#ccc; width:100%; margin-top:20px; color:black;" onclick="closeModal('editModal')">關閉</button>
    </div></div>

<script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyC8TlY8xg8FnSptymQxT7eCLtfsCK2Jp0M", authDomain: "roster-fadmart.firebaseapp.com", projectId: "roster-fadmart", storageBucket: "roster-fadmart.firebasestorage.app", messagingSenderId: "880597429282", appId: "1:880597429282:web:d7b587fe49a2c823b6ee7b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currDate = new Date(2026, 2, 1); 
    let roster = {};
    let dbData = { stores: {}, emps: [], shifts: [] };
    let editCtx = null;

    window.onload = function() {
        const savedKey = localStorage.getItem("scheduler_api_key");
        if (savedKey) document.getElementById("apiKey").value = savedKey;
        load();
    };

    function saveKey() {
        const key = document.getElementById("apiKey").value.trim();
        if (!key) return alert("請輸入金鑰！");
        localStorage.setItem("scheduler_api_key", key);
        alert("✅ API 金鑰已儲存！");
    }

    const forceISO = (d) => { if (!d) return "NONE"; let s = String(d).trim(); const p = s.split('-'); return p.length !== 3 ? s : `${p[0]}-${String(p[1]).padStart(2, '0')}-${String(p[2]).padStart(2, '0')}`; };
    const getShiftHours = (shCode) => { const sh = dbData.shifts.find(s => String(s.code).toUpperCase().trim() === String(shCode).toUpperCase().trim()); if (!sh) return 8; const s = sh.startTime.split(':'), e = sh.endTime.split(':'); let h = (parseInt(e[0])*60 + parseInt(e[1]) - (parseInt(s[0])*60 + parseInt(s[1]))) / 60; return h > 6 ? h - 1 : h; };

    async function syncDatabase() {
        const [sSnap, eSnap, shSnap] = await Promise.all([db.collection("Stores").get(), db.collection("Employees").get(), db.collection("ShiftTypes").get()]);
        dbData.stores = {}; sSnap.forEach(d => dbData.stores[d.id] = {id: d.id, ...d.data()});
        dbData.emps = eSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        dbData.shifts = shSnap.docs.map(d => ({...d.data(), code: String(d.data().code).trim().toUpperCase()}));
    }

    async function load() {
        await syncDatabase();
        const y = currDate.getFullYear(), m = currDate.getMonth() + 1;
        document.getElementById('monthDisplay').innerText = `${y} 年 ${m} 月`;
        const snap = await db.collection("Rosters").where("month", "==", `${y}-${String(m).padStart(2,'0')}`).get();
        roster = snap.empty ? {} : snap.docs.sort((a,b) => (b.data().createdAt?.seconds || 0) - (a.data().createdAt?.seconds || 0))[0].data().data;
        render();
    }

    function render() {
        const y = currDate.getFullYear(), m = currDate.getMonth() + 1;
        const days = new Date(y, m, 0).getDate();
        const offset = (new Date(y, m-1, 1).getDay() || 7) - 1;
        const grid = document.getElementById('mainGrid');
        const wkMap = ["日", "一", "二", "三", "四", "五", "六"];
        grid.innerHTML = wkMap.slice(1).concat(wkMap[0]).map(d => `<div class="cal-head">${d}</div>`).join('');
        for (let i = 0; i < offset; i++) grid.innerHTML += `<div></div>`;

        const storeHours = {};
        Object.keys(dbData.stores).forEach(sid => storeHours[sid] = 0);

        for (let d = 1; d <= days; d++) {
            const dateKey = `${y}-${m}-${d}`;
            const wkIndex = new Date(y, m-1, d).getDay();
            let html = `<div class="cal-cell"><div class="day-label">${d}</div>`;
            Object.values(dbData.stores).sort((a,b)=>a.name.localeCompare(b.name)).forEach(s => {
                const conf = s.config?.[wkIndex] || { total: 0 };
                const req = parseInt(conf.total) || 0;
                const dailyJobs = (roster[dateKey] || []).filter(j => j.sId === s.id);
                html += `<div class="store-box ${dailyJobs.length < req ? 'under-staffed' : ''}"><span class="store-name">${s.name} (${dailyJobs.length}/${req})</span>`;
                dailyJobs.forEach((j, idx) => {
                    let con = 0; for(let i=1; i<=7; i++) { if(roster[`${y}-${m}-${d-i}`]?.some(x=>x.eId===j.eId)) con++; else break; }
                    storeHours[s.id] += getShiftHours(j.sh);
                    html += `<div class="roster-item ${con>=6?'conflict-item':''}" onclick="openEdit('${dateKey}','${s.id}',${idx},'${j.sh}')"><b>${j.eName}</b> <small>${j.sh}</small></div>`;
                });
                if(dailyJobs.length < req) { for(let k = dailyJobs.length; k < req; k++) { html += `<div class="empty-slot" onclick="openEdit('${dateKey}','${s.id}',${k},'A')">🪹 缺口補位</div>`; } }
                html += `<button class="add-extra-btn" onclick="openEdit('${dateKey}','${s.id}',${Math.max(req, dailyJobs.length)},'A')">＋機動新增</button></div>`;
            });
            grid.innerHTML += html + `</div>`;
        }
        const statsArea = document.getElementById('storeStatsArea');
        statsArea.innerHTML = Object.values(dbData.stores).map(s => `<div style="background:white; padding:8px 12px; border-radius:8px; font-size:12px;"><b>${s.name}:</b> ${storeHours[s.id].toFixed(1)}H</div>`).join('');
        updateStats();
    }

    async function startAiScheduler() {
        const apiKey = document.getElementById("apiKey").value.trim();
        if (!apiKey) return alert("❌ 請先設定 API Key！");
        const startDay = parseInt(document.getElementById('aiStart').value);
        const endDay = parseInt(document.getElementById('aiEnd').value);
        const loading = document.getElementById('loading');
        loading.style.display = 'flex';
        closeModal('aiModal');

        try {
            const modelRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
            const modelData = await modelRes.json();
            const availableModels = modelData.models.filter(m => m.supportedGenerationMethods.includes("generateContent")).map(m => m.name).sort((a,b) => a.includes("flash") ? -1 : 1);

            const y = currDate.getFullYear(), m = currDate.getMonth() + 1;
            
            // 💡 關鍵：計算區間前 6 天的上班狀況，傳給 AI 作為歷史參考
            const history = {};
            dbData.emps.forEach(e => {
                let con = 0;
                for(let i=1; i<=6; i++) {
                    if(roster[`${y}-${m}-${startDay-i}`]?.some(j => j.eId === e.id)) con++;
                    else break;
                }
                history[e.id] = con;
            });

            const context = {
                targetRange: { start: startDay, end: endDay, month: `${y}-${m}` },
                employees: dbData.emps.map(e => ({ id: e.id, name: e.name, stores: e.canWorkStores || [], min: e.minHours||60, max: e.maxHours||80, wish: e.wishLeaves, fixedOff: e.unavailableDays, workHistoryBeforeRange: history[e.id] })),
                stores: Object.values(dbData.stores).map(s => ({ id: s.id, name: s.name, config: s.config })),
                currentRoster: roster
            };

            const prompt = `你是專業排班專家。請為 ${y}年${m}月 的 ${startDay} 到 ${endDay} 號排班。
            ⚠️ 最高禁令：
            1. 絕對不允許連續上班超過 6 天。請參考每位員工的 workHistoryBeforeRange (區間開始前已連上的天數)。
            2. 如果員工在區間內已經達到連 6，第 7 天必須強迫排休。
            3. 每位員工的總工時應在 [Min, Max] 之間。
            4. 優先讓只能在一家固定上班的店員排班，保留機動人員遞補。



            回傳格式：純 JSON {"YYYY-M-D": [{"sId":"店ID","idx":0,"eId":"員工ID","eName":"名","sh":"班別"}]}
            數據：${JSON.stringify(context)}`;

            let success = false;
            for (let targetModel of availableModels) {
                if (success) break;
                try {
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/${targetModel}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.1 } })
                    });
                    const resJson = await resp.json();
                    const aiText = resJson.candidates[0].content.parts[0].text;
                    const jsonMatch = aiText.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        const aiRoster = JSON.parse(jsonMatch[0]);
                        for (let d = startDay; d <= endDay; d++) {
                            const key = `${y}-${m}-${d}`;
                            if (aiRoster[key]) roster[key] = aiRoster[key];
                        }
                        render(); success = true; alert(`✅ AI 已完成 ${startDay}-${endDay} 號排班 (已執行 6休1 檢查)。`);
                    }
                } catch (err) { console.warn(`模型 ${targetModel} 失敗`); }
            }
        } catch (e) { alert(`❌ 錯誤：${e.message}`); } finally { loading.style.display = 'none'; }
    }

    // --- 保留原功能 ---
    window.openAiModal = () => { document.getElementById('aiEnd').value = new Date(currDate.getFullYear(), currDate.getMonth()+1, 0).getDate(); document.getElementById('aiModal').style.display = 'flex'; };
    window.openEdit = (dK, sId, idx, cS) => {
        editCtx = { dateKey: dK, sId, idx };
        document.getElementById('modalShiftSelect').innerHTML = dbData.shifts.map(s => `<option value="${s.code}" ${s.code.toUpperCase()===cS.toUpperCase()?'selected':''}>${s.code}</option>`).join('');
        const list = document.getElementById('empList');
        const taken = (roster[dK] || []).map(j => j.eId);
        list.innerHTML = `<div style="color:red;font-weight:bold;padding:12px;cursor:pointer;border-bottom:1px solid #eee;" onclick="pick(null)">❌ 移除人員</div>`;
        dbData.emps.forEach(e => {
            const canS = e.canWorkStores && (e.canWorkStores.includes(sId) || e.canWorkStores.includes(dbData.stores[sId].name));
            list.innerHTML += `<div style="padding:12px;border-bottom:1px solid #eee;cursor:pointer;" onclick="pick('${e.id}','${e.name}')">
                <b>${e.name}</b> ${taken.includes(e.id)?'(已有班)':''} ${!canS?'<small style="color:red">(不支援)</small>':''}
            </div>`;
        });
        document.getElementById('editModal').style.display = 'flex';
    };
    window.pick = (eid, ename) => {
        const { dateKey, sId, idx } = editCtx;

        // 6休1 前端強制驗證
        if (eid) {
            const [y, m, d] = dateKey.split('-').map(Number);
            let before = 0, after = 0;
            for (let i = 1; i <= 30; i++) {
                const dt = new Date(y, m - 1, d - i);
                const key = `${dt.getFullYear()}-${dt.getMonth()+1}-${dt.getDate()}`;
                const jobs = (roster[key] || []);
                // 排除目前這格本身（避免同一天重複計算）
                if (jobs.some(j => j.eId === eid && !(j.sId === sId && j.idx === idx))) before++;
                else break;
            }
            for (let i = 1; i <= 30; i++) {
                const dt = new Date(y, m - 1, d + i);
                const key = `${dt.getFullYear()}-${dt.getMonth()+1}-${dt.getDate()}`;
                if ((roster[key] || []).some(j => j.eId === eid)) after++;
                else break;
            }
            const total = before + 1 + after;
            if (total >= 7) {
                const mo = m, day = d;
                alert(`⚠️ 無法排班：${ename} 若排入 ${mo}/${day}，將造成連續 7 天上班！`);
                return;
            }
        }

        if (!roster[dateKey]) roster[dateKey] = [];
        roster[dateKey] = roster[dateKey].filter(j => !(j.sId === sId && j.idx === idx));
        if (eid) roster[dateKey].push({ sId, idx, eId: eid, eName: ename, sh: document.getElementById('modalShiftSelect').value.toUpperCase() });
        render(); closeModal('editModal');
    };
    window.updateStats = () => {
        const tbody = document.getElementById('statsBody'); tbody.innerHTML = "";
        const y = currDate.getFullYear(), m = currDate.getMonth() + 1;
        dbData.emps.forEach(e => {
            let h = 0, mask = [];
            for (let d = 1; d <= 31; d++) {
                const job = (roster[`${y}-${m}-${d}`] || []).find(j => j.eId === e.id);
                if (job) { h += getShiftHours(job.sh); mask.push(1); } else mask.push(0);
            }
            let seqs = mask.join('').split('1').filter(s => s.length >= 2).length;
            tbody.innerHTML += `<tr><td><b>${e.name}</b></td><td>${h.toFixed(1)}</td><td><input type="number" id="min-${e.id}" value="${e.minHours||60}" style="width:45px"></td><td><input type="number" id="max-${e.id}" value="${e.maxHours||80}" style="width:45px"></td><td>${seqs}</td></tr>`;
        });
    };
    window.saveHoursRange = async () => {
        const batch = db.batch();
        dbData.emps.forEach(e => { batch.update(db.collection("Employees").doc(e.id), { minHours: parseInt(document.getElementById(`min-${e.id}`).value), maxHours: parseInt(document.getElementById(`max-${e.id}`).value) }); });
        await batch.commit(); alert("時數區間已更新"); load();
    };
    window.saveData = async () => { await db.collection("Rosters").add({ month: `${currDate.getFullYear()}-${String(currDate.getMonth()+1).padStart(2,'0')}`, data: roster, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); alert("雲端儲存完成！"); };
    window.clearUI = () => { if(confirm("確定清空畫面？")) { roster = {}; render(); } };
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.changeMonth = (v) => { currDate.setMonth(currDate.getMonth() + v); load(); };
</script>
</body>
</html>
