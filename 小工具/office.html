<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏢 遊戲工作室 404 — 辦公室</title>
  <style>
    :root {
      --floor:      #EDE7DC;
      --floor-line: rgba(0,0,0,0.045);
      --desk:       #6B5037;
      --desk-top:   #8B6B47;
      --wall:       #C9B99A;
      --game-bg:    #E4F2E8;
      --tea-bg:     #FFF7E0;
      --header:     #0F2550;
      --border:     rgba(0,0,0,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Microsoft JhengHei UI", "PingFang TC", "Noto Sans TC", "Segoe UI", sans-serif;
      background: #120D08;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 12px;
    }

    /* ── Office wrapper ───────────────────────── */
    .office {
      width: min(1200px, 100%);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.06);
    }

    /* ── Header ──────────────────────────────── */
    .hdr {
      background: var(--header);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .hdr-logo {
      font-size: 18px;
      font-weight: 900;
      color: white;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .hdr-logo span { opacity: 0.55; font-weight: 400; font-size: 13px; margin-left: 4px; }

    .badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-work { background: #15803D20; border: 1px solid #16A34A; color: #4ADE80; }
    .badge-idle { background: #37415120; border: 1px solid #4B5563; color: #9CA3AF; }
    .badge-total { background: #1D4ED820; border: 1px solid #3B82F6; color: #93C5FD; }
    .badge strong { font-size: 16px; margin-right: 2px; }

    .hdr-btns {
      display: flex;
      gap: 6px;
      margin-left: auto;
    }

    .btn {
      border: none;
      border-radius: 6px;
      padding: 6px 13px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:hover  { filter: brightness(1.15); }
    .btn:active { transform: scale(0.96); }
    .btn-go   { background: #22C55E; color: #fff; }
    .btn-off  { background: #4B5563; color: #fff; }
    .btn-rst  { background: #DC2626; color: #fff; }

    .clock {
      font-family: "Courier New", monospace;
      font-size: 13px;
      color: #9CA3AF;
      background: rgba(0,0,0,0.4);
      padding: 5px 10px;
      border-radius: 5px;
      white-space: nowrap;
    }

    /* ── Floor plan ──────────────────────────── */
    .floor {
      display: grid;
      grid-template-columns: 1fr 270px;
      min-height: 560px;
    }

    /* ── Work area ───────────────────────────── */
    .work-area {
      background: var(--floor);
      background-image:
        repeating-linear-gradient(0deg,  transparent, transparent 79px, var(--floor-line) 79px, var(--floor-line) 80px),
        repeating-linear-gradient(90deg, transparent, transparent 79px, var(--floor-line) 79px, var(--floor-line) 80px);
      padding: 16px;
      border-right: 3px solid var(--wall);
      overflow-y: auto;
      max-height: 600px;
    }
    .work-area::-webkit-scrollbar { width: 5px; }
    .work-area::-webkit-scrollbar-track { background: #C9B99A; }
    .work-area::-webkit-scrollbar-thumb { background: #8B6B47; border-radius: 3px; }

    /* ── Fun areas ───────────────────────────── */
    .fun-areas {
      display: flex;
      flex-direction: column;
    }

    .game-room {
      background: var(--game-bg);
      padding: 14px 12px;
      border-bottom: 3px solid #86EFAC;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .tea-room {
      background: var(--tea-bg);
      padding: 14px 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ── Zone labels ─────────────────────────── */
    .zone-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .zone-label::after { content: ''; flex: 1; height: 1px; }

    .work-area .zone-label  { color: #7C6245; }
    .work-area .zone-label::after { background: #C4A882; }
    .game-room .zone-label  { color: #166534; }
    .game-room .zone-label::after { background: #86EFAC; }
    .tea-room  .zone-label  { color: #92400E; }
    .tea-room  .zone-label::after { background: #FCD34D; }

    /* ── Room decorations ────────────────────── */
    .room-deco {
      font-size: 17px;
      letter-spacing: 5px;
      margin-bottom: 8px;
    }

    /* ── Desk grid ───────────────────────────── */
    .desks {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(115px, 1fr));
      gap: 10px;
    }

    .desk {
      background: var(--desk-top);
      border-radius: 7px;
      min-height: 100px;
      padding: 9px 7px 7px;
      box-shadow: 0 3px 0 var(--desk), 0 5px 10px rgba(0,0,0,0.14);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: box-shadow 0.2s;
    }

    .desk.occupied {
      background: #967555;
      box-shadow: 0 3px 0 #6B5037, 0 5px 12px rgba(0,0,0,0.18);
    }

    .desk::before {
      content: '🖥';
      position: absolute;
      top: 5px;
      left: 7px;
      font-size: 12px;
      opacity: 0.45;
    }

    .desk.empty::after {
      content: '空位';
      color: #C4A882;
      font-size: 11px;
      font-weight: 600;
    }

    /* ── Idle cluster ────────────────────────── */
    .idle-cluster {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex: 1;
    }

    /* ── Agent card ──────────────────────────── */
    .agent {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* desk agent is slightly larger */
    .desk .agent { --sz: 46px; --fs: 21px; }
    .idle-cluster .agent { --sz: 42px; --fs: 18px; }

    .avatar {
      width: var(--sz, 46px);
      height: var(--sz, 46px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--fs, 21px);
      border: 3px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.22);
      position: relative;
      transition: transform 0.2s;
    }

    .agent:hover .avatar { transform: translateY(-3px) scale(1.05); }

    /* status dot */
    .avatar::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid white;
      transition: background 0.3s;
    }

    .agent.working .avatar::after {
      background: #22C55E;
      animation: pulse-dot 1.8s ease-in-out infinite;
    }
    .agent.idle .avatar::after { background: #9CA3AF; }

    @keyframes pulse-dot {
      0%,100% { box-shadow: 0 0 0 0   rgba(34,197,94,0.6); }
      50%      { box-shadow: 0 0 0 5px rgba(34,197,94,0);   }
    }

    /* name tag */
    .nametag {
      font-size: 9.5px;
      font-weight: 700;
      color: white;
      background: rgba(0,0,0,0.68);
      padding: 2px 5px;
      border-radius: 3px;
      white-space: nowrap;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* activity line */
    .activity {
      font-size: 9px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      white-space: nowrap;
    }

    .desk .nametag { background: rgba(0,0,0,0.75); }

    .working-txt {
      color: #4ADE80;
      font-weight: 700;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Avatar bg by dept ───────────────────── */
    .agent[data-dept="mgmt"]    .avatar { background: #EDE9FE; border-color: #7C3AED; }
    .agent[data-dept="design"]  .avatar { background: #DBEAFE; border-color: #2563EB; }
    .agent[data-dept="art"]     .avatar { background: #FCE7F3; border-color: #DB2777; }
    .agent[data-dept="content"] .avatar { background: #FEF3C7; border-color: #D97706; }
    .agent[data-dept="tech"]    .avatar { background: #D1FAE5; border-color: #059669; }
    .agent[data-dept="qa"]      .avatar { background: #FEE2E2; border-color: #DC2626; }

    /* ── Idle animations ─────────────────────── */
    .agent.idle.anim-sway   .avatar { animation: sway   3.5s ease-in-out infinite; }
    .agent.idle.anim-bounce .avatar { animation: bounce 1.3s ease-in-out infinite; }
    .agent.idle.anim-float  .avatar { animation: float  4s   ease-in-out infinite; }
    .agent.idle.anim-spin   .avatar { animation: wobble 4s   ease-in-out infinite; }
    .agent.idle.anim-nod    .avatar { animation: nod    2.5s ease-in-out infinite; }

    @keyframes sway   { 0%,100%{transform:rotate(0deg)} 30%{transform:rotate(5deg)} 70%{transform:rotate(-5deg)} }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    @keyframes float  { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-6px) scale(1.04)} }
    @keyframes wobble { 0%,100%{transform:rotate(0) scale(1)} 33%{transform:rotate(-10deg) scale(0.93)} 66%{transform:rotate(10deg) scale(0.93)} }
    @keyframes nod    { 0%,100%{transform:translateY(0)} 40%{transform:translateY(-3px)} 60%{transform:translateY(-1px)} }

    /* Working agents: subtle typing bob */
    .agent.working .avatar { animation: work-bob 1.6s ease-in-out infinite; }
    @keyframes work-bob { 0%,100%{transform:translateY(0)} 40%{transform:translateY(-2px)} }

    /* ── Legend bar ──────────────────────────── */
    .legend {
      background: #0A0806;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .leg { display: flex; align-items: center; gap: 5px; color: #78614A; font-size: 11px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .dot-mgmt    { background: #7C3AED; }
    .dot-design  { background: #2563EB; }
    .dot-art     { background: #DB2777; }
    .dot-content { background: #D97706; }
    .dot-tech    { background: #059669; }
    .dot-qa      { background: #DC2626; }

    .leg-hint { margin-left: auto; color: #4A3828; font-size: 10px; }

    /* ── Responsive tweaks ───────────────────── */
    @media (max-width: 700px) {
      .floor { grid-template-columns: 1fr; }
      .fun-areas { flex-direction: row; }
      .game-room, .tea-room { flex: 1; }
      .game-room { border-bottom: none; border-right: 3px solid #86EFAC; }
    }
  </style>
</head>
<body>

<div class="office">

  <!-- ── Header ── -->
  <div class="hdr">
    <div class="hdr-logo">🏢 遊戲工作室 404 <span>Agent 監控面板</span></div>
    <div class="badges">
      <div class="badge badge-work"><strong id="cnt-work">0</strong> 在工作</div>
      <div class="badge badge-idle"><strong id="cnt-idle">0</strong> 摸魚中</div>
      <div class="badge badge-total"><strong id="cnt-total">0</strong> 人</div>
    </div>
    <div class="hdr-btns">
      <button class="btn btn-go"  onclick="setAll('working')">📢 全員上班</button>
      <button class="btn btn-off" onclick="setAll('idle')">🏖️ 全員放假</button>
      <button class="btn btn-rst" onclick="resetState()">↺ 重置</button>
    </div>
    <div class="clock" id="clock">──:──:──</div>
  </div>

  <!-- ── Floor plan ── -->
  <div class="floor">

    <!-- Work area -->
    <div class="work-area">
      <div class="zone-label">💼 辦公區 — 點擊員工切換狀態</div>
      <div class="desks" id="desks"></div>
    </div>

    <!-- Fun areas -->
    <div class="fun-areas">
      <div class="game-room">
        <div class="zone-label">🎮 遊戲間</div>
        <div class="room-deco">🕹️ 🏓 📺 🎲</div>
        <div class="idle-cluster" id="game-zone"></div>
      </div>
      <div class="tea-room">
        <div class="zone-label">☕ 茶水間</div>
        <div class="room-deco">🧋 ☕ 🍱 🌿</div>
        <div class="idle-cluster" id="tea-zone"></div>
      </div>
    </div>

  </div><!-- /floor -->

  <!-- ── Legend ── -->
  <div class="legend">
    <div class="leg"><div class="dot dot-mgmt"></div>管理</div>
    <div class="leg"><div class="dot dot-design"></div>設計組</div>
    <div class="leg"><div class="dot dot-art"></div>美術組</div>
    <div class="leg"><div class="dot dot-content"></div>內容組</div>
    <div class="leg"><div class="dot dot-tech"></div>技術組</div>
    <div class="leg"><div class="dot dot-qa"></div>品管組</div>
    <div class="leg-hint">💡 點擊員工頭像切換工作／摸魚</div>
  </div>

</div><!-- /office -->

<script>
/* ── Agent roster ───────────────────────────────────────────────── */
const AGENTS = [
  // Management
  { id: 'producer',         name: '製作人',      emoji: '👔', dept: 'mgmt',    zone: 'tea',  activity: '喝珍奶',    anim: 'sway'   },
  { id: 'monitor',          name: '專案監控師',  emoji: '📡', dept: 'mgmt',    zone: 'tea',  activity: '盯螢幕',    anim: 'float'  },
  // Design
  { id: 'gamedesigner',     name: '遊戲設計師',  emoji: '🎮', dept: 'design',  zone: 'game', activity: '打電動',    anim: 'bounce' },
  { id: 'numerics',         name: '數值企劃',    emoji: '📊', dept: 'design',  zone: 'tea',  activity: '算數字',    anim: 'nod'    },
  { id: 'scenedesigner',    name: '場景設計師',  emoji: '🗺️', dept: 'design',  zone: 'game', activity: '打乒乓',    anim: 'bounce' },
  { id: 'tutorialdesigner', name: '教學設計師',  emoji: '📚', dept: 'design',  zone: 'tea',  activity: '看書',      anim: 'sway'   },
  { id: 'leveldesigner',    name: '關卡設計師',  emoji: '📈', dept: 'design',  zone: 'game', activity: '打電動',    anim: 'bounce' },
  // Art
  { id: 'artdirector',      name: '美術規格師',  emoji: '🎨', dept: 'art',     zone: 'tea',  activity: '亂塗鴉',    anim: 'float'  },
  { id: 'animator',         name: '動畫規劃師',  emoji: '🎬', dept: 'art',     zone: 'game', activity: '看動畫',    anim: 'sway'   },
  { id: 'effects',          name: '特效規格師',  emoji: '✨', dept: 'art',     zone: 'game', activity: '玩手機',    anim: 'bounce' },
  { id: 'uiux',             name: 'UI/UX 設計師', emoji: '🖼️', dept: 'art',    zone: 'tea',  activity: '滑 IG',     anim: 'sway'   },
  { id: 'assets',           name: '素材蒐集員',  emoji: '🔍', dept: 'art',     zone: 'tea',  activity: '逛網路',    anim: 'float'  },
  // Content
  { id: 'content',          name: '內容企劃',    emoji: '📝', dept: 'content', zone: 'tea',  activity: '聊八卦',    anim: 'sway'   },
  { id: 'writer',           name: '事件編劇',    emoji: '✍️', dept: 'content', zone: 'tea',  activity: '寫小說',    anim: 'nod'    },
  { id: 'sound',            name: '音效規劃',    emoji: '🎵', dept: 'content', zone: 'tea',  activity: '聽音樂',    anim: 'float'  },
  { id: 'localization',     name: '在地化專員',  emoji: '🌏', dept: 'content', zone: 'tea',  activity: '看韓劇',    anim: 'sway'   },
  // Tech
  { id: 'programmer',       name: '程式設計師',  emoji: '💻', dept: 'tech',    zone: 'game', activity: '打 CS2',    anim: 'bounce' },
  { id: 'sysprogrammer',    name: '系統程式師',  emoji: '⚙️', dept: 'tech',    zone: 'game', activity: '修電腦',    anim: 'spin'   },
  { id: 'dataarchitect',    name: '資料架構師',  emoji: '🏗️', dept: 'tech',    zone: 'tea',  activity: '看 XKCD',   anim: 'sway'   },
  { id: 'datamanager',      name: '資料管理師',  emoji: '📁', dept: 'tech',    zone: 'tea',  activity: '整理桌面',  anim: 'nod'    },
  { id: 'toolsdev',         name: '工具開發師',  emoji: '🔧', dept: 'tech',    zone: 'game', activity: '改機械鍵盤', anim: 'spin'  },
  { id: 'performance',      name: '效能優化師',  emoji: '⚡', dept: 'tech',    zone: 'game', activity: '跑來跑去',  anim: 'bounce' },
  // QA
  { id: 'tester',           name: '測試員',      emoji: '🔬', dept: 'qa',      zone: 'game', activity: '找 bug 玩', anim: 'bounce' },
  { id: 'validator',        name: '數值驗證師',  emoji: '✅', dept: 'qa',      zone: 'game', activity: '玩手遊',    anim: 'bounce' },
  { id: 'release',          name: '發布規劃師',  emoji: '🚀', dept: 'qa',      zone: 'tea',  activity: '規劃旅行',  anim: 'float'  },
];

/* ── State ──────────────────────────────────────────────────────── */
const KEY = 'studio404-v1';
let state = {};

function loadState() {
  try { state = JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e) { state = {}; }
  AGENTS.forEach(a => { if (!state[a.id]) state[a.id] = 'idle'; });
}

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {}
}

function toggle(id) {
  state[id] = state[id] === 'working' ? 'idle' : 'working';
  save();
  render();
}

function setAll(s) { AGENTS.forEach(a => state[a.id] = s); save(); render(); }

function resetState() { localStorage.removeItem(KEY); loadState(); render(); }

/* ── Build agent element ────────────────────────────────────────── */
function makeAgent(a) {
  const isW = state[a.id] === 'working';
  const el  = document.createElement('div');
  el.className   = `agent ${isW ? 'working' : 'idle anim-' + a.anim}`;
  el.dataset.dept = a.dept;
  el.title = `${a.name}  ${isW ? '🔥 工作中' : '😌 ' + a.activity}  ─  點擊切換`;
  el.onclick = () => toggle(a.id);
  el.innerHTML = `
    <div class="avatar">${a.emoji}</div>
    <div class="nametag">${a.name}</div>
    <div class="activity">${isW ? '<span class="working-txt">▶ 工作中</span>' : a.activity}</div>
  `;
  return el;
}

/* ── Render ─────────────────────────────────────────────────────── */
function render() {
  const working = AGENTS.filter(a => state[a.id] === 'working');
  const idle    = AGENTS.filter(a => state[a.id] !== 'working');

  /* desks */
  const desksEl = document.getElementById('desks');
  desksEl.innerHTML = '';
  const slots = Math.max(working.length + 4, 15);
  for (let i = 0; i < slots; i++) {
    const d = document.createElement('div');
    d.className = 'desk';
    if (i < working.length) {
      d.classList.add('occupied');
      d.appendChild(makeAgent(working[i]));
    } else {
      d.classList.add('empty');
    }
    desksEl.appendChild(d);
  }

  /* fun zones */
  const gameEl = document.getElementById('game-zone');
  const teaEl  = document.getElementById('tea-zone');
  gameEl.innerHTML = '';
  teaEl.innerHTML  = '';
  idle.forEach(a => {
    (a.zone === 'game' ? gameEl : teaEl).appendChild(makeAgent(a));
  });

  /* counts */
  document.getElementById('cnt-work').textContent  = working.length;
  document.getElementById('cnt-idle').textContent  = idle.length;
  document.getElementById('cnt-total').textContent = AGENTS.length;
}

/* ── Clock ──────────────────────────────────────────────────────── */
function tick() {
  const n = new Date();
  const d = n.toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit', weekday: 'short' });
  const t = n.toLocaleTimeString('zh-TW', { hour12: false });
  document.getElementById('clock').textContent = `${d}  ${t}`;
}

/* ── Init ───────────────────────────────────────────────────────── */
loadState();
render();
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
