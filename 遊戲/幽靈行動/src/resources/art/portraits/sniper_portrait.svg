<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#0A0A14"/>
  <g clip-path="url(#clip)">
    <!-- Bottom color fill -->
    <rect x="0" y="48" width="64" height="16" fill="#7755AA" opacity="0.3"/>
    <!-- Ghillie cloak (drapes wide on both sides — key identifier) -->
    <rect x="8" y="20" width="48" height="32" fill="#1E2A14" rx="8"/>
    <!-- Ghillie texture (irregular bumps) -->
    <ellipse cx="16" cy="24" rx="5" ry="4" fill="#263418" opacity="0.8"/>
    <ellipse cx="26" cy="22" rx="4" ry="3" fill="#1A2810" opacity="0.8"/>
    <ellipse cx="36" cy="23" rx="5" ry="3" fill="#243016" opacity="0.8"/>
    <ellipse cx="48" cy="25" rx="4" ry="4" fill="#1E2C12" opacity="0.8"/>
    <ellipse cx="12" cy="32" rx="4" ry="5" fill="#283820" opacity="0.7"/>
    <ellipse cx="52" cy="33" rx="4" ry="5" fill="#202E14" opacity="0.7"/>
    <!-- Slim body under ghillie -->
    <rect x="25" y="28" width="14" height="22" fill="#1A2010" rx="2" opacity="0.6"/>
    <!-- Head/hood with ghillie -->
    <ellipse cx="32" cy="20" rx="11" ry="10" fill="#1E2A14"/>
    <!-- Face slit (eyes visible) -->
    <rect x="25" y="18" width="14" height="5" fill="#111A0A" rx="1"/>
    <!-- Purple ribbon accent (key identifier) -->
    <rect x="26" y="16" width="12" height="3" fill="#7755AA" rx="1"/>
    <rect x="22" y="18" width="3" height="6" fill="#7755AA" rx="1" opacity="0.8"/>
    <!-- LONG RIFLE BARREL (extends far right — key identifier) -->
    <rect x="30" y="30" width="32" height="4" fill="#2A2A3A" rx="2"/>
    <!-- Rifle scope -->
    <rect x="36" y="27" width="10" height="5" fill="#333348" rx="1"/>
    <line x1="41" y1="27" x2="41" y2="32" stroke="#7755AA" stroke-width="1" opacity="0.8"/>
    <!-- Bipod legs -->
    <line x1="57" y1="34" x2="54" y2="42" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="62" y1="34" x2="60" y2="42" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Class color ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#7755AA" stroke-width="3"/>
</svg>
