<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#0A140A"/>
  <g clip-path="url(#clip)">
    <!-- Bottom color fill -->
    <rect x="0" y="48" width="64" height="16" fill="#2255BB" opacity="0.3"/>
    <!-- Wide shoulders -->
    <rect x="13" y="30" width="9" height="11" fill="#1A2A4A" rx="2"/>
    <rect x="42" y="30" width="9" height="11" fill="#1A2A4A" rx="2"/>
    <!-- Body (wide, armored) -->
    <rect x="19" y="30" width="26" height="22" fill="#2A3848" rx="2"/>
    <!-- Chest armor line -->
    <line x1="32" y1="30" x2="32" y2="52" stroke="#3A4858" stroke-width="1.5"/>
    <!-- Helmet (full-face, dark) -->
    <rect x="21" y="13" width="22" height="18" fill="#1A2848" rx="4"/>
    <!-- Visor (blue) -->
    <rect x="23" y="20" width="18" height="5" fill="#2255BB" rx="1"/>
    <!-- Helmet top ridge -->
    <rect x="24" y="13" width="16" height="3" fill="#243268" rx="2"/>
    <!-- SHIELD (left, extends past body — key identifier) -->
    <rect x="4" y="18" width="16" height="28" fill="#2255BB" rx="3"/>
    <rect x="6" y="20" width="12" height="24" fill="#1A44AA" rx="2"/>
    <!-- Shield stripe (steel blue highlight) -->
    <rect x="7" y="22" width="3" height="20" fill="#4477CC" rx="1"/>
    <!-- Shield boss (center rivet) -->
    <circle cx="14" cy="32" r="2.5" fill="#5588DD"/>
    <!-- SMG on right (compact) -->
    <rect x="48" y="32" width="5" height="13" fill="#2A2A2A" rx="1"/>
    <rect x="47" y="34" width="4" height="2" fill="#3A3A3A" rx="1"/>
  </g>
  <!-- Class color ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#2255BB" stroke-width="3"/>
</svg>
