<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background (darker, night ops) -->
  <circle cx="32" cy="32" r="32" fill="#060F06"/>
  <g clip-path="url(#clip)">
    <!-- Bottom color fill -->
    <rect x="0" y="48" width="64" height="16" fill="#33CC55" opacity="0.3"/>
    <!-- Slim light body -->
    <rect x="23" y="30" width="18" height="22" fill="#1A2A1A" rx="2"/>
    <!-- Slim shoulders -->
    <rect x="17" y="30" width="7" height="9" fill="#162216" rx="2"/>
    <rect x="40" y="30" width="7" height="9" fill="#162216" rx="2"/>
    <!-- Small backpack -->
    <rect x="40" y="22" width="9" height="16" fill="#121E12" rx="2"/>
    <!-- Helmet base -->
    <rect x="23" y="15" width="18" height="15" fill="#1A2A1A" rx="3"/>
    <!-- NVG MOUNT (T-shape — key identifier) -->
    <!-- Horizontal bar across forehead -->
    <rect x="20" y="14" width="24" height="5" fill="#223322" rx="2"/>
    <!-- NVG tube extending FORWARD (vertical from forehead) -->
    <rect x="27" y="5" width="10" height="11" fill="#1A2A1A" rx="2"/>
    <!-- NVG LENSES (green glow — most distinctive element) -->
    <circle cx="30" cy="10" r="4" fill="#0A1A0A" filter="url(#glow)"/>
    <circle cx="34" cy="10" r="4" fill="#0A1A0A" filter="url(#glow)"/>
    <circle cx="30" cy="10" r="3" fill="#33CC55" opacity="0.9" filter="url(#glow)"/>
    <circle cx="34" cy="10" r="3" fill="#33CC55" opacity="0.9" filter="url(#glow)"/>
    <!-- NVG lens inner bright spot -->
    <circle cx="30" cy="10" r="1.5" fill="#88FF88" opacity="0.8"/>
    <circle cx="34" cy="10" r="1.5" fill="#88FF88" opacity="0.8"/>
    <!-- NVG mount arm -->
    <rect x="31" y="5" width="2" height="10" fill="#2A3A2A" rx="1"/>
    <!-- Monocular scope on right shoulder -->
    <rect x="41" y="29" width="7" height="4" fill="#222" rx="1"/>
    <circle cx="47" cy="31" r="2" fill="#33CC55" opacity="0.6"/>
    <!-- Pistol on right hip -->
    <rect x="41" y="44" width="6" height="8" fill="#1A1A1A" rx="1"/>
    <rect x="40" y="47" width="3" height="2" fill="#222" rx="0.5"/>
    <!-- Smoke grenade (round, on belt) -->
    <circle cx="22" cy="46" r="4" fill="#2A2A2A"/>
    <rect x="21" y="42" width="2" height="3" fill="#33CC55" rx="0.5"/>
    <!-- Green ambient glow around NVG area -->
    <ellipse cx="32" cy="10" rx="12" ry="6" fill="#33CC55" opacity="0.08"/>
  </g>
  <!-- Class color ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#33CC55" stroke-width="3"/>
</svg>
