<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#0A140A"/>
  <g clip-path="url(#clip)">
    <!-- Bottom color fill -->
    <rect x="0" y="48" width="64" height="16" fill="#22BB88" opacity="0.3"/>
    <!-- Slim shoulders -->
    <rect x="17" y="30" width="7" height="9" fill="#253A30" rx="2"/>
    <rect x="40" y="30" width="7" height="9" fill="#253A30" rx="2"/>
    <!-- Body (slim, light vest) -->
    <rect x="21" y="30" width="22" height="22" fill="#2A3A32" rx="2"/>
    <!-- Medical backpack (right side, key identifier) -->
    <rect x="40" y="20" width="11" height="22" fill="#1E2E28" rx="3"/>
    <!-- Cross on backpack -->
    <rect x="43" y="24" width="5" height="14" fill="#22BB88" rx="1"/>
    <rect x="40" y="29" width="11" height="4" fill="#22BB88" rx="1"/>
    <!-- Soft cap/helmet -->
    <rect x="23" y="14" width="18" height="16" fill="#253A2A" rx="4"/>
    <!-- Cap brim -->
    <rect x="22" y="27" width="20" height="3" fill="#1E3020" rx="1"/>
    <!-- MEDICAL CROSS on left arm (key identifier) -->
    <rect x="14" y="31" width="5" height="13" fill="#22BB88" rx="1"/>
    <rect x="11" y="37" width="11" height="4" fill="#22BB88" rx="1"/>
    <!-- White cross inner -->
    <rect x="15" y="33" width="3" height="9" fill="#DDFFF0" rx="0.5" opacity="0.9"/>
    <rect x="13" y="38" width="7" height="3" fill="#DDFFF0" rx="0.5" opacity="0.9"/>
    <!-- Pistol (right hip, small) -->
    <rect x="43" y="46" width="5" height="8" fill="#2A2A2A" rx="1"/>
    <!-- Antenna on backpack top -->
    <rect x="46" y="14" width="2" height="8" fill="#22BB88" rx="1"/>
  </g>
  <!-- Class color ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#22BB88" stroke-width="3"/>
</svg>
