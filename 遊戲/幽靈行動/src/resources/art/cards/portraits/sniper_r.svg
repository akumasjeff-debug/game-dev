<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <!-- 背景：土地/草地色調 -->
  <rect width="100" height="130" fill="#2A2818"/>
  <rect width="100" height="130" fill="#3A3820" opacity="0.6"/>
  <rect x="0" y="80" width="100" height="50" fill="#2A2000" opacity="0.5"/>

  <!-- 吉利服下擺（草地迷彩條紋） -->
  <rect x="10" y="82" width="80" height="48" rx="3" fill="#4A3C18"/>
  <!-- 迷彩紋路 -->
  <rect x="12" y="86" width="20" height="6" rx="2" fill="#3A2C10" opacity="0.8"/>
  <rect x="38" y="90" width="16" height="8" rx="2" fill="#5A4820" opacity="0.8"/>
  <rect x="60" y="84" width="18" height="5" rx="2" fill="#3A2C10" opacity="0.8"/>
  <rect x="15" y="96" width="14" height="6" rx="2" fill="#5A4820" opacity="0.7"/>
  <rect x="44" y="100" width="20" height="8" rx="2" fill="#3A2C10" opacity="0.7"/>
  <rect x="72" y="94" width="12" height="5" rx="2" fill="#4A3C18" opacity="0.8"/>
  <!-- 吉利服草葉裝飾 -->
  <polygon points="20,82 24,70 28,82" fill="#3A5010" opacity="0.9"/>
  <polygon points="32,82 36,68 40,82" fill="#4A6018" opacity="0.9"/>
  <polygon points="50,82 54,72 58,82" fill="#3A5010" opacity="0.9"/>
  <polygon points="65,82 68,71 72,82" fill="#4A6018" opacity="0.8"/>
  <polygon points="75,82 79,69 83,82" fill="#3A5010" opacity="0.9"/>

  <!-- 狙擊槍前端（右下角可見） -->
  <rect x="72" y="90" width="30" height="6" rx="2" fill="#1A1A14"/>
  <rect x="76" y="91" width="26" height="4" rx="1" fill="#2A2A1E"/>
  <!-- 槍管消焰器 -->
  <rect x="98" y="89" width="8" height="8" rx="1" fill="#111110"/>

  <!-- 身體吉利服上身 -->
  <rect x="22" y="68" width="56" height="22" rx="3" fill="#4A3C18"/>
  <!-- 裝備帶 -->
  <rect x="36" y="68" width="4" height="22" fill="#2A2010"/>
  <rect x="60" y="68" width="4" height="22" fill="#2A2010"/>
  <!-- 胸前口袋 -->
  <rect x="42" y="72" width="16" height="10" rx="1" fill="#3A2C10"/>

  <!-- 頸部 -->
  <rect x="42" y="58" width="16" height="12" rx="3" fill="#B89060"/>
  <!-- 頭部 -->
  <ellipse cx="50" cy="44" rx="22" ry="24" fill="#B89060"/>
  <ellipse cx="28" cy="46" rx="4" ry="6" fill="#A88050"/>
  <ellipse cx="72" cy="46" rx="4" ry="6" fill="#A88050"/>
  <!-- 吉利帽（棕色草地迷彩） -->
  <ellipse cx="50" cy="32" rx="24" ry="18" fill="#4A3C18"/>
  <rect x="26" y="32" width="48" height="14" fill="#4A3C18"/>
  <!-- 帽沿 -->
  <rect x="22" y="44" width="56" height="6" rx="3" fill="#3A2C10"/>
  <!-- 帽子迷彩紋 -->
  <rect x="30" y="28" width="10" height="5" rx="2" fill="#3A2C10" opacity="0.7"/>
  <rect x="50" y="26" width="12" height="4" rx="2" fill="#5A4820" opacity="0.7"/>
  <rect x="40" y="33" width="8" height="4" rx="2" fill="#3A2C10" opacity="0.6"/>
  <!-- 帽沿草葉 -->
  <polygon points="26,44 29,36 32,44" fill="#3A5010" opacity="0.8"/>
  <polygon points="66,44 69,35 72,44" fill="#4A6018" opacity="0.8"/>
  <!-- 臉（眼睛） -->
  <rect x="34" y="46" width="12" height="7" rx="2" fill="#1A1A18"/>
  <rect x="54" y="46" width="12" height="7" rx="2" fill="#1A1A18"/>
  <ellipse cx="40" cy="49" rx="3" ry="3" fill="#3A2C10"/>
  <ellipse cx="60" cy="49" rx="3" ry="3" fill="#3A2C10"/>
  <!-- 臉部迷彩塗裝 -->
  <ellipse cx="36" cy="52" rx="6" ry="3" fill="#3A2C10" opacity="0.5"/>
  <ellipse cx="64" cy="52" rx="6" ry="3" fill="#3A2C10" opacity="0.5"/>
</svg>
