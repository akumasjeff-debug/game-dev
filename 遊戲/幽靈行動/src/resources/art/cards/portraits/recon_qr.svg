<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <defs>
    <linearGradient id="bg_qr_r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#030610"/>
      <stop offset="40%" stop-color="#060C1C"/>
      <stop offset="100%" stop-color="#020408"/>
    </linearGradient>
    <radialGradient id="electric_halo" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#00EEFF" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#0066FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0022AA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="circuit_core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0044AA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 背景 -->
  <rect width="100" height="130" fill="url(#bg_qr_r)"/>
  <!-- 電光光暈 -->
  <ellipse cx="50" cy="48" rx="50" ry="58" fill="url(#electric_halo)"/>
  <!-- QR 框線（金色+青色） -->
  <rect x="1" y="1" width="98" height="128" rx="3" fill="none" stroke="#DDAA00" stroke-width="2.5"/>
  <rect x="3" y="3" width="94" height="124" rx="2" fill="none" stroke="#00EEFF" stroke-width="1" opacity="0.7"/>

  <!-- 完全電磁隱身裝下身 -->
  <rect x="8" y="76" width="84" height="54" rx="5" fill="#030810" opacity="0.92"/>
  <!-- 裂縫式能量紋路（電光） -->
  <!-- 垂直主電光 -->
  <rect x="49" y="78" width="2" height="52" fill="#00EEFF" opacity="0.7"/>
  <rect x="48" y="78" width="4" height="2" fill="#FFFFFF" opacity="0.5"/>
  <!-- 分支電光 左 -->
  <polygon points="48,88 30,94 38,96 20,108" fill="none" stroke="#00CCFF" stroke-width="1" opacity="0.6"/>
  <polygon points="48,100 25,110 35,112" fill="none" stroke="#00AAFF" stroke-width="0.8" opacity="0.5"/>
  <!-- 分支電光 右 -->
  <polygon points="52,88 70,94 62,96 80,108" fill="none" stroke="#00CCFF" stroke-width="1" opacity="0.6"/>
  <polygon points="52,100 75,110 65,112" fill="none" stroke="#00AAFF" stroke-width="0.8" opacity="0.5"/>
  <!-- 電光亮點 -->
  <ellipse cx="50" cy="88" rx="2" ry="2" fill="#FFFFFF" opacity="0.9"/>
  <ellipse cx="50" cy="100" rx="1.5" ry="1.5" fill="#FFFFFF" opacity="0.8"/>
  <ellipse cx="50" cy="112" rx="1.5" ry="1.5" fill="#00EEFF" opacity="0.9"/>
  <!-- 金紅分割腰帶 -->
  <rect x="8" y="98" width="84" height="4" fill="#DDAA00" opacity="0.9"/>
  <rect x="8" y="102" width="84" height="2" fill="#CC2200" opacity="0.6"/>
  <!-- 肩甲（深藍黑+電光邊） -->
  <polygon points="8,76 28,64 32,88 8,96" fill="#040A18"/>
  <rect x="8" y="80" width="24" height="1" fill="#00EEFF" opacity="0.8"/>
  <rect x="10" y="84" width="18" height="1" fill="#00EEFF" opacity="0.5"/>
  <polygon points="92,76 72,64 68,88 92,96" fill="#040A18"/>
  <rect x="68" y="80" width="24" height="1" fill="#00EEFF" opacity="0.8"/>
  <!-- 全息投影環繞（上方弧形光環） -->
  <ellipse cx="50" cy="62" rx="44" ry="8" fill="none" stroke="#00EEFF" stroke-width="1" opacity="0.5"/>
  <ellipse cx="50" cy="62" rx="40" ry="5" fill="none" stroke="#00AAFF" stroke-width="0.5" opacity="0.3"/>
  <!-- 胸甲電路板 -->
  <rect x="16" y="62" width="68" height="26" rx="4" fill="#040810"/>
  <!-- 裂縫電光主幹 -->
  <rect x="49" y="64" width="2" height="24" fill="#00EEFF" opacity="0.8"/>
  <!-- 橫向電路 -->
  <rect x="18" y="70" width="30" height="1" fill="#00AACC" opacity="0.5"/>
  <rect x="52" y="70" width="30" height="1" fill="#00AACC" opacity="0.5"/>
  <rect x="18" y="76" width="20" height="1" fill="#00AACC" opacity="0.4"/>
  <rect x="62" y="76" width="20" height="1" fill="#00AACC" opacity="0.4"/>
  <!-- 核心圓圈 -->
  <ellipse cx="50" cy="75" rx="10" ry="7" fill="url(#circuit_core)"/>
  <ellipse cx="50" cy="75" rx="6" ry="4" fill="#00EEFF" opacity="0.6"/>
  <ellipse cx="50" cy="75" rx="2" ry="2" fill="#FFFFFF" opacity="0.9"/>

  <!-- 頸部 -->
  <rect x="42" y="52" width="16" height="12" rx="3" fill="#906040"/>
  <!-- 頭部 -->
  <ellipse cx="50" cy="38" rx="22" ry="24" fill="#906040"/>
  <ellipse cx="28" cy="40" rx="4" ry="6" fill="#885838"/>
  <ellipse cx="72" cy="40" rx="4" ry="6" fill="#885838"/>
  <!-- 電磁隱身頭盔 -->
  <ellipse cx="50" cy="26" rx="22" ry="18" fill="#040810"/>
  <rect x="28" y="26" width="44" height="14" fill="#040810"/>
  <!-- 頭盔電光紋路 -->
  <rect x="49" y="22" width="2" height="18" fill="#00EEFF" opacity="0.7"/>
  <rect x="30" y="30" width="18" height="1" fill="#00AACC" opacity="0.5"/>
  <rect x="52" y="30" width="18" height="1" fill="#00AACC" opacity="0.5"/>
  <!-- 全息護目鏡 -->
  <rect x="28" y="36" width="44" height="14" rx="5" fill="#020610" opacity="0.97"/>
  <!-- 全息投影界面 左右分區 -->
  <rect x="29" y="37" width="20" height="12" rx="4" fill="#0033AA" opacity="0.5"/>
  <rect x="51" y="37" width="20" height="12" rx="4" fill="#0033AA" opacity="0.5"/>
  <!-- 全息資訊線 -->
  <rect x="30" y="39" width="18" height="1" fill="#00EEFF" opacity="0.7"/>
  <rect x="30" y="42" width="12" height="1" fill="#00AACC" opacity="0.5"/>
  <rect x="30" y="45" width="8" height="1" fill="#00AACC" opacity="0.4"/>
  <rect x="52" y="39" width="18" height="1" fill="#00EEFF" opacity="0.7"/>
  <rect x="52" y="42" width="12" height="1" fill="#00AACC" opacity="0.5"/>
  <rect x="58" y="45" width="12" height="1" fill="#00AACC" opacity="0.4"/>
  <!-- 眼部掃描（裂縫電光） -->
  <ellipse cx="39" cy="43" rx="8" ry="5" fill="#00CCFF" opacity="0.8"/>
  <ellipse cx="61" cy="43" rx="8" ry="5" fill="#00CCFF" opacity="0.8"/>
  <ellipse cx="39" cy="43" rx="4" ry="2.5" fill="#AAEEFF" opacity="0.9"/>
  <ellipse cx="61" cy="43" rx="4" ry="2.5" fill="#AAEEFF" opacity="0.9"/>
  <ellipse cx="39" cy="43" rx="1.5" ry="1.5" fill="#FFFFFF" opacity="0.9"/>
  <ellipse cx="61" cy="43" rx="1.5" ry="1.5" fill="#FFFFFF" opacity="0.9"/>
  <!-- 護目鏡框（電光邊） -->
  <rect x="28" y="36" width="44" height="14" rx="5" fill="none" stroke="#00EEFF" stroke-width="1" opacity="0.9"/>
  <!-- 頭盔頂部電光 -->
  <rect x="47" y="18" width="6" height="8" rx="2" fill="#040810"/>
  <rect x="48" y="16" width="4" height="6" rx="1" fill="#DDAA00"/>
  <rect x="49" y="15" width="2" height="12" fill="#00EEFF" opacity="0.8"/>
  <ellipse cx="50" cy="17" rx="3" ry="3" fill="#00EEFF" opacity="0.5"/>
  <!-- 全息光環（頭部周圍） -->
  <ellipse cx="50" cy="38" rx="26" ry="28" fill="none" stroke="#00AACC" stroke-width="0.5" opacity="0.4"/>
</svg>
