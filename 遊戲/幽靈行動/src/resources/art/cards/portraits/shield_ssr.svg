<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <!-- 背景：SSR 金色光暈漸層 -->
  <rect x="0" y="0" width="100" height="130" fill="#0A1020"/>
  <rect x="0" y="0" width="50" height="130" fill="#060C18" opacity="0.8"/>
  <!-- 多層 rect 模擬漸層光暈 -->
  <rect x="10" y="10" width="80" height="110" fill="#1A2A10" opacity="0.1"/>
  <rect x="20" y="15" width="60" height="100" fill="#2A3A10" opacity="0.08"/>
  <rect x="25" y="20" width="50" height="90" fill="#4A5820" opacity="0.06"/>

  <!-- SSR 金色光暈背景 -->
  <ellipse cx="50" cy="60" rx="42" ry="55" fill="#4A3800" opacity="0.15"/>
  <ellipse cx="50" cy="60" rx="30" ry="40" fill="#6A5200" opacity="0.12"/>
  <ellipse cx="50" cy="60" rx="18" ry="26" fill="#8A7000" opacity="0.10"/>

  <!-- 金色外框 -->
  <rect x="1" y="1" width="98" height="128" fill="none" stroke="#AA8800" stroke-width="1.5"/>
  <rect x="3" y="3" width="94" height="124" fill="none" stroke="#CCAA00" stroke-width="0.8" opacity="0.7"/>

  <!-- 地面金色光暈 -->
  <ellipse cx="50" cy="122" rx="35" ry="5" fill="#8A7000" opacity="0.3"/>
  <ellipse cx="50" cy="120" rx="22" ry="4" fill="#000000" opacity="0.5"/>

  <!-- 軀幹：重裝護甲（深藍+金邊） -->
  <rect x="22" y="65" width="56" height="55" fill="#182844" rx="3"/>
  <!-- 護甲板塊 -->
  <rect x="22" y="78" width="56" height="3" fill="#0A1828" opacity="0.9"/>
  <rect x="22" y="92" width="56" height="3" fill="#0A1828" opacity="0.9"/>
  <rect x="49" y="65" width="3" height="55" fill="#0A1828" opacity="0.7"/>
  <!-- 金色邊框 -->
  <rect x="22" y="65" width="56" height="55" fill="none" stroke="#CCAA00" stroke-width="2" rx="3"/>
  <rect x="22" y="65" width="56" height="55" fill="none" stroke="#FFD040" stroke-width="0.8" rx="3" opacity="0.5"/>

  <!-- 胸甲金色飾紋 -->
  <polygon points="50,70 38,76 38,88 50,94 62,88 62,76" fill="#1A3060"/>
  <polygon points="50,70 38,76 38,88 50,94 62,88 62,76" fill="none" stroke="#CCAA00" stroke-width="1.5"/>
  <ellipse cx="50" cy="82" rx="5" ry="5" fill="#AA8800"/>
  <ellipse cx="50" cy="82" rx="3" ry="3" fill="#FFD040"/>

  <!-- 腰帶金色扣環 -->
  <rect x="22" y="108" width="56" height="10" fill="#0A1828"/>
  <rect x="22" y="108" width="56" height="10" fill="none" stroke="#CCAA00" stroke-width="1"/>
  <rect x="44" y="110" width="12" height="6" fill="#AA8800" rx="1"/>
  <ellipse cx="50" cy="113" rx="3" ry="2" fill="#FFD040"/>

  <!-- 肩甲（大型重裝） -->
  <rect x="10" y="60" width="16" height="28" fill="#162240" rx="3"/>
  <rect x="74" y="60" width="16" height="28" fill="#162240" rx="3"/>
  <rect x="10" y="60" width="16" height="28" fill="none" stroke="#CCAA00" stroke-width="1.5" rx="3"/>
  <rect x="74" y="60" width="16" height="28" fill="none" stroke="#CCAA00" stroke-width="1.5" rx="3"/>
  <!-- 肩甲金色飾條 -->
  <rect x="12" y="66" width="12" height="2" fill="#CCAA00"/>
  <rect x="12" y="72" width="12" height="2" fill="#CCAA00"/>
  <rect x="76" y="66" width="12" height="2" fill="#CCAA00"/>
  <rect x="76" y="72" width="12" height="2" fill="#CCAA00"/>

  <!-- 頸部護甲 -->
  <rect x="40" y="54" width="20" height="13" fill="#182844" rx="2"/>
  <rect x="40" y="54" width="20" height="13" fill="none" stroke="#CCAA00" stroke-width="1" rx="2"/>

  <!-- 頭部護盾（SSR 特有） -->
  <rect x="30" y="14" width="40" height="28" fill="#1A2A50" rx="3"/>
  <rect x="30" y="14" width="40" height="28" fill="none" stroke="#CCAA00" stroke-width="1.5" rx="3"/>
  <!-- 護盾透明視窗 -->
  <rect x="32" y="16" width="36" height="22" fill="#0A1830" rx="2" opacity="0.8"/>
  <!-- 護盾金色橫條 -->
  <rect x="30" y="20" width="40" height="2" fill="#CCAA00" opacity="0.6"/>
  <rect x="30" y="34" width="40" height="2" fill="#CCAA00" opacity="0.6"/>

  <!-- 頭盔主體 -->
  <ellipse cx="50" cy="44" rx="22" ry="18" fill="#1A2840"/>
  <rect x="28" y="42" width="44" height="12" fill="#1A2840"/>
  <!-- 頭盔側護 -->
  <rect x="27" y="42" width="8" height="18" fill="#162238" rx="1"/>
  <rect x="65" y="42" width="8" height="18" fill="#162238" rx="1"/>
  <!-- 頭盔金色飾邊 -->
  <rect x="28" y="30" width="44" height="4" fill="#CCAA00" rx="1" opacity="0.8"/>
  <rect x="27" y="42" width="8" height="18" fill="none" stroke="#CCAA00" stroke-width="0.8" rx="1"/>
  <rect x="65" y="42" width="8" height="18" fill="none" stroke="#CCAA00" stroke-width="0.8" rx="1"/>

  <!-- 面部 -->
  <rect x="34" y="42" width="32" height="16" fill="#7A5A40" rx="1"/>
  <!-- 全遮面護目鏡（金色框） -->
  <rect x="34" y="42" width="32" height="16" fill="#050F1E" rx="2"/>
  <rect x="36" y="43" width="13" height="9" fill="#0A1828" rx="1"/>
  <rect x="51" y="43" width="13" height="9" fill="#0A1828" rx="1"/>
  <rect x="36" y="43" width="13" height="9" fill="none" stroke="#CCAA00" stroke-width="1" rx="1"/>
  <rect x="51" y="43" width="13" height="9" fill="none" stroke="#CCAA00" stroke-width="1" rx="1"/>
  <!-- 護目鏡金色反光 -->
  <rect x="37" y="44" width="5" height="3" fill="#AA8800" opacity="0.5"/>
  <rect x="52" y="44" width="5" height="3" fill="#AA8800" opacity="0.5"/>
  <!-- 口罩 -->
  <rect x="34" y="52" width="32" height="8" fill="#1A2840"/>
  <rect x="34" y="52" width="32" height="8" fill="none" stroke="#CCAA00" stroke-width="0.8"/>

  <!-- 盾牌（SSR 重裝+金色邊框） -->
  <rect x="5" y="45" width="20" height="68" fill="#0F1E40" rx="3"/>
  <rect x="5" y="45" width="20" height="68" fill="none" stroke="#CCAA00" stroke-width="2.5" rx="3"/>
  <rect x="5" y="45" width="20" height="68" fill="none" stroke="#FFD040" stroke-width="0.8" rx="3" opacity="0.5"/>
  <!-- 盾牌橫條 -->
  <rect x="5" y="65" width="20" height="3" fill="#CCAA00" opacity="0.7"/>
  <rect x="5" y="90" width="20" height="3" fill="#CCAA00" opacity="0.7"/>
  <!-- 盾牌中央紋章 -->
  <polygon points="15,52 8,62 8,80 15,90 22,80 22,62" fill="#162240"/>
  <polygon points="15,52 8,62 8,80 15,90 22,80 22,62" fill="none" stroke="#CCAA00" stroke-width="1.2"/>
  <ellipse cx="15" cy="71" rx="4" ry="4" fill="#AA8800"/>
  <ellipse cx="15" cy="71" rx="2" ry="2" fill="#FFE060"/>

  <!-- 右手 -->
  <rect x="74" y="75" width="14" height="12" fill="#4A3828" rx="2"/>
  <rect x="74" y="75" width="14" height="12" fill="none" stroke="#CCAA00" stroke-width="0.8" rx="2"/>
</svg>
