<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <defs>
    <linearGradient id="bg_qr_m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="40%" stop-color="#0F1A2A"/>
      <stop offset="100%" stop-color="#020508"/>
    </linearGradient>
    <radialGradient id="divine_halo" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFFFCC" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#FFDD44" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFDD44" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cross_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFCC00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF4400" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 背景 -->
  <rect width="100" height="130" fill="url(#bg_qr_m)"/>
  <!-- 戲劇光暈 -->
  <ellipse cx="50" cy="48" rx="50" ry="60" fill="url(#divine_halo)"/>
  <!-- 金色紅色分割框線 -->
  <rect x="1" y="1" width="98" height="128" rx="3" fill="none" stroke="#DDAA00" stroke-width="2.5"/>
  <rect x="3" y="3" width="94" height="124" rx="2" fill="none" stroke="#CC3300" stroke-width="1" opacity="0.7"/>

  <!-- 聖光白色全身護甲 -->
  <rect x="6" y="72" width="88" height="58" rx="6" fill="#E8F0FA"/>
  <!-- 護甲金色分割線 -->
  <rect x="6" y="94" width="88" height="4" fill="#DDAA00" opacity="0.8"/>
  <!-- 肩甲（金色紅色分割） -->
  <polygon points="6,72 26,62 30,86 6,96" fill="#CCAA00"/>
  <rect x="6" y="78" width="24" height="4" fill="#CC3300"/>
  <polygon points="94,72 74,62 70,86 94,96" fill="#CCAA00"/>
  <rect x="70" y="78" width="24" height="4" fill="#CC3300"/>
  <!-- 護甲主板 -->
  <rect x="18" y="65" width="64" height="65" rx="4" fill="#F0F4FF"/>
  <!-- 金色紅十字 胸甲 -->
  <ellipse cx="50" cy="82" rx="14" ry="14" fill="url(#cross_glow)"/>
  <rect x="46" y="70" width="8" height="24" rx="2" fill="#FFCC00"/>
  <rect x="38" y="78" width="24" height="8" rx="2" fill="#FFCC00"/>
  <!-- 雙肩噴射器（左） -->
  <rect x="6" y="58" width="16" height="24" rx="4" fill="#44AAFF" opacity="0.9"/>
  <rect x="8" y="56" width="12" height="6" rx="3" fill="#88CCFF"/>
  <ellipse cx="14" cy="53" rx="6" ry="4" fill="#AADDFF" opacity="0.8"/>
  <rect x="10" y="63" width="8" height="2" fill="#FFFFFF" opacity="0.6"/>
  <rect x="10" y="67" width="8" height="2" fill="#FFFFFF" opacity="0.6"/>
  <rect x="10" y="71" width="8" height="2" fill="#FFFFFF" opacity="0.6"/>
  <!-- 雙肩噴射器（右） -->
  <rect x="78" y="58" width="16" height="24" rx="4" fill="#44AAFF" opacity="0.9"/>
  <rect x="80" y="56" width="12" height="6" rx="3" fill="#88CCFF"/>
  <ellipse cx="86" cy="53" rx="6" ry="4" fill="#AADDFF" opacity="0.8"/>
  <rect x="82" y="63" width="8" height="2" fill="#FFFFFF" opacity="0.6"/>
  <rect x="82" y="67" width="8" height="2" fill="#FFFFFF" opacity="0.6"/>
  <rect x="82" y="71" width="8" height="2" fill="#FFFFFF" opacity="0.6"/>

  <!-- 頸部 -->
  <rect x="42" y="56" width="16" height="11" rx="3" fill="#C8A882"/>
  <!-- 頭部 -->
  <ellipse cx="50" cy="42" rx="22" ry="24" fill="#D0AA88"/>
  <ellipse cx="28" cy="44" rx="4" ry="6" fill="#C8A080"/>
  <ellipse cx="72" cy="44" rx="4" ry="6" fill="#C8A080"/>
  <!-- 全身聖光護甲 頭盔 -->
  <ellipse cx="50" cy="30" rx="22" ry="18" fill="#F0F4FF"/>
  <rect x="28" y="30" width="44" height="14" fill="#F0F4FF"/>
  <!-- 頭盔金色邊框 -->
  <rect x="28" y="30" width="44" height="4" fill="#DDAA00"/>
  <rect x="28" y="42" width="44" height="2" fill="#DDAA00"/>
  <!-- 面罩（聖光白+金色邊） -->
  <rect x="30" y="43" width="40" height="16" rx="4" fill="#0A1A30" opacity="0.9"/>
  <rect x="31" y="44" width="38" height="14" rx="3" fill="#1144AA" opacity="0.3"/>
  <!-- 眼部金光 -->
  <ellipse cx="40" cy="50" rx="8" ry="5" fill="#FFCC00" opacity="0.9"/>
  <ellipse cx="60" cy="50" rx="8" ry="5" fill="#FFCC00" opacity="0.9"/>
  <ellipse cx="40" cy="50" rx="5" ry="3" fill="#FFFFFF" opacity="0.7"/>
  <ellipse cx="60" cy="50" rx="5" ry="3" fill="#FFFFFF" opacity="0.7"/>
  <!-- 頭盔頂部金十字 -->
  <rect x="47" y="22" width="6" height="14" rx="1" fill="#FFCC00"/>
  <rect x="42" y="27" width="16" height="4" rx="1" fill="#FFCC00"/>
  <!-- 金十字光暈 -->
  <ellipse cx="50" cy="29" rx="10" ry="8" fill="#FFDD44" opacity="0.25"/>
</svg>
