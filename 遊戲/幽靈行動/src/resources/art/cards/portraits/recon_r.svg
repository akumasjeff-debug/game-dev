<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <!-- 背景：深藍 -->
  <rect width="100" height="130" fill="#1A2038"/>
  <rect width="100" height="130" fill="#223050" opacity="0.6"/>

  <!-- 輕裝偵察服下身 -->
  <rect x="16" y="84" width="68" height="46" rx="3" fill="#2A3858"/>
  <!-- 裝備口袋 -->
  <rect x="20" y="90" width="16" height="12" rx="2" fill="#1E2A44"/>
  <rect x="64" y="90" width="16" height="12" rx="2" fill="#1E2A44"/>
  <!-- 中央腰帶 -->
  <rect x="16" y="106" width="68" height="5" rx="1" fill="#1A2438"/>

  <!-- 上身輕裝服 -->
  <rect x="20" y="68" width="60" height="26" rx="3" fill="#2A3858"/>
  <!-- 裝備帶 斜跨 -->
  <rect x="35" y="68" width="4" height="26" fill="#1A2438"/>
  <rect x="61" y="68" width="4" height="26" fill="#1A2438"/>
  <!-- 通訊發射器（胸前） -->
  <rect x="44" y="70" width="12" height="8" rx="2" fill="#1A2A3A"/>
  <rect x="46" y="72" width="8" height="4" rx="1" fill="#445566"/>
  <rect x="49" y="69" width="2" height="3" fill="#66AACC"/>

  <!-- 頸部 -->
  <rect x="42" y="58" width="16" height="12" rx="3" fill="#A88060"/>
  <!-- 頭部 -->
  <ellipse cx="50" cy="44" rx="22" ry="24" fill="#A88060"/>
  <ellipse cx="28" cy="46" rx="4" ry="6" fill="#A07858"/>
  <ellipse cx="72" cy="46" rx="4" ry="6" fill="#A07858"/>
  <!-- 偵察頭盔（深藍） -->
  <ellipse cx="50" cy="32" rx="22" ry="18" fill="#2A3858"/>
  <rect x="28" y="32" width="44" height="14" fill="#2A3858"/>
  <!-- 通訊耳機（左） -->
  <ellipse cx="26" cy="47" rx="6" ry="8" fill="#1A2438"/>
  <ellipse cx="26" cy="47" rx="4" ry="6" fill="#2A3858"/>
  <ellipse cx="26" cy="47" rx="2" ry="3" fill="#66AACC" opacity="0.7"/>
  <!-- 通訊耳機（右） -->
  <ellipse cx="74" cy="47" rx="6" ry="8" fill="#1A2438"/>
  <ellipse cx="74" cy="47" rx="4" ry="6" fill="#2A3858"/>
  <ellipse cx="74" cy="47" rx="2" ry="3" fill="#66AACC" opacity="0.7"/>
  <!-- 麥克風臂 -->
  <rect x="24" y="53" width="8" height="2" rx="1" fill="#445566"/>
  <ellipse cx="33" cy="54" rx="2" ry="2" fill="#66AACC"/>
  <!-- 眼睛 -->
  <rect x="34" y="46" width="12" height="7" rx="2" fill="#1A2438"/>
  <rect x="54" y="46" width="12" height="7" rx="2" fill="#1A2438"/>
  <ellipse cx="40" cy="49" rx="4" ry="3" fill="#4488AA"/>
  <ellipse cx="60" cy="49" rx="4" ry="3" fill="#4488AA"/>
  <!-- 頭盔青色標誌 -->
  <rect x="46" y="26" width="8" height="2" fill="#44AACC"/>
</svg>
