<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <!-- 背景：SSR 金橙色光暈 -->
  <rect x="0" y="0" width="100" height="130" fill="#080602"/>
  <rect x="0" y="0" width="50" height="130" fill="#060402" opacity="0.8"/>
  <!-- 金橙光暈 -->
  <rect x="10" y="10" width="80" height="110" fill="#301A00" opacity="0.1"/>
  <rect x="20" y="15" width="60" height="100" fill="#402000" opacity="0.08"/>
  <rect x="25" y="20" width="50" height="90" fill="#602800" opacity="0.06"/>

  <!-- SSR 橙色光暈背景 -->
  <ellipse cx="50" cy="60" rx="42" ry="55" fill="#3A1800" opacity="0.18"/>
  <ellipse cx="50" cy="60" rx="28" ry="38" fill="#5A2800" opacity="0.14"/>
  <ellipse cx="50" cy="60" rx="16" ry="22" fill="#7A3800" opacity="0.10"/>

  <!-- 金色外框 -->
  <rect x="1" y="1" width="98" height="128" fill="none" stroke="#AA6600" stroke-width="1.5"/>
  <rect x="3" y="3" width="94" height="124" fill="none" stroke="#CC8800" stroke-width="0.8" opacity="0.7"/>

  <!-- 地面光暈 -->
  <ellipse cx="50" cy="122" rx="35" ry="5" fill="#664400" opacity="0.3"/>
  <ellipse cx="50" cy="120" rx="22" ry="4" fill="#000000" opacity="0.5"/>

  <!-- 軀幹：SSR 橙色發光背心 + 戰術甲 -->
  <rect x="22" y="65" width="56" height="55" fill="#1A0C02" rx="3"/>
  <!-- 橙色發光背心（外層） -->
  <rect x="22" y="65" width="56" height="55" fill="none" stroke="#CC6600" stroke-width="2.5" rx="3"/>
  <rect x="22" y="65" width="56" height="55" fill="none" stroke="#FF9940" stroke-width="1" rx="3" opacity="0.5"/>
  <!-- 內層護板 -->
  <rect x="25" y="68" width="24" height="40" fill="#140A02" rx="2"/>
  <rect x="51" y="68" width="24" height="40" fill="#140A02" rx="2"/>
  <rect x="25" y="68" width="24" height="40" fill="none" stroke="#AA5500" stroke-width="1" rx="2"/>
  <rect x="51" y="68" width="24" height="40" fill="none" stroke="#AA5500" stroke-width="1" rx="2"/>
  <!-- 橙色橫紋 -->
  <rect x="22" y="78" width="56" height="3" fill="#CC6600" opacity="0.7"/>
  <rect x="22" y="92" width="56" height="3" fill="#CC6600" opacity="0.7"/>
  <rect x="22" y="106" width="56" height="3" fill="#CC6600" opacity="0.7"/>

  <!-- 胸甲金色徽章 -->
  <polygon points="50,70 41,76 41,87 50,93 59,87 59,76" fill="#1A0E02"/>
  <polygon points="50,70 41,76 41,87 50,93 59,87 59,76" fill="none" stroke="#CC8800" stroke-width="1.5"/>
  <ellipse cx="50" cy="81" rx="5" ry="5" fill="#AA6600"/>
  <ellipse cx="50" cy="81" rx="3" ry="3" fill="#FF9940"/>

  <!-- 肩甲（SSR 大型翼甲） -->
  <rect x="8" y="58" width="18" height="28" fill="#1A0C02" rx="3"/>
  <rect x="74" y="58" width="18" height="28" fill="#1A0C02" rx="3"/>
  <rect x="8" y="58" width="18" height="28" fill="none" stroke="#CC6600" stroke-width="2" rx="3"/>
  <rect x="74" y="58" width="18" height="28" fill="none" stroke="#CC6600" stroke-width="2" rx="3"/>
  <!-- 肩甲橙色紋 -->
  <rect x="10" y="64" width="14" height="2" fill="#CC6600" opacity="0.8"/>
  <rect x="10" y="70" width="14" height="2" fill="#CC6600" opacity="0.8"/>
  <rect x="76" y="64" width="14" height="2" fill="#CC6600" opacity="0.8"/>
  <rect x="76" y="70" width="14" height="2" fill="#CC6600" opacity="0.8"/>

  <!-- 頸部護甲 -->
  <rect x="40" y="54" width="20" height="13" fill="#1A0C02" rx="2"/>
  <rect x="40" y="54" width="20" height="13" fill="none" stroke="#CC6600" stroke-width="0.8" rx="2"/>

  <!-- 頭盔（SSR 戰術全遮面） -->
  <ellipse cx="50" cy="40" rx="23" ry="20" fill="#100802"/>
  <rect x="27" y="38" width="46" height="14" fill="#100802"/>
  <!-- 頭盔側護 -->
  <rect x="26" y="40" width="9" height="18" fill="#0E0802" rx="1"/>
  <rect x="65" y="40" width="9" height="18" fill="#0E0802" rx="1"/>
  <!-- 頭盔橙色飾邊 -->
  <rect x="27" y="22" width="46" height="5" fill="#CC6600" rx="1" opacity="0.8"/>
  <rect x="26" y="40" width="9" height="18" fill="none" stroke="#CC6600" stroke-width="1" rx="1"/>
  <rect x="65" y="40" width="9" height="18" fill="none" stroke="#CC6600" stroke-width="1" rx="1"/>
  <!-- 頭頂天線 -->
  <rect x="47" y="17" width="3" height="7" fill="#CC6600" rx="1"/>
  <ellipse cx="48" cy="16" rx="2" ry="2" fill="#FF9940"/>

  <!-- 戰術頭盔全遮面 -->
  <rect x="30" y="38" width="40" height="22" fill="#0A0602" rx="2"/>
  <rect x="30" y="38" width="40" height="22" fill="none" stroke="#CC6600" stroke-width="1.5" rx="2"/>
  <!-- 橙色發光視窗（全遮面） -->
  <rect x="32" y="40" width="36" height="14" fill="#1A0C02" rx="1"/>
  <rect x="32" y="40" width="36" height="14" fill="none" stroke="#FF8820" stroke-width="1" rx="1"/>
  <!-- 橙色發光掃描線 -->
  <rect x="34" y="42" width="32" height="2" fill="#FF8820" opacity="0.4"/>
  <rect x="34" y="46" width="32" height="2" fill="#FF8820" opacity="0.3"/>
  <rect x="34" y="50" width="32" height="2" fill="#FF8820" opacity="0.2"/>
  <!-- 橙色中心發光點 -->
  <ellipse cx="50" cy="47" rx="6" ry="4" fill="#CC6600" opacity="0.5"/>
  <ellipse cx="50" cy="47" rx="3" ry="2" fill="#FF9940" opacity="0.7"/>

  <!-- 腰帶 -->
  <rect x="22" y="111" width="56" height="8" fill="#100802"/>
  <rect x="44" y="113" width="12" height="5" fill="#CC6600" rx="1"/>

  <!-- SSR 突擊步槍（升級版） -->
  <rect x="67" y="74" width="18" height="6" fill="#1A1206" rx="1"/>
  <rect x="50" y="72" width="22" height="9" fill="#220E02" rx="1"/>
  <rect x="50" y="72" width="22" height="9" fill="none" stroke="#CC6600" stroke-width="0.8" rx="1"/>
  <rect x="36" y="74" width="16" height="7" fill="#1C1006" rx="1"/>
  <rect x="20" y="76" width="18" height="4" fill="#220E02" rx="1"/>
  <!-- 延伸槍口制退器 -->
  <rect x="14" y="75" width="8" height="6" fill="#1A1006" rx="1"/>
  <rect x="14" y="75" width="8" height="6" fill="none" stroke="#CC6600" stroke-width="0.6" rx="1"/>
  <!-- 彈匣（大容量） -->
  <rect x="60" y="81" width="8" height="18" fill="#1A1206" rx="1"/>
  <rect x="60" y="81" width="8" height="18" fill="none" stroke="#CC6600" stroke-width="0.6" rx="1"/>
  <!-- 全息瞄準器 -->
  <rect x="53" y="67" width="14" height="6" fill="#120E04" rx="1"/>
  <rect x="53" y="67" width="14" height="6" fill="none" stroke="#CC6600" stroke-width="0.8" rx="1"/>
  <rect x="55" y="68" width="4" height="4" fill="#0A0802" rx="1"/>
  <rect x="55" y="68" width="4" height="4" fill="none" stroke="#FF8820" stroke-width="0.6" rx="1"/>
  <!-- 槍身橙線 -->
  <rect x="50" y="74" width="22" height="1.5" fill="#CC6600" opacity="0.6"/>

  <!-- 左手握槍 -->
  <rect x="35" y="76" width="10" height="8" fill="#6A4020" rx="1"/>
  <!-- 右手握托 -->
  <rect x="67" y="76" width="10" height="10" fill="#6A4020" rx="1"/>
</svg>
