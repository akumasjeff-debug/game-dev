<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <!-- 背景：深藍飽和色調 -->
  <rect x="0" y="0" width="100" height="130" fill="#101828"/>
  <rect x="0" y="0" width="50" height="130" fill="#08101E" opacity="0.7"/>
  <rect x="0" y="0" width="25" height="130" fill="#050C16" opacity="0.5"/>
  <rect x="0" y="90" width="100" height="40" fill="#060E18" opacity="0.6"/>

  <!-- SR：發光邊線效果 -->
  <rect x="2" y="2" width="96" height="126" fill="none" stroke="#3A80FF" stroke-width="1" opacity="0.6"/>
  <rect x="4" y="4" width="92" height="122" fill="none" stroke="#5A9AFF" stroke-width="0.5" opacity="0.4"/>

  <!-- 地面光暈 -->
  <ellipse cx="50" cy="120" rx="32" ry="5" fill="#2060CC" opacity="0.25"/>
  <ellipse cx="50" cy="118" rx="24" ry="4" fill="#000000" opacity="0.5"/>

  <!-- 軀幹：加厚護甲（飽和藍） -->
  <rect x="26" y="68" width="48" height="50" fill="#1E3A60" rx="3"/>
  <!-- 護甲板塊分格 -->
  <rect x="26" y="80" width="48" height="3" fill="#0F2040" opacity="0.9"/>
  <rect x="26" y="95" width="48" height="3" fill="#0F2040" opacity="0.9"/>
  <rect x="49" y="68" width="3" height="50" fill="#0F2040" opacity="0.7"/>
  <!-- 護甲藍色發光邊 -->
  <rect x="26" y="68" width="48" height="50" fill="none" stroke="#3A80FF" stroke-width="1.5" rx="3"/>
  <rect x="26" y="68" width="48" height="50" fill="none" stroke="#70B0FF" stroke-width="0.5" rx="3" opacity="0.5"/>

  <!-- 胸前徽章 -->
  <polygon points="50,74 44,78 44,85 50,89 56,85 56,78" fill="#2050A0"/>
  <polygon points="50,74 44,78 44,85 50,89 56,85 56,78" fill="none" stroke="#3A80FF" stroke-width="1"/>
  <ellipse cx="50" cy="81" rx="3" ry="3" fill="#5AABFF"/>

  <!-- 肩膀加厚護甲 -->
  <rect x="14" y="64" width="16" height="22" fill="#1A3460" rx="3"/>
  <rect x="70" y="64" width="16" height="22" fill="#1A3460" rx="3"/>
  <!-- 肩甲發光線 -->
  <rect x="14" y="64" width="16" height="22" fill="none" stroke="#3A80FF" stroke-width="1" rx="3"/>
  <rect x="70" y="64" width="16" height="22" fill="none" stroke="#3A80FF" stroke-width="1" rx="3"/>
  <!-- 肩甲螺釘 -->
  <ellipse cx="22" cy="68" rx="2" ry="2" fill="#5A7AAA"/>
  <ellipse cx="78" cy="68" rx="2" ry="2" fill="#5A7AAA"/>

  <!-- 頸部 -->
  <rect x="43" y="56" width="14" height="14" fill="#7A5A40"/>
  <!-- 頸環護甲 -->
  <rect x="40" y="62" width="20" height="6" fill="#1A3460" rx="2"/>

  <!-- 頭盔（SR 升級，有護目鏡） -->
  <ellipse cx="50" cy="42" rx="23" ry="19" fill="#1C2A18"/>
  <rect x="27" y="40" width="46" height="13" fill="#1C2A18"/>
  <!-- 頭盔側護 -->
  <rect x="26" y="42" width="9" height="16" fill="#162216" rx="1"/>
  <rect x="65" y="42" width="9" height="16" fill="#162216" rx="1"/>
  <!-- 頭盔頂板 -->
  <rect x="27" y="24" width="46" height="5" fill="#283820" rx="2"/>
  <!-- 導軌 -->
  <rect x="35" y="23" width="30" height="3" fill="#3A4A28" rx="1"/>

  <!-- 面部 -->
  <rect x="33" y="44" width="34" height="14" fill="#7A5A40" rx="1"/>

  <!-- SR 護目鏡（電子式，有藍色反光） -->
  <rect x="33" y="44" width="34" height="11" fill="#0A1828" rx="2"/>
  <rect x="35" y="45" width="14" height="8" fill="#102030" rx="1"/>
  <rect x="51" y="45" width="14" height="8" fill="#102030" rx="1"/>
  <!-- 護目鏡藍色反光 -->
  <rect x="35" y="45" width="14" height="8" fill="none" stroke="#3A80FF" stroke-width="0.8" rx="1"/>
  <rect x="51" y="45" width="14" height="8" fill="none" stroke="#3A80FF" stroke-width="0.8" rx="1"/>
  <rect x="37" y="46" width="4" height="3" fill="#3A80FF" opacity="0.4"/>
  <rect x="53" y="46" width="4" height="3" fill="#3A80FF" opacity="0.4"/>
  <!-- 口罩 -->
  <rect x="33" y="55" width="34" height="8" fill="#2A2A2A"/>
  <rect x="38" y="57" width="24" height="4" fill="#3A3A3A"/>

  <!-- 盾牌（SR 加厚藍色發光） -->
  <rect x="8" y="50" width="18" height="62" fill="#1A2870" rx="3"/>
  <rect x="8" y="50" width="18" height="62" fill="none" stroke="#3A80FF" stroke-width="2" rx="3"/>
  <rect x="8" y="50" width="18" height="62" fill="none" stroke="#80C0FF" stroke-width="0.8" rx="3" opacity="0.4"/>
  <!-- 盾牌中線 -->
  <rect x="16" y="52" width="2" height="58" fill="#2A4090" opacity="0.6"/>
  <!-- 盾牌徽紋 -->
  <polygon points="17,65 11,75 17,85 23,75" fill="#2050C0"/>
  <polygon points="17,65 11,75 17,85 23,75" fill="none" stroke="#5AABFF" stroke-width="1"/>

  <!-- 右手 -->
  <rect x="72" y="78" width="14" height="12" fill="#5A4030" rx="2"/>
</svg>
