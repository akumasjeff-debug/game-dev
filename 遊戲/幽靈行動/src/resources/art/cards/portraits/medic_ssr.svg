<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <defs>
    <linearGradient id="bg_ssr_m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1520"/>
      <stop offset="50%" stop-color="#1A2A40"/>
      <stop offset="100%" stop-color="#0A1020"/>
    </linearGradient>
    <radialGradient id="halo_m" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 背景 -->
  <rect width="100" height="130" fill="url(#bg_ssr_m)"/>
  <!-- 光暈效果 -->
  <ellipse cx="50" cy="55" rx="48" ry="55" fill="url(#halo_m)"/>
  <!-- 金色框線 -->
  <rect x="2" y="2" width="96" height="126" rx="3" fill="none" stroke="#DDAA00" stroke-width="2" opacity="0.9"/>
  <rect x="4" y="4" width="92" height="122" rx="2" fill="none" stroke="#FFDD44" stroke-width="0.5" opacity="0.5"/>

  <!-- 肩膀白金護甲 -->
  <rect x="8" y="78" width="84" height="52" rx="5" fill="#C8D8E8"/>
  <!-- 肩甲金色零件 -->
  <polygon points="8,78 26,70 30,90 8,98" fill="#CCAA00"/>
  <polygon points="92,78 74,70 70,90 92,98" fill="#CCAA00"/>
  <!-- 護甲中央板 -->
  <rect x="20" y="68" width="60" height="62" rx="4" fill="#E0EEF8"/>
  <!-- 金色胸甲細節 -->
  <rect x="35" y="74" width="30" height="4" rx="1" fill="#DDAA00"/>
  <rect x="38" y="80" width="24" height="2" rx="1" fill="#DDBB22"/>
  <!-- 醫療科技紅十字（金邊） -->
  <rect x="22" y="72" width="20" height="20" rx="2" fill="#F0F8FF" stroke="#DDAA00" stroke-width="1.5"/>
  <rect x="30" y="74" width="4" height="16" fill="#DD2200"/>
  <rect x="23" y="80" width="18" height="4" fill="#DD2200"/>
  <!-- 點滴管路 左側 -->
  <rect x="10" y="65" width="4" height="30" rx="2" fill="#AACCEE" opacity="0.8"/>
  <ellipse cx="12" cy="63" rx="5" ry="7" fill="#CCDDFF" opacity="0.9"/>
  <!-- 點滴管路 右側 -->
  <rect x="86" y="65" width="4" height="30" rx="2" fill="#AACCEE" opacity="0.8"/>
  <ellipse cx="88" cy="63" rx="5" ry="7" fill="#CCDDFF" opacity="0.9"/>
  <!-- 點滴管路 中間 -->
  <rect x="48" y="58" width="4" height="15" rx="2" fill="#88BBDD" opacity="0.7"/>

  <!-- 頸部 -->
  <rect x="42" y="58" width="16" height="12" rx="3" fill="#C8A882"/>
  <!-- 頭部 -->
  <ellipse cx="50" cy="44" rx="22" ry="24" fill="#C8A882"/>
  <ellipse cx="28" cy="46" rx="4" ry="6" fill="#C0A07A"/>
  <ellipse cx="72" cy="46" rx="4" ry="6" fill="#C0A07A"/>
  <!-- 醫療科技面罩 頭盔 -->
  <ellipse cx="50" cy="32" rx="22" ry="18" fill="#D8EAF8"/>
  <rect x="28" y="32" width="44" height="14" fill="#D8EAF8"/>
  <!-- 面罩 透明科技感 -->
  <rect x="28" y="42" width="44" height="18" rx="4" fill="#0A2A44" opacity="0.85"/>
  <rect x="30" y="43" width="40" height="15" rx="3" fill="#1144AA" opacity="0.4"/>
  <!-- 面罩 HUD 線條 -->
  <rect x="32" y="46" width="36" height="1" fill="#44CCFF" opacity="0.7"/>
  <rect x="32" y="50" width="20" height="1" fill="#44CCFF" opacity="0.5"/>
  <rect x="58" y="50" width="10" height="1" fill="#44CCFF" opacity="0.5"/>
  <!-- 面罩 眼部 -->
  <ellipse cx="41" cy="50" rx="7" ry="5" fill="#22AAFF" opacity="0.7"/>
  <ellipse cx="59" cy="50" rx="7" ry="5" fill="#22AAFF" opacity="0.7"/>
  <!-- 頭盔金色零件 -->
  <rect x="44" y="26" width="12" height="4" rx="1" fill="#DDAA00"/>
  <!-- 面罩金邊 -->
  <rect x="28" y="42" width="44" height="18" rx="4" fill="none" stroke="#DDAA00" stroke-width="1" opacity="0.8"/>
</svg>
