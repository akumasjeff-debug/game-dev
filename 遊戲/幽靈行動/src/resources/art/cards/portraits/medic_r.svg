<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <!-- 背景：中性灰藍 -->
  <rect width="100" height="130" fill="#2A3040"/>
  <rect width="100" height="130" fill="#3A4555" opacity="0.5"/>
  <rect x="10" y="60" width="80" height="70" fill="#445060" opacity="0.4"/>

  <!-- 肩膀基座 -->
  <rect x="15" y="88" width="70" height="42" rx="4" fill="#D0D8E0"/>
  <!-- 白色醫療背心 主體 -->
  <rect x="22" y="72" width="56" height="58" rx="3" fill="#E8EEF4"/>
  <!-- 背心領口 -->
  <rect x="38" y="72" width="24" height="10" rx="2" fill="#CDD5DF"/>
  <!-- 紅十字臂章 左肩 -->
  <rect x="18" y="78" width="16" height="16" rx="2" fill="#FFFFFF" stroke="#CC0000" stroke-width="1"/>
  <rect x="25" y="80" width="2" height="12" fill="#CC2200"/>
  <rect x="20" y="85" width="12" height="2" fill="#CC2200"/>
  <!-- 急救包（右側） -->
  <rect x="68" y="82" width="14" height="18" rx="2" fill="#CC4400"/>
  <rect x="74" y="84" width="2" height="14" fill="#FF6633" opacity="0.7"/>
  <rect x="69" y="89" width="12" height="2" fill="#FF6633" opacity="0.7"/>
  <!-- 急救包扣環 -->
  <rect x="70" y="80" width="10" height="3" rx="1" fill="#AA3300"/>

  <!-- 頸部 -->
  <rect x="42" y="62" width="16" height="12" rx="3" fill="#C8A882"/>
  <!-- 頭部 -->
  <ellipse cx="50" cy="48" rx="22" ry="24" fill="#C8A882"/>
  <!-- 耳朵 -->
  <ellipse cx="28" cy="50" rx="4" ry="6" fill="#C0A07A"/>
  <ellipse cx="72" cy="50" rx="4" ry="6" fill="#C0A07A"/>
  <!-- 頭盔（白色基礎型） -->
  <ellipse cx="50" cy="38" rx="22" ry="16" fill="#E0E8F0"/>
  <rect x="28" y="38" width="44" height="12" fill="#E0E8F0"/>
  <!-- 頭盔紅十字標誌 -->
  <rect x="47" y="32" width="2" height="10" fill="#CC2200" opacity="0.9"/>
  <rect x="43" y="36" width="10" height="2" fill="#CC2200" opacity="0.9"/>
  <!-- 眼睛 -->
  <rect x="36" y="50" width="10" height="6" rx="2" fill="#FFFFFF"/>
  <rect x="54" y="50" width="10" height="6" rx="2" fill="#FFFFFF"/>
  <ellipse cx="41" cy="53" rx="3" ry="3" fill="#3A3A4A"/>
  <ellipse cx="59" cy="53" rx="3" ry="3" fill="#3A3A4A"/>
  <!-- 口罩（白色） -->
  <rect x="36" y="58" width="28" height="10" rx="3" fill="#E0E8F4"/>
</svg>
