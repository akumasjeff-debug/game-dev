<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <defs>
    <linearGradient id="bg_sr_s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#181C10"/>
      <stop offset="100%" stop-color="#282C18"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="100" height="130" fill="url(#bg_sr_s)"/>
  <!-- SR 發光邊線（暗綠色） -->
  <rect x="2" y="2" width="96" height="126" rx="3" fill="none" stroke="#44AA44" stroke-width="1.5" opacity="0.7"/>

  <!-- 精密狙擊護具 下身 -->
  <rect x="14" y="80" width="72" height="50" rx="4" fill="#3A4030"/>
  <!-- 護具紋路 -->
  <rect x="16" y="88" width="68" height="3" fill="#2A3020" opacity="0.7"/>
  <rect x="16" y="96" width="68" height="3" fill="#2A3020" opacity="0.7"/>
  <!-- 護肩（左） -->
  <polygon points="14,80 28,72 32,90 14,98" fill="#4A5040"/>
  <rect x="14" y="84" width="18" height="3" fill="#3A4430" opacity="0.8"/>
  <!-- 護肩（右） -->
  <polygon points="86,80 72,72 68,90 86,98" fill="#4A5040"/>
  <rect x="68" y="84" width="18" height="3" fill="#3A4430" opacity="0.8"/>
  <!-- 胸甲 -->
  <rect x="22" y="68" width="56" height="22" rx="3" fill="#4A5040"/>
  <!-- 裝備帶 -->
  <rect x="35" y="68" width="5" height="22" fill="#2A3020"/>
  <rect x="60" y="68" width="5" height="22" fill="#2A3020"/>
  <!-- 精密瞄準快扣 -->
  <rect x="43" y="70" width="14" height="8" rx="2" fill="#1A2018"/>
  <rect x="45" y="72" width="10" height="4" rx="1" fill="#3A4430"/>

  <!-- 頸部 -->
  <rect x="42" y="58" width="16" height="12" rx="3" fill="#B89060"/>
  <!-- 頭部 -->
  <ellipse cx="50" cy="44" rx="22" ry="24" fill="#B89060"/>
  <ellipse cx="28" cy="46" rx="4" ry="6" fill="#A88050"/>
  <ellipse cx="72" cy="46" rx="4" ry="6" fill="#A88050"/>
  <!-- 精密頭盔 -->
  <ellipse cx="50" cy="32" rx="22" ry="18" fill="#3A4030"/>
  <rect x="28" y="32" width="44" height="14" fill="#3A4030"/>
  <!-- 熱感應護目鏡（橘紅色） -->
  <rect x="28" y="42" width="44" height="14" rx="5" fill="#1A1208" opacity="0.95"/>
  <rect x="29" y="43" width="20" height="12" rx="4" fill="#AA4400" opacity="0.8"/>
  <rect x="51" y="43" width="20" height="12" rx="4" fill="#AA4400" opacity="0.8"/>
  <!-- 熱感應顯示 -->
  <rect x="30" y="44" width="18" height="10" rx="3" fill="#FF6600" opacity="0.4"/>
  <rect x="52" y="44" width="18" height="10" rx="3" fill="#FF6600" opacity="0.4"/>
  <!-- 熱感目標 點 -->
  <ellipse cx="39" cy="49" rx="3" ry="3" fill="#FFAA00" opacity="0.9"/>
  <ellipse cx="61" cy="49" rx="3" ry="3" fill="#FFAA00" opacity="0.9"/>
  <!-- 護目鏡橋 -->
  <rect x="48" y="45" width="4" height="8" fill="#2A3020"/>
  <!-- 護目鏡 SR 發光邊 -->
  <rect x="28" y="42" width="44" height="14" rx="5" fill="none" stroke="#44AA44" stroke-width="1" opacity="0.8"/>
  <!-- 頭盔側面多鏡頭（SR特徵但移至狙擊款用側視感） -->
  <rect x="24" y="38" width="6" height="6" rx="1" fill="#2A3020"/>
  <ellipse cx="27" cy="41" rx="2" ry="2" fill="#44AA44" opacity="0.7"/>
  <!-- 臉部迷彩 -->
  <ellipse cx="38" cy="56" rx="5" ry="2" fill="#2A3020" opacity="0.5"/>
</svg>
