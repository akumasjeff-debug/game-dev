<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <!-- 背景：QR 深黑戲劇背景 -->
  <rect x="0" y="0" width="100" height="130" fill="#060402"/>
  <rect x="0" y="0" width="50" height="130" fill="#040302" opacity="0.8"/>
  <!-- 紅光從右下照射 -->
  <rect x="40" y="75" width="60" height="55" fill="#3A0800" opacity="0.3"/>
  <rect x="60" y="90" width="40" height="40" fill="#5A1000" opacity="0.2"/>
  <!-- 外骨骼電光藍 -->
  <rect x="0" y="0" width="50" height="80" fill="#000814" opacity="0.3"/>

  <!-- 能量光暈 -->
  <ellipse cx="50" cy="65" rx="46" ry="58" fill="#040200" opacity="0.5"/>
  <ellipse cx="50" cy="65" rx="32" ry="44" fill="#0A0400" opacity="0.3"/>

  <!-- 紅金外框 -->
  <rect x="0" y="0" width="100" height="130" fill="none" stroke="#CC2200" stroke-width="2"/>
  <rect x="2" y="2" width="96" height="126" fill="none" stroke="#AA1000" stroke-width="1" opacity="0.7"/>
  <!-- 四角裝飾 -->
  <polygon points="0,0 14,0 0,14" fill="#AA1800"/>
  <polygon points="100,0 86,0 100,14" fill="#AA1800"/>
  <polygon points="0,130 14,130 0,116" fill="#AA1800"/>
  <polygon points="100,130 86,130 100,116" fill="#AA1800"/>

  <!-- 地面能量漣漪 -->
  <ellipse cx="50" cy="124" rx="38" ry="5" fill="#200600" opacity="0.5"/>
  <ellipse cx="50" cy="122" rx="22" ry="3" fill="#AA2200" opacity="0.3"/>

  <!-- 軀幹：黑色戰術外骨骼 -->
  <rect x="20" y="63" width="60" height="57" fill="#060402" rx="3"/>
  <!-- 外骨骼機械結構線 -->
  <rect x="20" y="63" width="60" height="57" fill="none" stroke="#CC2200" stroke-width="2" rx="3"/>
  <rect x="20" y="63" width="60" height="57" fill="none" stroke="#FF4400" stroke-width="0.8" rx="3" opacity="0.4"/>
  <!-- 外骨骼橫骨架 -->
  <rect x="20" y="76" width="60" height="3" fill="#1A0800" opacity="0.9"/>
  <rect x="20" y="76" width="60" height="1" fill="#CC2200" opacity="0.5"/>
  <rect x="20" y="92" width="60" height="3" fill="#1A0800" opacity="0.9"/>
  <rect x="20" y="92" width="60" height="1" fill="#CC2200" opacity="0.5"/>
  <rect x="20" y="108" width="60" height="3" fill="#1A0800" opacity="0.9"/>
  <rect x="20" y="108" width="60" height="1" fill="#CC2200" opacity="0.5"/>
  <!-- 外骨骼縱骨架 -->
  <rect x="35" y="63" width="3" height="57" fill="#1A0800" opacity="0.7"/>
  <rect x="35" y="63" width="1" fill="#CC2200" opacity="0.4" height="57"/>
  <rect x="62" y="63" width="3" height="57" fill="#1A0800" opacity="0.7"/>
  <rect x="62" y="63" width="1" fill="#CC2200" opacity="0.4" height="57"/>

  <!-- 胸前紅色能量核心 -->
  <rect x="38" y="68" width="24" height="22" fill="#0A0402" rx="2"/>
  <rect x="38" y="68" width="24" height="22" fill="none" stroke="#CC2200" stroke-width="1.5" rx="2"/>
  <ellipse cx="50" cy="79" rx="8" ry="7" fill="#200800"/>
  <ellipse cx="50" cy="79" rx="8" ry="7" fill="none" stroke="#CC2200" stroke-width="1"/>
  <ellipse cx="50" cy="79" rx="5" ry="5" fill="#440800"/>
  <ellipse cx="50" cy="79" rx="3" ry="3" fill="#CC2200" opacity="0.8"/>
  <ellipse cx="50" cy="79" rx="1.5" ry="1.5" fill="#FF6040"/>

  <!-- 肩甲（外骨骼翼甲） -->
  <rect x="6" y="55" width="18" height="32" fill="#080402" rx="3"/>
  <rect x="76" y="55" width="18" height="32" fill="#080402" rx="3"/>
  <rect x="6" y="55" width="18" height="32" fill="none" stroke="#CC2200" stroke-width="2" rx="3"/>
  <rect x="76" y="55" width="18" height="32" fill="none" stroke="#CC2200" stroke-width="2" rx="3"/>
  <!-- 外骨骼肩甲格線 -->
  <rect x="8" y="62" width="14" height="2" fill="#CC2200" opacity="0.6"/>
  <rect x="8" y="68" width="14" height="2" fill="#CC2200" opacity="0.6"/>
  <rect x="8" y="74" width="14" height="2" fill="#CC2200" opacity="0.6"/>
  <rect x="78" y="62" width="14" height="2" fill="#CC2200" opacity="0.6"/>
  <rect x="78" y="68" width="14" height="2" fill="#CC2200" opacity="0.6"/>
  <rect x="78" y="74" width="14" height="2" fill="#CC2200" opacity="0.6"/>

  <!-- 頸部外骨骼環 -->
  <rect x="39" y="52" width="22" height="13" fill="#080402" rx="2"/>
  <rect x="39" y="52" width="22" height="13" fill="none" stroke="#CC2200" stroke-width="1" rx="2"/>
  <rect x="39" y="56" width="22" height="2" fill="#CC2200" opacity="0.6"/>

  <!-- 頭盔（QR 黑色外骨骼頭盔） -->
  <ellipse cx="50" cy="38" rx="24" ry="20" fill="#040202"/>
  <rect x="26" y="36" width="48" height="16" fill="#040202"/>
  <!-- 頭盔側護 -->
  <rect x="25" y="38" width="9" height="18" fill="#040202" rx="1"/>
  <rect x="66" y="38" width="9" height="18" fill="#040202" rx="1"/>
  <!-- 頭盔外骨骼線 -->
  <rect x="26" y="20" width="48" height="4" fill="#CC2200" rx="1" opacity="0.8"/>
  <rect x="26" y="20" width="48" height="4" fill="none" stroke="#FF4400" stroke-width="0.5" rx="1" opacity="0.5"/>
  <!-- 頭頂能量天線 -->
  <rect x="44" y="14" width="4" height="8" fill="#CC2200" rx="1"/>
  <rect x="52" y="16" width="4" height="6" fill="#CC2200" rx="1"/>
  <ellipse cx="46" cy="13" rx="2" ry="2" fill="#FF4400"/>
  <ellipse cx="54" cy="15" rx="2" ry="2" fill="#FF4400"/>

  <!-- 面部（全遮面黑盔） -->
  <rect x="30" y="36" width="40" height="22" fill="#030202" rx="2"/>
  <rect x="30" y="36" width="40" height="22" fill="none" stroke="#CC2200" stroke-width="1.5" rx="2"/>

  <!-- 紅光瞄準線照射臉部 -->
  <!-- 瞄準點（來自右側） -->
  <rect x="30" y="44" width="40" height="2" fill="#FF0000" opacity="0.15"/>
  <!-- 主瞄準光線 -->
  <rect x="62" y="44" width="38" height="3" fill="#FF0000" opacity="0.4"/>
  <rect x="62" y="44" width="38" height="3" fill="none" stroke="#FF4400" stroke-width="0.5"/>
  <!-- 瞄準點光暈 -->
  <ellipse cx="44" cy="46" rx="4" ry="3" fill="#FF2200" opacity="0.35"/>
  <ellipse cx="44" cy="46" rx="2" ry="1.5" fill="#FF4400" opacity="0.5"/>
  <ellipse cx="44" cy="46" rx="0.8" ry="0.8" fill="#FF0000" opacity="0.9"/>
  <!-- 護目鏡（紅色單眼掃描） -->
  <rect x="32" y="38" width="36" height="14" fill="#080404" rx="1"/>
  <rect x="34" y="39" width="15" height="9" fill="#0C0404" rx="1"/>
  <rect x="51" y="39" width="15" height="9" fill="#0C0404" rx="1"/>
  <!-- 左眼（黑色，遮蔽） -->
  <rect x="34" y="39" width="15" height="9" fill="none" stroke="#440808" stroke-width="0.8" rx="1"/>
  <!-- 右眼（紅色掃描） -->
  <rect x="51" y="39" width="15" height="9" fill="none" stroke="#CC2200" stroke-width="1" rx="1"/>
  <rect x="53" y="40" width="6" height="5" fill="#440800" opacity="0.7"/>
  <rect x="53" y="41" width="6" height="2" fill="#CC2200" opacity="0.5"/>
  <ellipse cx="58" cy="43" rx="2" ry="2" fill="#FF2200" opacity="0.8"/>
  <!-- 下顎 -->
  <rect x="30" y="52" width="40" height="8" fill="#060404" rx="1"/>
  <rect x="30" y="52" width="40" height="8" fill="none" stroke="#CC2200" stroke-width="0.8" rx="1"/>

  <!-- 武器：外骨骼整合武器系統（收折，從胸側延伸） -->
  <!-- 武器臂 -->
  <rect x="70" y="68" width="22" height="8" fill="#0A0402" rx="1"/>
  <rect x="70" y="68" width="22" height="8" fill="none" stroke="#CC2200" stroke-width="1" rx="1"/>
  <!-- 槍管 -->
  <rect x="70" y="70" width="22" height="4" fill="#CC2200" opacity="0.4"/>
  <rect x="85" y="69" width="7" height="6" fill="#0A0402" rx="1"/>
  <!-- 右手（外骨骼拳套） -->
  <rect x="74" y="76" width="16" height="14" fill="#060402" rx="2"/>
  <rect x="74" y="76" width="16" height="14" fill="none" stroke="#CC2200" stroke-width="1.2" rx="2"/>
  <rect x="75" y="78" width="14" height="3" fill="#CC2200" opacity="0.5"/>
  <rect x="75" y="84" width="14" height="3" fill="#CC2200" opacity="0.5"/>
</svg>
