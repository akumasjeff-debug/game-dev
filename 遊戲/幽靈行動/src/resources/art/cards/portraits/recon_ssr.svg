<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <defs>
    <linearGradient id="bg_ssr_r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060A14"/>
      <stop offset="50%" stop-color="#0C1422"/>
      <stop offset="100%" stop-color="#040810"/>
    </linearGradient>
    <radialGradient id="halo_r" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#00AACC" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00AACC" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 背景 -->
  <rect width="100" height="130" fill="url(#bg_ssr_r)"/>
  <!-- 光暈 -->
  <ellipse cx="50" cy="55" rx="48" ry="55" fill="url(#halo_r)"/>
  <!-- SSR 金色框線 -->
  <rect x="2" y="2" width="96" height="126" rx="3" fill="none" stroke="#DDAA00" stroke-width="2" opacity="0.9"/>
  <rect x="4" y="4" width="92" height="122" rx="2" fill="none" stroke="#44DDFF" stroke-width="0.5" opacity="0.5"/>

  <!-- 電子隱形裝下身 -->
  <rect x="10" y="78" width="80" height="52" rx="4" fill="#0A1020" opacity="0.9"/>
  <!-- 隱形裝電路紋路 -->
  <rect x="12" y="84" width="30" height="1" fill="#00AACC" opacity="0.6"/>
  <rect x="42" y="84" width="2" height="8" fill="#00AACC" opacity="0.6"/>
  <rect x="42" y="92" width="30" height="1" fill="#00AACC" opacity="0.6"/>
  <rect x="58" y="84" width="1" height="8" fill="#00AACC" opacity="0.4"/>
  <rect x="14" y="96" width="20" height="1" fill="#00AACC" opacity="0.5"/>
  <rect x="66" y="96" width="20" height="1" fill="#00AACC" opacity="0.5"/>
  <rect x="34" y="96" width="1" height="14" fill="#00AACC" opacity="0.4"/>
  <rect x="65" y="96" width="1" height="14" fill="#00AACC" opacity="0.4"/>
  <!-- 電路節點 -->
  <ellipse cx="42" cy="84" rx="2" ry="2" fill="#00DDFF" opacity="0.9"/>
  <ellipse cx="42" cy="92" rx="2" ry="2" fill="#00DDFF" opacity="0.9"/>
  <ellipse cx="58" cy="84" rx="1.5" ry="1.5" fill="#00DDFF" opacity="0.7"/>
  <ellipse cx="72" cy="92" rx="1.5" ry="1.5" fill="#00DDFF" opacity="0.7"/>
  <!-- 肩甲（電路紋路） -->
  <polygon points="10,78 28,66 32,88 10,96" fill="#0C1420" opacity="0.95"/>
  <rect x="12" y="76" width="18" height="1" fill="#00AACC" opacity="0.7"/>
  <rect x="12" y="80" width="14" height="1" fill="#00AACC" opacity="0.5"/>
  <rect x="18" y="72" width="1" height="12" fill="#00AACC" opacity="0.5"/>
  <polygon points="90,78 72,66 68,88 90,96" fill="#0C1420" opacity="0.95"/>
  <rect x="70" y="76" width="18" height="1" fill="#00AACC" opacity="0.7"/>
  <!-- 胸甲（主電路板） -->
  <rect x="18" y="64" width="64" height="26" rx="3" fill="#0A1018"/>
  <!-- 胸前電路主板 -->
  <rect x="20" y="66" width="60" height="2" fill="#00AACC" opacity="0.5"/>
  <rect x="20" y="86" width="60" height="1" fill="#00AACC" opacity="0.4"/>
  <rect x="30" y="66" width="1" height="20" fill="#00AACC" opacity="0.4"/>
  <rect x="50" y="66" width="1" height="20" fill="#00AACC" opacity="0.5"/>
  <rect x="70" y="66" width="1" height="20" fill="#00AACC" opacity="0.4"/>
  <!-- 電路晶片（中央） -->
  <rect x="40" y="70" width="20" height="12" rx="2" fill="#0C1824"/>
  <rect x="41" y="71" width="18" height="10" rx="1" fill="#00AACC" opacity="0.2"/>
  <ellipse cx="50" cy="76" rx="4" ry="3" fill="#00DDFF" opacity="0.8"/>
  <!-- 金色節點 -->
  <ellipse cx="30" cy="66" rx="1.5" ry="1.5" fill="#DDAA00" opacity="0.8"/>
  <ellipse cx="50" cy="66" rx="1.5" ry="1.5" fill="#DDAA00" opacity="0.8"/>
  <ellipse cx="70" cy="66" rx="1.5" ry="1.5" fill="#DDAA00" opacity="0.8"/>

  <!-- 頸部 -->
  <rect x="42" y="54" width="16" height="12" rx="3" fill="#A08060"/>
  <!-- 頭部 -->
  <ellipse cx="50" cy="40" rx="22" ry="24" fill="#A08060"/>
  <ellipse cx="28" cy="42" rx="4" ry="6" fill="#987850"/>
  <ellipse cx="72" cy="42" rx="4" ry="6" fill="#987850"/>
  <!-- 電子隱形頭盔 -->
  <ellipse cx="50" cy="28" rx="22" ry="18" fill="#0A1018"/>
  <rect x="28" y="28" width="44" height="14" fill="#0A1018"/>
  <!-- 頭盔電路紋路 -->
  <rect x="30" y="30" width="40" height="1" fill="#00AACC" opacity="0.6"/>
  <rect x="30" y="34" width="20" height="1" fill="#00AACC" opacity="0.4"/>
  <rect x="56" y="34" width="14" height="1" fill="#00AACC" opacity="0.4"/>
  <rect x="40" y="28" width="1" height="14" fill="#00AACC" opacity="0.4"/>
  <rect x="60" y="28" width="1" height="14" fill="#00AACC" opacity="0.4"/>
  <!-- 頭盔護目鏡（全息顯示） -->
  <rect x="30" y="39" width="40" height="12" rx="4" fill="#040C14" opacity="0.95"/>
  <!-- 全息投影界面 -->
  <rect x="31" y="40" width="38" height="10" rx="3" fill="#00AACC" opacity="0.12"/>
  <rect x="32" y="41" width="15" height="2" fill="#00DDFF" opacity="0.6"/>
  <rect x="32" y="45" width="10" height="1" fill="#00DDFF" opacity="0.4"/>
  <rect x="53" y="41" width="15" height="2" fill="#00DDFF" opacity="0.6"/>
  <rect x="58" y="45" width="8" height="1" fill="#00DDFF" opacity="0.4"/>
  <!-- 眼部青色掃描線 -->
  <ellipse cx="39" cy="45" rx="6" ry="4" fill="#00AACC" opacity="0.7"/>
  <ellipse cx="61" cy="45" rx="6" ry="4" fill="#00AACC" opacity="0.7"/>
  <ellipse cx="39" cy="45" rx="3" ry="2" fill="#AAEEFF" opacity="0.9"/>
  <ellipse cx="61" cy="45" rx="3" ry="2" fill="#AAEEFF" opacity="0.9"/>
  <!-- 護目鏡框 -->
  <rect x="30" y="39" width="40" height="12" rx="4" fill="none" stroke="#00AACC" stroke-width="1" opacity="0.9"/>
  <!-- 頭盔金色頂部 -->
  <rect x="44" y="20" width="12" height="8" rx="2" fill="#0A1018"/>
  <rect x="46" y="18" width="8" height="4" rx="1" fill="#DDAA00"/>
  <!-- 頂部電路節點 -->
  <ellipse cx="50" cy="22" rx="2" ry="2" fill="#00DDFF" opacity="0.8"/>
</svg>
