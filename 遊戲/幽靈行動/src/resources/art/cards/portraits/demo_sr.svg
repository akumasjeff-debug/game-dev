<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <!-- 背景：深綠色調 SR -->
  <rect x="0" y="0" width="100" height="130" fill="#0C1008"/>
  <rect x="0" y="0" width="50" height="130" fill="#060C04" opacity="0.7"/>
  <rect x="0" y="0" width="25" height="130" fill="#040804" opacity="0.5"/>

  <!-- SR 綠色發光邊線 -->
  <rect x="2" y="2" width="96" height="126" fill="none" stroke="#22AA00" stroke-width="1" opacity="0.7"/>
  <rect x="4" y="4" width="92" height="122" fill="none" stroke="#44CC10" stroke-width="0.5" opacity="0.4"/>

  <!-- 地面光暈 -->
  <ellipse cx="50" cy="120" rx="32" ry="5" fill="#1A6600" opacity="0.2"/>
  <ellipse cx="50" cy="118" rx="24" ry="4" fill="#000000" opacity="0.5"/>

  <!-- 軀幹：厚重防爆衣（SR 升級版） -->
  <rect x="24" y="67" width="52" height="53" fill="#1A2210" rx="3"/>
  <!-- 防爆衣厚度層次 -->
  <rect x="24" y="67" width="52" height="53" fill="none" stroke="#22AA00" stroke-width="1.5" rx="3"/>
  <rect x="24" y="67" width="52" height="53" fill="none" stroke="#44CC10" stroke-width="0.5" rx="3" opacity="0.5"/>
  <!-- 防爆板塊 -->
  <rect x="27" y="70" width="22" height="30" fill="#142010" rx="2"/>
  <rect x="51" y="70" width="22" height="30" fill="#142010" rx="2"/>
  <rect x="27" y="70" width="22" height="30" fill="none" stroke="#1A8800" stroke-width="1" rx="2"/>
  <rect x="51" y="70" width="22" height="30" fill="none" stroke="#1A8800" stroke-width="1" rx="2"/>
  <!-- 防爆橫條 -->
  <rect x="24" y="82" width="52" height="3" fill="#22AA00" opacity="0.5"/>
  <rect x="24" y="96" width="52" height="3" fill="#22AA00" opacity="0.5"/>

  <!-- 胸甲綠色徽章 -->
  <polygon points="50,72 43,78 43,86 50,92 57,86 57,78" fill="#10200C"/>
  <polygon points="50,72 43,78 43,86 50,92 57,86 57,78" fill="none" stroke="#22AA00" stroke-width="1"/>
  <ellipse cx="50" cy="82" rx="3" ry="3" fill="#1A8800"/>
  <ellipse cx="50" cy="82" rx="1.5" ry="1.5" fill="#44CC10"/>

  <!-- 腰帶（SR 升級工具帶） -->
  <rect x="24" y="110" width="52" height="9" fill="#101808"/>
  <rect x="24" y="110" width="52" height="9" fill="none" stroke="#22AA00" stroke-width="0.8"/>
  <rect x="29" y="112" width="8" height="5" fill="#1A2210" rx="1"/>
  <rect x="44" y="112" width="10" height="5" fill="#22AA00" rx="1" opacity="0.6"/>
  <rect x="61" y="112" width="8" height="5" fill="#1A2210" rx="1"/>

  <!-- 炸藥包組（左肩，更多） -->
  <rect x="12" y="68" width="16" height="28" fill="#302810" rx="2"/>
  <rect x="12" y="68" width="16" height="28" fill="none" stroke="#22AA00" stroke-width="1" rx="2"/>
  <rect x="12" y="74" width="16" height="2" fill="#1A8800" opacity="0.6"/>
  <rect x="12" y="80" width="16" height="2" fill="#1A8800" opacity="0.6"/>
  <rect x="12" y="86" width="16" height="2" fill="#1A8800" opacity="0.6"/>
  <!-- 導線（多束） -->
  <rect x="19" y="66" width="2" height="5" fill="#CC2200"/>
  <rect x="21" y="65" width="2" height="5" fill="#CC4400"/>
  <rect x="25" y="65" width="2" height="5" fill="#CC2200"/>

  <!-- 肩甲（厚重型） -->
  <rect x="12" y="63" width="16" height="24" fill="#162012" rx="3"/>
  <rect x="72" y="63" width="16" height="24" fill="#162012" rx="3"/>
  <rect x="12" y="63" width="16" height="24" fill="none" stroke="#22AA00" stroke-width="1" rx="3"/>
  <rect x="72" y="63" width="16" height="24" fill="none" stroke="#22AA00" stroke-width="1" rx="3"/>
  <rect x="14" y="70" width="12" height="2" fill="#22AA00" opacity="0.6"/>
  <rect x="74" y="70" width="12" height="2" fill="#22AA00" opacity="0.6"/>

  <!-- 頸部護甲 -->
  <rect x="41" y="56" width="18" height="13" fill="#162012" rx="2"/>
  <rect x="41" y="56" width="18" height="13" fill="none" stroke="#22AA00" stroke-width="0.8" rx="2"/>

  <!-- 頭盔（SR 厚重防爆型） -->
  <ellipse cx="50" cy="41" rx="23" ry="19" fill="#1A2210"/>
  <rect x="27" y="39" width="46" height="14" fill="#1A2210"/>
  <!-- 頭盔側護（加厚） -->
  <rect x="26" y="41" width="9" height="18" fill="#141C0E" rx="1"/>
  <rect x="65" y="41" width="9" height="18" fill="#141C0E" rx="1"/>
  <rect x="26" y="41" width="9" height="18" fill="none" stroke="#22AA00" stroke-width="0.8" rx="1"/>
  <rect x="65" y="41" width="9" height="18" fill="none" stroke="#22AA00" stroke-width="0.8" rx="1"/>
  <!-- 頭盔頂邊綠色線 -->
  <rect x="27" y="24" width="46" height="4" fill="#22AA00" rx="1" opacity="0.7"/>
  <!-- 頭盔導軌 -->
  <rect x="34" y="23" width="32" height="3" fill="#1E2A14" rx="1"/>
  <!-- 防爆帽舌（SR 關閉狀態） -->
  <rect x="27" y="52" width="46" height="8" fill="#141C0E" rx="2"/>
  <rect x="27" y="52" width="46" height="8" fill="none" stroke="#22AA00" stroke-width="0.8" rx="2"/>

  <!-- 面部（SR 升級護目鏡） -->
  <rect x="32" y="41" width="36" height="14" fill="#0E1408" rx="1"/>
  <!-- 防爆護目鏡（SR 電子式） -->
  <rect x="32" y="41" width="36" height="14" fill="#0A1006" rx="2"/>
  <rect x="34" y="42" width="14" height="9" fill="#102010" rx="1"/>
  <rect x="52" y="42" width="14" height="9" fill="#102010" rx="1"/>
  <rect x="34" y="42" width="14" height="9" fill="none" stroke="#22AA00" stroke-width="0.8" rx="1"/>
  <rect x="52" y="42" width="14" height="9" fill="none" stroke="#22AA00" stroke-width="0.8" rx="1"/>
  <!-- 綠色反光 -->
  <rect x="36" y="43" width="5" height="3" fill="#22AA00" opacity="0.35"/>
  <rect x="54" y="43" width="5" height="3" fill="#22AA00" opacity="0.35"/>
  <!-- 數據顯示（HUD） -->
  <rect x="36" y="47" width="10" height="3" fill="#0A1006"/>
  <rect x="36" y="47" width="5" height="1" fill="#22AA00" opacity="0.6"/>

  <!-- SR 引爆器（升級版） -->
  <rect x="69" y="74" width="18" height="16" fill="#141C08" rx="2"/>
  <rect x="69" y="74" width="18" height="16" fill="none" stroke="#22AA00" stroke-width="1" rx="2"/>
  <!-- 數位顯示幕 -->
  <rect x="71" y="76" width="14" height="5" fill="#0A1A06" rx="1"/>
  <rect x="72" y="77" width="8" height="3" fill="#22AA00" opacity="0.6"/>
  <rect x="82" y="77" width="2" height="3" fill="#CC4400" opacity="0.8"/>
  <!-- 按鈕列 -->
  <ellipse cx="73" cy="86" rx="2" ry="2" fill="#CC4400"/>
  <ellipse cx="78" cy="86" rx="2" ry="2" fill="#22AA00"/>
  <ellipse cx="83" cy="86" rx="2" ry="2" fill="#CCAA00"/>

  <!-- 右手握引爆器 -->
  <rect x="69" y="88" width="10" height="8" fill="#6A5040" rx="1"/>
</svg>
