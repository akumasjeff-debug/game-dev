<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <!-- 背景：SSR 金綠光暈 -->
  <rect x="0" y="0" width="100" height="130" fill="#080A02"/>
  <rect x="0" y="0" width="50" height="130" fill="#060802" opacity="0.8"/>
  <!-- 金色光暈 -->
  <rect x="10" y="10" width="80" height="110" fill="#1A2000" opacity="0.1"/>
  <rect x="20" y="15" width="60" height="100" fill="#283400" opacity="0.08"/>
  <rect x="25" y="20" width="50" height="90" fill="#384A00" opacity="0.06"/>

  <!-- SSR 黃色警示光暈背景 -->
  <ellipse cx="50" cy="60" rx="42" ry="55" fill="#2A2800" opacity="0.18"/>
  <ellipse cx="50" cy="60" rx="28" ry="38" fill="#3A3800" opacity="0.14"/>
  <ellipse cx="50" cy="60" rx="16" ry="22" fill="#4A4A00" opacity="0.10"/>

  <!-- 金色外框 -->
  <rect x="1" y="1" width="98" height="128" fill="none" stroke="#AA8800" stroke-width="1.5"/>
  <rect x="3" y="3" width="94" height="124" fill="none" stroke="#CCAA00" stroke-width="0.8" opacity="0.7"/>

  <!-- 地面光暈 -->
  <ellipse cx="50" cy="122" rx="35" ry="5" fill="#666000" opacity="0.3"/>
  <ellipse cx="50" cy="120" rx="22" ry="4" fill="#000000" opacity="0.5"/>

  <!-- 軀幹：黃色警示條紋防爆重裝 -->
  <rect x="20" y="64" width="60" height="56" fill="#141A08" rx="3"/>
  <!-- 黃黑警示條紋（主要特徵） -->
  <rect x="20" y="64" width="60" height="6" fill="#CCAA00"/>
  <rect x="20" y="64" width="60" height="6" fill="#000000" opacity="0.3"/>
  <rect x="20" y="76" width="60" height="6" fill="#CCAA00"/>
  <rect x="20" y="76" width="60" height="6" fill="#000000" opacity="0.3"/>
  <rect x="20" y="88" width="60" height="6" fill="#CCAA00"/>
  <rect x="20" y="88" width="60" height="6" fill="#000000" opacity="0.3"/>
  <rect x="20" y="100" width="60" height="6" fill="#CCAA00"/>
  <rect x="20" y="100" width="60" height="6" fill="#000000" opacity="0.3"/>
  <rect x="20" y="112" width="60" height="6" fill="#CCAA00"/>
  <rect x="20" y="112" width="60" height="6" fill="#000000" opacity="0.3"/>
  <!-- 斜紋覆蓋（警示感） -->
  <rect x="20" y="64" width="10" height="56" fill="#000000" opacity="0.25"/>
  <rect x="40" y="64" width="10" height="56" fill="#000000" opacity="0.25"/>
  <rect x="60" y="64" width="10" height="56" fill="#000000" opacity="0.25"/>
  <rect x="80" y="64" width="0" height="56" fill="#000000" opacity="0.25"/>

  <!-- 防爆外框 -->
  <rect x="20" y="64" width="60" height="56" fill="none" stroke="#CCAA00" stroke-width="2" rx="3"/>
  <rect x="20" y="64" width="60" height="56" fill="none" stroke="#FFE060" stroke-width="0.8" rx="3" opacity="0.5"/>

  <!-- 胸甲金色警示徽章 -->
  <rect x="38" y="68" width="24" height="20" fill="#101408" rx="2"/>
  <rect x="38" y="68" width="24" height="20" fill="none" stroke="#CCAA00" stroke-width="1.5" rx="2"/>
  <!-- 警示三角 -->
  <polygon points="50,70 42,83 58,83" fill="#1A1A00"/>
  <polygon points="50,70 42,83 58,83" fill="none" stroke="#CCAA00" stroke-width="1.2"/>
  <rect x="49" y="73" width="2" height="5" fill="#CCAA00"/>
  <ellipse cx="50" cy="80" rx="1.5" ry="1.5" fill="#CCAA00"/>

  <!-- 肩甲（重裝警示條紋） -->
  <rect x="8" y="58" width="16" height="28" fill="#141A08" rx="3"/>
  <rect x="76" y="58" width="16" height="28" fill="#141A08" rx="3"/>
  <!-- 警示條紋 -->
  <rect x="8" y="60" width="16" height="4" fill="#CCAA00"/>
  <rect x="8" y="68" width="16" height="4" fill="#CCAA00"/>
  <rect x="8" y="76" width="16" height="4" fill="#CCAA00"/>
  <rect x="76" y="60" width="16" height="4" fill="#CCAA00"/>
  <rect x="76" y="68" width="16" height="4" fill="#CCAA00"/>
  <rect x="76" y="76" width="16" height="4" fill="#CCAA00"/>
  <rect x="8" y="58" width="16" height="28" fill="none" stroke="#CCAA00" stroke-width="1.5" rx="3"/>
  <rect x="76" y="58" width="16" height="28" fill="none" stroke="#CCAA00" stroke-width="1.5" rx="3"/>

  <!-- 頸部護甲 -->
  <rect x="40" y="54" width="20" height="12" fill="#141A08" rx="2"/>
  <rect x="40" y="54" width="20" height="12" fill="none" stroke="#CCAA00" stroke-width="1" rx="2"/>
  <!-- 警示條 -->
  <rect x="40" y="57" width="20" height="3" fill="#CCAA00" opacity="0.7"/>

  <!-- 頭盔（SSR 重型防爆） -->
  <ellipse cx="50" cy="40" rx="23" ry="20" fill="#1A2008"/>
  <rect x="27" y="38" width="46" height="14" fill="#1A2008"/>
  <!-- 頭盔側護 -->
  <rect x="26" y="40" width="9" height="18" fill="#141A08" rx="1"/>
  <rect x="65" y="40" width="9" height="18" fill="#141A08" rx="1"/>
  <!-- 頭盔警示飾邊 -->
  <rect x="27" y="22" width="46" height="5" fill="#CCAA00" rx="1" opacity="0.9"/>
  <rect x="26" y="40" width="9" height="18" fill="none" stroke="#CCAA00" stroke-width="1" rx="1"/>
  <rect x="65" y="40" width="9" height="18" fill="none" stroke="#CCAA00" stroke-width="1" rx="1"/>

  <!-- 防爆面罩（全遮） -->
  <rect x="30" y="38" width="40" height="22" fill="#0E1206" rx="2"/>
  <rect x="30" y="38" width="40" height="22" fill="none" stroke="#CCAA00" stroke-width="1.5" rx="2"/>
  <!-- 護目鏡（黃色警示） -->
  <rect x="32" y="40" width="36" height="14" fill="#141800" rx="1"/>
  <rect x="34" y="41" width="14" height="8" fill="#1A1E00" rx="1"/>
  <rect x="52" y="41" width="14" height="8" fill="#1A1E00" rx="1"/>
  <rect x="34" y="41" width="14" height="8" fill="none" stroke="#CCAA00" stroke-width="1" rx="1"/>
  <rect x="52" y="41" width="14" height="8" fill="none" stroke="#CCAA00" stroke-width="1" rx="1"/>
  <!-- 黃色反光 -->
  <rect x="36" y="42" width="6" height="3" fill="#CCAA00" opacity="0.4"/>
  <rect x="54" y="42" width="6" height="3" fill="#CCAA00" opacity="0.4"/>
  <!-- 面罩通話格 -->
  <rect x="38" y="52" width="24" height="6" fill="#1A2008"/>
  <rect x="40" y="53" width="4" height="4" fill="#CCAA00" opacity="0.3" rx="0.5"/>
  <rect x="46" y="53" width="4" height="4" fill="#CCAA00" opacity="0.3" rx="0.5"/>
  <rect x="52" y="53" width="4" height="4" fill="#CCAA00" opacity="0.3" rx="0.5"/>
  <rect x="58" y="53" width="4" height="4" fill="#CCAA00" opacity="0.3" rx="0.5"/>

  <!-- 紅線束（多束引信） -->
  <!-- 主束從胸口延伸 -->
  <rect x="40" y="63" width="2" height="8" fill="#CC2200"/>
  <rect x="44" y="63" width="2" height="8" fill="#CC4400"/>
  <rect x="48" y="63" width="2" height="8" fill="#CC2200"/>
  <rect x="52" y="63" width="2" height="8" fill="#AA2200"/>
  <rect x="56" y="63" width="2" height="8" fill="#CC4400"/>
  <rect x="60" y="63" width="2" height="8" fill="#CC2200"/>
  <!-- 延伸到炸藥包 -->
  <rect x="40" y="65" width="20" height="1" fill="#CC2200" opacity="0.7"/>
  <rect x="20" y="68" width="22" height="1" fill="#CC2200" opacity="0.7"/>
  <rect x="78" y="68" width="2" height="20" fill="#CC4400" opacity="0.8"/>

  <!-- 右手持引爆器（SSR 升級版） -->
  <rect x="70" y="76" width="20" height="18" fill="#1A2008" rx="2"/>
  <rect x="70" y="76" width="20" height="18" fill="none" stroke="#CCAA00" stroke-width="1.2" rx="2"/>
  <!-- 顯示幕 -->
  <rect x="72" y="78" width="16" height="6" fill="#0A1000" rx="1"/>
  <rect x="73" y="79" width="8" height="4" fill="#22AA00" opacity="0.5"/>
  <rect x="83" y="79" width="4" height="4" fill="#CC2200" opacity="0.8"/>
  <!-- 按鈕 -->
  <ellipse cx="74" cy="89" rx="2.5" ry="2.5" fill="#CC2200"/>
  <ellipse cx="80" cy="89" rx="2.5" ry="2.5" fill="#22AA00"/>
  <ellipse cx="86" cy="89" rx="2.5" ry="2.5" fill="#CCAA00"/>

  <!-- 右手 -->
  <rect x="70" y="92" width="12" height="8" fill="#5A4030" rx="1"/>
</svg>
