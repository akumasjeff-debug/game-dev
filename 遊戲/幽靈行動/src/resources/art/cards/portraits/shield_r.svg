<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <!-- 背景：深灰藍中性色調 -->
  <rect x="0" y="0" width="100" height="130" fill="#1A2030"/>
  <rect x="0" y="0" width="50" height="130" fill="#0D1520" opacity="0.6"/>
  <rect x="0" y="0" width="30" height="130" fill="#0A1018" opacity="0.4"/>
  <rect x="0" y="80" width="100" height="50" fill="#111820" opacity="0.5"/>

  <!-- 地面陰影 -->
  <ellipse cx="50" cy="118" rx="30" ry="6" fill="#000000" opacity="0.4"/>

  <!-- 軀幹：防彈衣（深藍灰） -->
  <rect x="28" y="70" width="44" height="45" fill="#2A3A4A" rx="2"/>
  <!-- 防彈衣分格線 -->
  <rect x="28" y="82" width="44" height="2" fill="#1A2A3A" opacity="0.8"/>
  <rect x="28" y="94" width="44" height="2" fill="#1A2A3A" opacity="0.8"/>
  <rect x="49" y="70" width="2" height="45" fill="#1A2A3A" opacity="0.6"/>
  <!-- MOLLE 腰帶 -->
  <rect x="28" y="106" width="44" height="8" fill="#1E2E3E"/>
  <rect x="33" y="108" width="6" height="4" fill="#2A3A4A" rx="1"/>
  <rect x="46" y="108" width="6" height="4" fill="#2A3A4A" rx="1"/>
  <rect x="59" y="108" width="6" height="4" fill="#2A3A4A" rx="1"/>

  <!-- 肩膀護甲 -->
  <rect x="18" y="68" width="14" height="18" fill="#324050" rx="2"/>
  <rect x="68" y="68" width="14" height="18" fill="#324050" rx="2"/>

  <!-- 頸部 -->
  <rect x="43" y="58" width="14" height="14" fill="#8A6A50"/>

  <!-- 頭盔（標準軍用） -->
  <ellipse cx="50" cy="45" rx="22" ry="18" fill="#2E3C28"/>
  <rect x="28" y="42" width="44" height="12" fill="#2E3C28"/>
  <!-- 頭盔護耳 -->
  <rect x="27" y="44" width="8" height="14" fill="#263422" rx="1"/>
  <rect x="65" y="44" width="8" height="14" fill="#263422" rx="1"/>
  <!-- 頭盔頂邊線 -->
  <rect x="28" y="32" width="44" height="4" fill="#3A4C30" rx="1"/>

  <!-- 面部（半露下臉） -->
  <rect x="35" y="46" width="30" height="18" fill="#8A6A50" rx="1"/>
  <!-- 護目鏡（普通型，平面） -->
  <rect x="35" y="46" width="30" height="10" fill="#1A2820" rx="1"/>
  <rect x="37" y="47" width="12" height="7" fill="#2A4030" rx="1"/>
  <rect x="51" y="47" width="12" height="7" fill="#2A4030" rx="1"/>
  <!-- 口罩 -->
  <rect x="35" y="56" width="30" height="8" fill="#3A3A3A"/>

  <!-- 左側：矩形盾牌（側視可見） -->
  <rect x="10" y="55" width="16" height="55" fill="#1E3080" rx="2"/>
  <rect x="10" y="55" width="16" height="55" fill="none" stroke="#3050A0" stroke-width="1.5" rx="2"/>
  <!-- 盾牌把手 -->
  <rect x="12" y="78" width="4" height="10" fill="#3A3A3A" rx="1"/>
  <!-- 盾牌徽紋 -->
  <polygon points="18,70 14,78 18,86 22,78" fill="#2A4090" opacity="0.8"/>

  <!-- 右手（握拳靠盾） -->
  <rect x="70" y="80" width="14" height="12" fill="#6A5040" rx="2"/>
</svg>
