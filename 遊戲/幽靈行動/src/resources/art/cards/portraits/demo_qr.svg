<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <!-- 背景：QR 深色戲劇背景 -->
  <rect x="0" y="0" width="100" height="130" fill="#040602"/>
  <rect x="0" y="0" width="50" height="130" fill="#030402" opacity="0.8"/>
  <!-- 紅光從胸口輻射 -->
  <rect x="20" y="50" width="60" height="80" fill="#200800" opacity="0.3"/>
  <rect x="30" y="60" width="40" height="60" fill="#3A0C00" opacity="0.25"/>
  <!-- 綠色爆炸餘光（左下） -->
  <rect x="0" y="90" width="50" height="40" fill="#082000" opacity="0.2"/>

  <!-- 能量光暈 -->
  <ellipse cx="50" cy="65" rx="46" ry="58" fill="#040200" opacity="0.5"/>
  <ellipse cx="50" cy="65" rx="30" ry="42" fill="#0A0600" opacity="0.3"/>

  <!-- 紅金外框 -->
  <rect x="0" y="0" width="100" height="130" fill="none" stroke="#CC2200" stroke-width="2"/>
  <rect x="2" y="2" width="96" height="126" fill="none" stroke="#AA1000" stroke-width="1" opacity="0.7"/>
  <!-- 四角裝飾 -->
  <polygon points="0,0 14,0 0,14" fill="#AA1800"/>
  <polygon points="100,0 86,0 100,14" fill="#AA1800"/>
  <polygon points="0,130 14,130 0,116" fill="#AA1800"/>
  <polygon points="100,130 86,130 100,116" fill="#AA1800"/>

  <!-- 地面爆炸焦痕 -->
  <ellipse cx="50" cy="124" rx="40" ry="5" fill="#200600" opacity="0.6"/>
  <ellipse cx="50" cy="124" rx="28" ry="3" fill="#AA2200" opacity="0.3"/>
  <ellipse cx="50" cy="122" rx="16" ry="2" fill="#FF4400" opacity="0.2"/>

  <!-- 軀幹：全覆式防爆重裝 -->
  <rect x="18" y="60" width="64" height="60" fill="#060A04" rx="3"/>
  <!-- 防爆甲分層 -->
  <rect x="18" y="60" width="64" height="60" fill="none" stroke="#CC2200" stroke-width="2.5" rx="3"/>
  <rect x="18" y="60" width="64" height="60" fill="none" stroke="#FF4400" stroke-width="0.8" rx="3" opacity="0.4"/>
  <!-- 外層防爆板（黑紅分割） -->
  <rect x="20" y="62" width="28" height="56" fill="#080A04" rx="2"/>
  <rect x="52" y="62" width="28" height="56" fill="#0A0604" rx="2"/>
  <rect x="20" y="62" width="28" height="56" fill="none" stroke="#1A6800" stroke-width="1" rx="2"/>
  <rect x="52" y="62" width="28" height="56" fill="none" stroke="#AA1800" stroke-width="1" rx="2"/>

  <!-- 防爆橫條（紅色警示） -->
  <rect x="18" y="75" width="64" height="3" fill="#CC2200" opacity="0.7"/>
  <rect x="18" y="90" width="64" height="3" fill="#CC2200" opacity="0.7"/>
  <rect x="18" y="105" width="64" height="3" fill="#CC2200" opacity="0.7"/>

  <!-- 胸前倒計時顯示器（核心特效） -->
  <rect x="32" y="65" width="36" height="24" fill="#040804" rx="3"/>
  <rect x="32" y="65" width="36" height="24" fill="none" stroke="#CC2200" stroke-width="2" rx="3"/>
  <rect x="32" y="65" width="36" height="24" fill="none" stroke="#FF4400" stroke-width="0.8" rx="3" opacity="0.5"/>
  <!-- 顯示幕 -->
  <rect x="34" y="67" width="32" height="16" fill="#000A00" rx="2"/>
  <!-- 倒計時數字（紅色發光） -->
  <!-- 數字 "05" -->
  <!-- 0 -->
  <rect x="37" y="69" width="8" height="12" fill="none" stroke="#FF2200" stroke-width="1.5" rx="2"/>
  <rect x="38" y="70" width="6" height="10" fill="#1A0000" rx="1"/>
  <!-- 5 -->
  <rect x="49" y="69" width="8" height="5" fill="#FF2200" opacity="0.8" rx="1"/>
  <rect x="49" y="69" width="8" height="12" fill="none" stroke="#FF2200" stroke-width="1.5" rx="2"/>
  <rect x="49" y="73" width="8" height="4" fill="#FF2200" opacity="0.5"/>
  <rect x="49" y="76" width="8" height="5" fill="#FF2200" opacity="0.8"/>
  <!-- 紅色發光暈（倒計時顯示器） -->
  <ellipse cx="50" cy="78" rx="20" ry="16" fill="#CC2200" opacity="0.08"/>
  <ellipse cx="50" cy="78" rx="14" ry="10" fill="#CC2200" opacity="0.08"/>
  <ellipse cx="50" cy="78" rx="8" ry="6" fill="#FF2200" opacity="0.10"/>
  <!-- 分隔號 : -->
  <ellipse cx="47" cy="72" rx="1" ry="1" fill="#FF2200"/>
  <ellipse cx="47" cy="77" rx="1" ry="1" fill="#FF2200"/>
  <!-- 顯示器底部指示燈 -->
  <ellipse cx="36" cy="86" rx="1.5" ry="1.5" fill="#FF2200" opacity="0.8"/>
  <ellipse cx="50" cy="86" rx="1.5" ry="1.5" fill="#FF6600" opacity="0.8"/>
  <ellipse cx="64" cy="86" rx="1.5" ry="1.5" fill="#FF2200" opacity="0.8"/>

  <!-- 肩甲（全覆式重裝，紅黑） -->
  <rect x="4" y="52" width="18" height="34" fill="#060A04" rx="3"/>
  <rect x="78" y="52" width="18" height="34" fill="#0A0604" rx="3"/>
  <rect x="4" y="52" width="18" height="34" fill="none" stroke="#1A6800" stroke-width="2" rx="3"/>
  <rect x="78" y="52" width="18" height="34" fill="none" stroke="#CC1800" stroke-width="2" rx="3"/>
  <!-- 左肩綠色警示條 -->
  <rect x="6" y="58" width="14" height="3" fill="#22AA00" opacity="0.7"/>
  <rect x="6" y="65" width="14" height="3" fill="#22AA00" opacity="0.7"/>
  <rect x="6" y="72" width="14" height="3" fill="#22AA00" opacity="0.7"/>
  <!-- 右肩紅色條 -->
  <rect x="80" y="58" width="14" height="3" fill="#CC2200" opacity="0.7"/>
  <rect x="80" y="65" width="14" height="3" fill="#CC2200" opacity="0.7"/>
  <rect x="80" y="72" width="14" height="3" fill="#CC2200" opacity="0.7"/>

  <!-- 導線束（QR 大量紅線） -->
  <!-- 從胸口顯示器延伸 -->
  <rect x="32" y="89" width="2" height="14" fill="#CC2200"/>
  <rect x="36" y="89" width="2" height="14" fill="#FF4400"/>
  <rect x="40" y="89" width="2" height="14" fill="#CC2200"/>
  <rect x="44" y="89" width="2" height="14" fill="#AA2200"/>
  <rect x="48" y="89" width="2" height="14" fill="#CC2200"/>
  <rect x="52" y="89" width="2" height="14" fill="#FF4400"/>
  <rect x="56" y="89" width="2" height="14" fill="#CC2200"/>
  <rect x="60" y="89" width="2" height="14" fill="#AA2200"/>
  <!-- 橫向主線 -->
  <rect x="32" y="95" width="30" height="2" fill="#CC2200" opacity="0.6"/>
  <rect x="18" y="80" width="14" height="2" fill="#CC4400" opacity="0.8"/>
  <rect x="78" y="80" width="4" height="2" fill="#CC4400" opacity="0.8"/>

  <!-- 頸部護甲（全封閉） -->
  <rect x="36" y="50" width="28" height="14" fill="#080A04" rx="2"/>
  <rect x="36" y="50" width="28" height="14" fill="none" stroke="#CC2200" stroke-width="1.5" rx="2"/>
  <rect x="36" y="54" width="28" height="3" fill="#CC2200" opacity="0.6"/>
  <rect x="36" y="58" width="28" height="3" fill="#1A6800" opacity="0.5"/>

  <!-- 頭盔（QR 全覆式防爆巨盔） -->
  <ellipse cx="50" cy="36" rx="26" ry="22" fill="#040602"/>
  <rect x="24" y="34" width="52" height="18" fill="#040602"/>
  <!-- 頭盔側護（巨型） -->
  <rect x="22" y="36" width="11" height="20" fill="#030502" rx="1"/>
  <rect x="67" y="36" width="11" height="20" fill="#030502" rx="1"/>
  <!-- 紅色頭盔飾邊 -->
  <rect x="24" y="16" width="52" height="5" fill="#CC2200" rx="1" opacity="0.9"/>
  <!-- 頭頂警示燈（QR 特效） -->
  <ellipse cx="42" cy="13" rx="4" ry="4" fill="#CC2200" opacity="0.8"/>
  <ellipse cx="42" cy="13" rx="2.5" ry="2.5" fill="#FF4400"/>
  <ellipse cx="42" cy="13" rx="6" ry="6" fill="#CC2200" opacity="0.2"/>
  <ellipse cx="58" cy="13" rx="4" ry="4" fill="#22AA00" opacity="0.8"/>
  <ellipse cx="58" cy="13" rx="2.5" ry="2.5" fill="#44CC10"/>
  <ellipse cx="58" cy="13" rx="6" ry="6" fill="#22AA00" opacity="0.2"/>

  <!-- 面罩（全封閉，帶倒計時反射） -->
  <rect x="28" y="34" width="44" height="24" fill="#030402" rx="2"/>
  <rect x="28" y="34" width="44" height="24" fill="none" stroke="#CC2200" stroke-width="2" rx="2"/>
  <!-- 護目鏡（紅色倒計時光映照） -->
  <rect x="30" y="36" width="40" height="16" fill="#060204" rx="1"/>
  <rect x="32" y="37" width="17" height="10" fill="#0C0402" rx="1"/>
  <rect x="51" y="37" width="17" height="10" fill="#0C0402" rx="1"/>
  <!-- 左眼（反射綠色） -->
  <rect x="32" y="37" width="17" height="10" fill="none" stroke="#1A6800" stroke-width="1" rx="1"/>
  <rect x="34" y="38" width="6" height="6" fill="#082000" opacity="0.6"/>
  <ellipse cx="37" cy="41" rx="2" ry="2" fill="#22AA00" opacity="0.7"/>
  <!-- 右眼（反射紅色） -->
  <rect x="51" y="37" width="17" height="10" fill="none" stroke="#CC2200" stroke-width="1" rx="1"/>
  <rect x="53" y="38" width="6" height="6" fill="#200400" opacity="0.6"/>
  <ellipse cx="60" cy="41" rx="2" ry="2" fill="#FF2200" opacity="0.7"/>
  <!-- 面罩下部通氣孔 -->
  <rect x="36" y="52" width="28" height="6" fill="#040402" rx="1"/>
  <rect x="37" y="53" width="4" height="4" fill="#CC2200" opacity="0.2" rx="0.5"/>
  <rect x="43" y="53" width="4" height="4" fill="#CC2200" opacity="0.2" rx="0.5"/>
  <rect x="49" y="53" width="4" height="4" fill="#CC2200" opacity="0.2" rx="0.5"/>
  <rect x="55" y="53" width="4" height="4" fill="#CC2200" opacity="0.2" rx="0.5"/>
  <rect x="61" y="53" width="4" height="4" fill="#CC2200" opacity="0.2" rx="0.5"/>

  <!-- 右手（持重型引爆控制器） -->
  <rect x="74" y="90" width="22" height="22" fill="#060A04" rx="2"/>
  <rect x="74" y="90" width="22" height="22" fill="none" stroke="#CC2200" stroke-width="1.5" rx="2"/>
  <!-- 大型顯示幕 -->
  <rect x="76" y="92" width="18" height="8" fill="#000A00" rx="1"/>
  <!-- 倒計時數字（大） -->
  <rect x="77" y="93" width="6" height="6" fill="none" stroke="#FF2200" stroke-width="1" rx="1"/>
  <rect x="78" y="94" width="4" height="4" fill="#1A0000" rx="0.5"/>
  <rect x="86" y="93" width="6" height="3" fill="#FF2200" opacity="0.8" rx="0.5"/>
  <rect x="86" y="96" width="6" height="3" fill="#FF2200" opacity="0.8" rx="0.5"/>
  <rect x="86" y="93" width="6" height="6" fill="none" stroke="#FF2200" stroke-width="1" rx="1"/>
  <!-- 大紅按鈕 -->
  <ellipse cx="85" cy="106" rx="5" ry="5" fill="#440000"/>
  <ellipse cx="85" cy="106" rx="5" ry="5" fill="none" stroke="#CC2200" stroke-width="1.5"/>
  <ellipse cx="85" cy="106" rx="3" ry="3" fill="#CC2200"/>
  <ellipse cx="85" cy="106" rx="1.5" ry="1.5" fill="#FF4400"/>
  <ellipse cx="85" cy="106" rx="6" ry="6" fill="#CC2200" opacity="0.15"/>

  <!-- 右手握控制器 -->
  <rect x="74" y="110" width="12" height="10" fill="#3A2818" rx="1"/>
</svg>
