<svg xmlns="http://www.w3.org/2000/svg" width="120" height="180" shape-rendering="crispEdges">

  <!-- ===== SSR GOLD DOUBLE TOP LINE ===== -->
  <rect x="0" y="0" width="120" height="3" fill="#DDAA00"/>
  <rect x="0" y="4" width="120" height="1" fill="#DDAA00"/>

  <!-- ===== OUTER FRAME ===== -->
  <rect x="0" y="1" width="120" height="2" fill="#4A3000"/>
