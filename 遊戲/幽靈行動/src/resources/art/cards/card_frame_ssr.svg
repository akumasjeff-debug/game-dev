  <rect x="4" y="144" width="112" height="3" fill="#DDAA00"/>
  <rect x="4" y="148" width="112" height="1" fill="#DDAA00"/>
  <!-- Gold bottom stripe -->
  <rect x="4" y="169" width="112" height="3" fill="#DDAA00"/>
  <!-- SSR text pixel representation -->
  <!-- S -->
  <rect x="26" y="152" width="6" height="1" fill="#FFDD44"/>
  <rect x="26" y="153" width="1" height="3" fill="#FFDD44"/>
  <rect x="26" y="156" width="6" height="1" fill="#FFDD44"/>
  <rect x="31" y="157" width="1" height="3" fill="#FFDD44"/>
  <rect x="26" y="160" width="6" height="1" fill="#FFDD44"/>
