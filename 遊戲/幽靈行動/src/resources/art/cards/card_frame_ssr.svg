  <rect x="35" y="152" width="6" height="1" fill="#FFDD44"/>
  <rect x="35" y="153" width="1" height="3" fill="#FFDD44"/>
  <rect x="35" y="156" width="6" height="1" fill="#FFDD44"/>
  <rect x="40" y="157" width="1" height="3" fill="#FFDD44"/>
  <rect x="35" y="160" width="6" height="1" fill="#FFDD44"/>
  <!-- R -->
  <rect x="44" y="152" width="1" height="10" fill="#FFDD44"/>
  <rect x="45" y="152" width="4" height="1" fill="#FFDD44"/>
  <rect x="49" y="153" width="1" height="3" fill="#FFDD44"/>
  <rect x="45" y="156" width="4" height="1" fill="#FFDD44"/>
  <rect x="47" y="157" width="3" height="5" fill="#FFDD44"/>

