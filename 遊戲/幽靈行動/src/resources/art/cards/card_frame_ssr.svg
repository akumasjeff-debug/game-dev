  <rect x="0" y="0" width="1" height="180" fill="#DDAA00"/>
  <!-- Right gold vertical line (full height, 1px) -->
  <rect x="119" y="0" width="1" height="180" fill="#DDAA00"/>
  <!-- Left outer frame bar -->
  <rect x="1" y="5" width="2" height="170" fill="#4A3000"/>
  <!-- Right outer frame bar -->
  <rect x="117" y="5" width="2" height="170" fill="#4A3000"/>
  <!-- Bottom double line -->
  <rect x="0" y="175" width="120" height="1" fill="#DDAA00"/>
  <rect x="0" y="177" width="120" height="3" fill="#DDAA00"/>
  <rect x="0" y="176" width="120" height="1" fill="#4A3000"/>

  <!-- ===== BRIGHT EDGE HIGHLIGHT ===== -->
  <rect x="3" y="5" width="114" height="1" fill="#DDAA00"/>
  <rect x="3" y="5" width="1" height="170" fill="#DDAA00"/>
  <rect x="116" y="5" width="1" height="170" fill="#DDAA00"/>
  <rect x="3" y="174" width="114" height="1" fill="#DDAA00"/>

  <!-- ===== IMAGE AREA (y=6 to y=102) ===== -->
