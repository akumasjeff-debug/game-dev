  <!-- Bottom-right -->
  <rect x="114" y="171" width="4" height="4" fill="#DDAA00"/>
  <rect x="115" y="172" width="2" height="2" fill="#FFDD44"/>

  <!-- ===== IMAGE AREA CORNER MARKS ===== -->
  <rect x="4" y="6" width="4" height="1" fill="#DDAA00"/>
  <rect x="4" y="6" width="1" height="4" fill="#DDAA00"/>
  <rect x="112" y="6" width="4" height="1" fill="#DDAA00"/>
  <rect x="115" y="6" width="1" height="4" fill="#DDAA00"/>
  <rect x="4" y="101" width="4" height="1" fill="#DDAA00"/>
  <rect x="4" y="98" width="1" height="4" fill="#DDAA00"/>
  <rect x="112" y="101" width="4" height="1" fill="#DDAA00"/>
  <rect x="115" y="98" width="1" height="4" fill="#DDAA00"/>

</svg>
