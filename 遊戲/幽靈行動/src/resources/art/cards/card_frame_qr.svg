  <rect x="110" y="174" width="6" height="1" fill="#DDAA00"/>
  <rect x="117" y="167" width="1" height="8" fill="#FFCC00"/>
  <rect x="113" y="170" width="4" height="4" fill="#FFDD44"/>
  <rect x="110" y="172" width="1" height="2" fill="#DDAA00"/>
  <rect x="115" y="167" width="2" height="2" fill="#DDAA00"/>

