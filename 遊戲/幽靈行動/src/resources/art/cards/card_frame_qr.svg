<svg xmlns="http://www.w3.org/2000/svg" width="120" height="180" shape-rendering="crispEdges">

  <!-- ===== QR LEGENDARY: RED-GOLD GRADIENT SIMULATION ===== -->
  <!-- Top 4px dual-color line (red left, gold right) -->
  <rect x="0"  y="0" width="60" height="4" fill="#CC3300"/>
  <rect x="60" y="0" width="60" height="4" fill="#FFCC00"/>
  <!-- Sub-line for depth -->
  <rect x="0"  y="4" width="60" height="1" fill="#6A1A00"/>
  <rect x="60" y="4" width="60" height="1" fill="#4A3000"/>

  <!-- ===== OUTER FRAME (multi-layer red-to-gold left/right) ===== -->
  <!-- Left outer bar (red) -->
  <rect x="0" y="5" width="2" height="170" fill="#6A1A00"/>
  <rect x="2" y="5" width="1" height="170" fill="#CC3300"/>
  <!-- Right outer bar (gold) -->
  <rect x="117" y="5" width="3" height="170" fill="#4A3000"/>
  <rect x="117" y="5" width="1" height="170" fill="#FFCC00"/>

  <!-- ===== BOTTOM LINE (dual-color) ===== -->
  <rect x="0"  y="175" width="60" height="1" fill="#CC3300"/>
  <rect x="60" y="175" width="60" height="1" fill="#FFCC00"/>
  <rect x="0"  y="176" width="60" height="4" fill="#6A1A00"/>
  <rect x="60" y="176" width="60" height="4" fill="#4A3000"/>

  <!-- ===== INNER HIGHLIGHT LINES ===== -->
  <!-- Top -->
  <rect x="3" y="5" width="114" height="1" fill="#FF6600"/>
  <!-- Bottom -->
  <rect x="3" y="174" width="57" height="1" fill="#FF6600"/>
  <rect x="60" y="174" width="57" height="1" fill="#DDAA00"/>
  <!-- Left inner -->
  <rect x="3" y="5" width="1" height="170" fill="#FF4400"/>
  <!-- Right inner -->
  <rect x="116" y="5" width="1" height="170" fill="#DDAA00"/>

  <!-- ===== LEFT SIDE SERRATED NOTCHES (every 8px, red side) ===== -->
  <rect x="0" y="13" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="21" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="29" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="37" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="45" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="53" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="61" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="69" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="77" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="85" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="93" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="101" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="109" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="117" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="125" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="133" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="141" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="149" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="157" width="4" height="2" fill="#FF4400"/>
  <rect x="0" y="165" width="4" height="2" fill="#FF4400"/>

