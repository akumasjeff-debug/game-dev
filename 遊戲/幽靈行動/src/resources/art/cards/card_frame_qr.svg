  <rect x="116" y="93" width="4" height="2" fill="#DDAA00"/>
  <rect x="116" y="101" width="4" height="2" fill="#DDAA00"/>
  <rect x="116" y="109" width="4" height="2" fill="#DDAA00"/>
  <rect x="116" y="117" width="4" height="2" fill="#DDAA00"/>
  <rect x="116" y="125" width="4" height="2" fill="#DDAA00"/>
  <rect x="116" y="133" width="4" height="2" fill="#DDAA00"/>
