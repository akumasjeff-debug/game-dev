  <rect x="116" y="157" width="4" height="2" fill="#DDAA00"/>
  <rect x="116" y="165" width="4" height="2" fill="#DDAA00"/>

  <!-- ===== IMAGE AREA (y=6 to y=102) ===== -->
  <rect x="4" y="6" width="112" height="96" fill="#1A0A00"/>

  <!-- ===== DIVIDER LINE ===== -->
  <rect x="3" y="102" width="57" height="2" fill="#6A1A00"/>
  <rect x="60" y="102" width="57" height="2" fill="#4A3000"/>
  <rect x="3" y="103" width="57" height="1" fill="#FF4400"/>
  <rect x="60" y="103" width="57" height="1" fill="#DDAA00"/>

  <!-- ===== INFO AREA BACKGROUND ===== -->
  <rect x="4" y="104" width="112" height="70" fill="#2A0A00"/>

  <!-- ===== CLASS NAME PLACEHOLDER (y=106, h=16) ===== -->
  <rect x="6" y="106" width="108" height="16" fill="#3A1000"/>
  <rect x="6" y="106" width="54" height="1" fill="#FF4400"/>
  <rect x="60" y="106" width="54" height="1" fill="#DDAA00"/>
  <rect x="6" y="121" width="54" height="1" fill="#CC3300"/>
  <rect x="60" y="121" width="54" height="1" fill="#FFCC00"/>

