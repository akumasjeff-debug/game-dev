  <rect x="4"  y="169" width="56" height="3" fill="#6A1A00"/>
  <rect x="60" y="169" width="56" height="3" fill="#4A3000"/>
  <!-- QR text pixel blocks -->
  <!-- Q -->
  <rect x="20" y="152" width="6" height="1" fill="#FF6600"/>
  <rect x="20" y="161" width="6" height="1" fill="#FF6600"/>
  <rect x="20" y="153" width="1" height="8" fill="#FF6600"/>
  <rect x="25" y="153" width="1" height="8" fill="#FF6600"/>
  <rect x="23" y="158" width="4" height="1" fill="#FF6600"/>
  <rect x="25" y="159" width="3" height="3" fill="#FF6600"/>
  <!-- R -->
  <rect x="30" y="152" width="1" height="10" fill="#DDAA00"/>
  <rect x="31" y="152" width="4" height="1" fill="#DDAA00"/>
  <rect x="35" y="153" width="1" height="3" fill="#DDAA00"/>
  <rect x="31" y="156" width="4" height="1" fill="#DDAA00"/>
  <rect x="33" y="157" width="3" height="5" fill="#DDAA00"/>

  <!-- ===== CORNER ACCENTS (8x8 complex legendary) ===== -->
  <!-- Top-left (red) -->
  <rect x="2" y="5"  width="8" height="8" fill="#6A1A00"/>
  <rect x="3" y="5"  width="6" height="1" fill="#FF4400"/>
  <rect x="2" y="5"  width="1" height="8" fill="#CC3300"/>
  <rect x="3" y="6"  width="4" height="4" fill="#FF6600"/>
  <rect x="7" y="6"  width="1" height="2" fill="#FF4400"/>
  <rect x="3" y="10" width="2" height="2" fill="#FF4400"/>
  <!-- Top-right (gold) -->
  <rect x="110" y="5" width="8" height="8" fill="#4A3000"/>
  <rect x="110" y="5" width="6" height="1" fill="#DDAA00"/>
  <rect x="117" y="5" width="1" height="8" fill="#FFCC00"/>
  <rect x="113" y="6" width="4" height="4" fill="#FFDD44"/>
  <rect x="110" y="6" width="1" height="2" fill="#DDAA00"/>
  <rect x="115" y="10" width="2" height="2" fill="#DDAA00"/>
  <!-- Bottom-left (red) -->
  <rect x="2" y="167" width="8" height="8" fill="#6A1A00"/>
  <rect x="3" y="174" width="6" height="1" fill="#FF4400"/>
  <rect x="2" y="167" width="1" height="8" fill="#CC3300"/>
  <rect x="3" y="170" width="4" height="4" fill="#FF6600"/>
  <rect x="7" y="172" width="1" height="2" fill="#FF4400"/>
  <rect x="3" y="167" width="2" height="2" fill="#FF4400"/>
  <!-- Bottom-right (gold) -->
