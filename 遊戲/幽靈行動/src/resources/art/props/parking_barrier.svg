<svg viewBox="0 0 48 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- 地面底色 -->
  <rect x="0" y="0" width="48" height="16" fill="#0D1017"/>
  <!-- 黃色條紋標線 -->
  <rect x="0"  y="5" width="8"  height="6" fill="#FFCC00"/>
  <rect x="12" y="5" width="8"  height="6" fill="#FFCC00"/>
  <rect x="24" y="5" width="8"  height="6" fill="#FFCC00"/>
  <rect x="36" y="5" width="8"  height="6" fill="#FFCC00"/>
  <!-- 條紋暗部（立體感） -->
  <rect x="0"  y="10" width="8"  height="1" fill="#CC9900"/>
  <rect x="12" y="10" width="8"  height="1" fill="#CC9900"/>
  <rect x="24" y="10" width="8"  height="1" fill="#CC9900"/>
  <rect x="36" y="10" width="8"  height="1" fill="#CC9900"/>
  <!-- 三角錐（左），用疊加 rect 堆出三角輪廓 -->
  <rect x="4"  y="2" width="4" height="3" fill="#FF6600"/>
  <rect x="5"  y="1" width="2" height="1" fill="#FF6600"/>
  <rect x="3"  y="3" width="6" height="1" fill="#FF6600"/>
  <rect x="2"  y="4" width="8" height="1" fill="#CC4400"/>
  <!-- 三角錐（右） -->
  <rect x="36" y="2" width="4" height="3" fill="#FF6600"/>
  <rect x="37" y="1" width="2" height="1" fill="#FF6600"/>
  <rect x="35" y="3" width="6" height="1" fill="#FF6600"/>
  <rect x="34" y="4" width="8" height="1" fill="#CC4400"/>
</svg>
