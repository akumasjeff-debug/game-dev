<svg xmlns="http://www.w3.org/2000/svg" width="80" height="16" shape-rendering="crispEdges">
  <!-- 主體（對稱廢棄箱子） -->
  <rect x="0" y="0" width="80" height="16" fill="#2A2A2A"/>

  <!-- 頂部高光 -->
  <rect x="0" y="0" width="80" height="1" fill="#3A3A3A"/>

  <!-- 底部陰影 -->
  <rect x="0" y="15" width="80" height="1" fill="#181818"/>

  <!-- 對稱箱體分格縫 -->
  <rect x="39" y="0" width="2" height="16" fill="#1E1E1E"/>

  <!-- 左側磨損紋理 -->
  <rect x="5" y="3" width="4" height="2" fill="#222222"/>
  <rect x="15" y="8" width="3" height="3" fill="#222222"/>
  <rect x="24" y="5" width="5" height="2" fill="#222222"/>
  <rect x="10" y="12" width="4" height="2" fill="#222222"/>

  <!-- 右側磨損紋理（對稱） -->
  <rect x="71" y="3" width="4" height="2" fill="#222222"/>
  <rect x="62" y="8" width="3" height="3" fill="#222222"/>
  <rect x="51" y="5" width="5" height="2" fill="#222222"/>
  <rect x="66" y="12" width="4" height="2" fill="#222222"/>

  <!-- 彈孔（中央深色小方點） -->
  <rect x="37" y="6" width="6" height="4" fill="#141414"/>
  <rect x="38" y="7" width="4" height="2" fill="#0A0A0A"/>

  <!-- 彈孔周圍輻射裂紋 -->
  <rect x="35" y="7" width="2" height="1" fill="#1E1E1E"/>
  <rect x="43" y="8" width="2" height="1" fill="#1E1E1E"/>
  <rect x="38" y="4" width="1" height="2" fill="#1E1E1E"/>
  <rect x="41" y="11" width="1" height="2" fill="#1E1E1E"/>

  <!-- 側邊護板 -->
  <rect x="0" y="0" width="2" height="16" fill="#323232"/>
  <rect x="78" y="0" width="2" height="16" fill="#323232"/>
</svg>
