<svg xmlns="http://www.w3.org/2000/svg" width="80" height="16" shape-rendering="crispEdges">
  <!-- 主體 — 左側厚 12px 右側漸薄（用不規則堆疊模擬） -->
  <rect x="0" y="0" width="80" height="16" fill="#2A2A2A"/>

  <!-- 右側薄化（右端削去） -->
  <rect x="70" y="0" width="10" height="4" fill="none"/>
  <rect x="70" y="0" width="10" height="4" fill="#1A1A1A" opacity="0"/>

  <!-- 右側頂部碎裂缺口 -->
  <rect x="64" y="0" width="6" height="5" fill="#1A1A1A"/>
  <rect x="72" y="0" width="4" height="3" fill="#1A1A1A"/>

  <!-- 高光邊（頂部左段） -->
  <rect x="0" y="0" width="52" height="1" fill="#3A3A3A"/>
  <rect x="0" y="1" width="3" height="1" fill="#3A3A3A"/>

  <!-- 碎裂不規則紋理 -->
  <rect x="8" y="4" width="3" height="2" fill="#222222"/>
  <rect x="20" y="6" width="5" height="2" fill="#222222"/>
  <rect x="34" y="3" width="2" height="4" fill="#222222"/>
  <rect x="45" y="8" width="4" height="2" fill="#222222"/>
  <rect x="54" y="5" width="3" height="3" fill="#222222"/>
  <rect x="14" y="11" width="6" height="2" fill="#222222"/>
  <rect x="28" y="12" width="4" height="2" fill="#222222"/>

  <!-- 左側厚實護角 -->
  <rect x="0" y="0" width="8" height="16" fill="#2E2E2E"/>
  <rect x="0" y="0" width="2" height="16" fill="#3A3A3A"/>

  <!-- 底部陰影 -->
  <rect x="0" y="14" width="80" height="2" fill="#181818"/>

  <!-- 碎裂缺口（左上角不規則） -->
  <rect x="6" y="0" width="3" height="2" fill="#1A1A1A"/>
</svg>
