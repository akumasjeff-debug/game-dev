<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- 地面底色 -->
  <rect x="0" y="0" width="64" height="64" fill="#0A1520"/>
  <!-- 外圈陰影（最外層，深色） -->
  <rect x="6"  y="6"  width="52" height="52" fill="#2A1E10"/>
  <!-- 外圈主體（繩捲外環） -->
  <rect x="8"  y="8"  width="48" height="48" fill="#4A3520"/>
  <!-- 內圈挖空（甜甜圈效果） -->
  <rect x="20" y="20" width="24" height="24" fill="#2A1E10"/>
  <!-- 繩紋橫線（模擬纏繞紋路） -->
  <rect x="8"  y="14" width="48" height="2" fill="#5C4228"/>
  <rect x="8"  y="20" width="12" height="2" fill="#5C4228"/>
  <rect x="44" y="20" width="12" height="2" fill="#5C4228"/>
  <rect x="8"  y="26" width="12" height="2" fill="#5C4228"/>
  <rect x="44" y="26" width="12" height="2" fill="#5C4228"/>
  <rect x="8"  y="32" width="12" height="2" fill="#5C4228"/>
  <rect x="44" y="32" width="12" height="2" fill="#5C4228"/>
  <rect x="8"  y="38" width="12" height="2" fill="#5C4228"/>
  <rect x="44" y="38" width="12" height="2" fill="#5C4228"/>
  <rect x="8"  y="44" width="48" height="2" fill="#5C4228"/>
  <rect x="8"  y="50" width="48" height="2" fill="#5C4228"/>
  <!-- 外緣框線 -->
  <rect x="8"  y="8"  width="2"  height="48" fill="#3A2818"/>
  <rect x="54" y="8"  width="2"  height="48" fill="#3A2818"/>
  <rect x="8"  y="8"  width="48" height="2"  fill="#3A2818"/>
  <rect x="8"  y="54" width="48" height="2"  fill="#3A2818"/>
  <!-- 內圈框線 -->
  <rect x="20" y="20" width="2"  height="24" fill="#1A1008"/>
  <rect x="42" y="20" width="2"  height="24" fill="#1A1008"/>
  <rect x="20" y="20" width="24" height="2"  fill="#1A1008"/>
  <rect x="20" y="42" width="24" height="2"  fill="#1A1008"/>
  <!-- 頂面受光高光 -->
  <rect x="10" y="10" width="44" height="2" fill="#604030"/>
</svg>
