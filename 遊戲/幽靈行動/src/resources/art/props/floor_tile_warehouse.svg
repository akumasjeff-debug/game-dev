<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- 底色：深灰水泥 -->
  <rect width="64" height="64" fill="#1A1D22"/>
  <!-- 水平龜裂線（每 20px 一條） -->
  <rect x="0" y="20" width="64" height="1" fill="#0E1014"/>
  <rect x="0" y="40" width="64" height="1" fill="#0E1014"/>
  <!-- 龜裂延伸小偏移段（增加不規則感） -->
  <rect x="8" y="21" width="20" height="1" fill="#0E1014"/>
  <rect x="36" y="41" width="18" height="1" fill="#0E1014"/>
  <!-- 垂直縫隙（每 32px 一條） -->
  <rect x="32" y="0" width="1" height="64" fill="#252830"/>
  <!-- 縫隙延伸不規則段 -->
  <rect x="33" y="14" width="1" height="12" fill="#252830"/>
  <!-- 左上角水漬/油漬斑塊 -->
  <rect x="2" y="3" width="8" height="6" fill="#16191E"/>
  <rect x="4" y="2" width="4" height="2" fill="#16191E"/>
  <rect x="2" y="9" width="5" height="1" fill="#16191E"/>
  <!-- 右下角水泥崩角細節 -->
  <rect x="61" y="61" width="3" height="3" fill="#0E1014"/>
  <rect x="59" y="62" width="2" height="2" fill="#0E1014"/>
  <rect x="61" y="59" width="2" height="2" fill="#0E1014"/>
  <!-- 中間輕微暗斑（水泥不均勻感） -->
  <rect x="14" y="28" width="5" height="3" fill="#181B1F"/>
  <rect x="44" y="8" width="6" height="2" fill="#181B1F"/>
  <rect x="50" y="46" width="4" height="4" fill="#181B1F"/>
</svg>
