<svg xmlns="http://www.w3.org/2000/svg" width="120" height="200" shape-rendering="crispEdges">
  <!-- 辦公大樓夜景窗（牆面裝飾，營造高樓深度） -->
  <!-- 窗框外牆 -->
  <rect x="0" y="0" width="120" height="200" fill="#171A22"/>
  <!-- 窗格（夜空藍，城市夜景） -->
  <rect x="10" y="10" width="100" height="180" fill="#13243A"/>
  <!-- 窗格分隔 -->
  <rect x="58" y="10" width="4" height="180" fill="#0E141C"/>
  <rect x="10" y="96" width="100" height="4" fill="#0E141C"/>
  <!-- 遠方城市燈光點 -->
  <rect x="20" y="120" width="6" height="8" fill="#3A5A82"/>
  <rect x="34" y="140" width="4" height="10" fill="#2E4868"/>
  <rect x="72" y="118" width="6" height="12" fill="#46689A"/>
  <rect x="88" y="150" width="5" height="8" fill="#2E4868"/>
  <rect x="24" y="160" width="5" height="6" fill="#3A5A82"/>
  <rect x="80" y="170" width="6" height="6" fill="#3A5A82"/>
  <!-- 玻璃反光斜線 -->
  <rect x="18" y="20" width="3" height="70" fill="#1C3450" opacity="0.7"/>
  <rect x="70" y="20" width="3" height="70" fill="#1C3450" opacity="0.7"/>
</svg>
