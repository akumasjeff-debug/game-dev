<svg xmlns="http://www.w3.org/2000/svg" width="40" height="400" shape-rendering="crispEdges">
  <!-- 倉庫/港口管線（沿牆垂直，工業感） -->
  <!-- 主管 -->
  <rect x="12" y="0" width="16" height="400" fill="#2A2C30"/>
  <rect x="12" y="0" width="5" height="400" fill="#3A3D44"/>
  <rect x="24" y="0" width="4" height="400" fill="#1A1C20"/>
  <!-- 法蘭接環（每 100px） -->
  <rect x="6" y="60" width="28" height="8" fill="#1E2024"/>
  <rect x="6" y="160" width="28" height="8" fill="#1E2024"/>
  <rect x="6" y="260" width="28" height="8" fill="#1E2024"/>
  <rect x="6" y="360" width="28" height="8" fill="#1E2024"/>
  <!-- 固定支架 -->
  <rect x="2" y="110" width="36" height="5" fill="#3A2C18"/>
  <rect x="2" y="310" width="36" height="5" fill="#3A2C18"/>
  <!-- 鏽斑 -->
  <rect x="14" y="200" width="6" height="20" fill="#5A3A20" opacity="0.6"/>
  <rect x="18" y="90" width="5" height="14" fill="#5A3A20" opacity="0.5"/>
</svg>
