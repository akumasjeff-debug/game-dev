<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- 醫療兵 — 俯視，左臂紅十字最顯眼，背部大型急救背包往上突出 -->

  <!-- 落地陰影 -->
  <ellipse cx="32" cy="56" rx="16" ry="5" fill="#000" opacity="0.35"/>

  <!-- 急救背包（往上突出到頭盔後方，最大特徵） -->
  <rect x="22" y="2"  width="20" height="16" fill="#143020"/>
  <!-- 背包十字標誌 -->
  <rect x="29" y="4"  width="6"  height="12" fill="#22BB88"/>
  <rect x="24" y="8"  width="16" height="4"  fill="#22BB88"/>
  <!-- 天線 -->
  <rect x="31" y="0"  width="2"  height="4"  fill="#22BB88"/>

  <!-- 左臂（延伸，帶白綠十字臂章） -->
  <rect x="10" y="24" width="10" height="4"  fill="#1A2A20"/>
  <!-- 十字臂章 -->
  <rect x="11" y="22" width="4"  height="8"  fill="#22BB88"/>
  <rect x="9"  y="25" width="8"  height="3"  fill="#22BB88"/>
  <!-- 白十字內芯 -->
  <rect x="12" y="23" width="2"  height="6"  fill="#DDFFF0"/>
  <rect x="10" y="26" width="6"  height="2"  fill="#DDFFF0"/>

  <!-- 身體（較細，輕型背心） -->
  <rect x="20" y="22" width="24" height="28" fill="#1E3020"/>
  <!-- 背心邊線 -->
  <rect x="31" y="22" width="2"  height="28" fill="#162818"/>

  <!-- 頭盔（軟帽，較小較圓，俯視） -->
  <rect x="24" y="10" width="16" height="14" fill="#1E3022"/>
  <!-- 帽簷（朝上） -->
  <rect x="22" y="10" width="20" height="4"  fill="#162818"/>
  <!-- 面部方向標示（朝北） -->
  <rect x="28" y="10" width="8"  height="2"  fill="#22BB88"/>

  <!-- 右臂 -->
  <rect x="44" y="24" width="8"  height="4"  fill="#1A2A20"/>

  <!-- 手槍（輕型，右腰） -->
  <rect x="46" y="36" width="8"  height="4"  fill="#222"/>
  <rect x="48" y="40" width="4"  height="6"  fill="#2A2A2A"/>

  <!-- 腰帶工具包 -->
  <rect x="20" y="44" width="6"  height="4"  fill="#103020"/>
  <rect x="38" y="44" width="6"  height="4"  fill="#103020"/>

  <!-- 腿 -->
  <rect x="22" y="50" width="8"  height="6"  fill="#0E1A10"/>
  <rect x="34" y="50" width="8"  height="6"  fill="#0E1A10"/>
</svg>
