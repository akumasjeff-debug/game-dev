<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" shape-rendering="crispEdges">
  <!-- 黃褐色狙擊手蹲伏/幾乎趴平姿態（俯視角，32×32）長槍橫向延伸 -->

  <!-- 陰影（趴平，更長更扁） -->
  <rect x="0" y="26" width="32" height="4" fill="#1A1400" opacity="0.35"/>

  <!-- 狙擊槍（橫向延伸穿過畫面，長槍） -->
  <!-- 槍管延伸到最左 -->
  <rect x="0" y="17" width="30" height="3" fill="#2A2000"/>
  <rect x="0" y="17" width="30" height="1" fill="#3A2E00"/>
  <!-- 消音器（左端） -->
  <rect x="0" y="16" width="3" height="5" fill="#1E1800"/>
  <!-- 槍托（右側） -->
  <rect x="26" y="15" width="6" height="6" fill="#1E1600"/>
  <rect x="28" y="15" width="4" height="2" fill="#2A2000"/>
  <!-- 瞄準鏡 -->
  <rect x="14" y="14" width="6" height="3" fill="#1A3A3A"/>
  <rect x="15" y="15" width="4" height="1" fill="#2A5A5A"/>

  <!-- 斗篷覆蓋（不規則邊緣） -->
  <rect x="4" y="8" width="22" height="18" fill="#6B5A00"/>
  <!-- 斗篷邊緣不規則偽裝 -->
  <rect x="4" y="8" width="3" height="2" fill="#5A4C00"/>
  <rect x="8" y="7" width="4" height="3" fill="#5A4C00"/>
  <rect x="14" y="6" width="5" height="3" fill="#7A6800"/>
  <rect x="20" y="7" width="4" height="3" fill="#5A4C00"/>
  <rect x="24" y="9" width="3" height="2" fill="#4A3E00"/>
  <rect x="4" y="22" width="4" height="3" fill="#5A4C00"/>
  <rect x="22" y="24" width="4" height="2" fill="#5A4C00"/>
  <!-- 斗篷高光（中央） -->
  <rect x="10" y="10" width="12" height="4" fill="#7E6E00"/>
  <!-- 斗篷暗部（邊緣） -->
  <rect x="4" y="8" width="2" height="18" fill="#4A3E00"/>
  <rect x="24" y="8" width="2" height="18" fill="#4A3E00"/>

  <!-- 頭盔（幾乎被斗篷包覆，只露一點頂面，8×6 壓低版） -->
  <rect x="13" y="8" width="8" height="6" fill="#6B5A00"/>
  <rect x="13" y="8" width="8" height="2" fill="#806C00"/>
  <!-- 狙擊眼鏡 -->
  <rect x="14" y="10" width="6" height="2" fill="#0A0800"/>
  <rect x="15" y="11" width="4" height="1" fill="#1A1600"/>

  <!-- 偽裝草皮細節（點狀） -->
  <rect x="6" y="14" width="2" height="2" fill="#4A5000"/>
  <rect x="10" y="20" width="2" height="2" fill="#4A5000"/>
  <rect x="18" y="12" width="2" height="2" fill="#4A5000"/>
  <rect x="22" y="19" width="2" height="2" fill="#4A5000"/>
  <rect x="8" y="24" width="2" height="2" fill="#504400"/>
</svg>
