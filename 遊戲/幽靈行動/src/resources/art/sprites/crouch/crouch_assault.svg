<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" shape-rendering="crispEdges">
  <!-- 橙色突擊手蹲伏姿態（俯視角，32×32） -->

  <!-- 陰影 -->
  <rect x="6" y="26" width="20" height="3" fill="#2A1400" opacity="0.4"/>

  <!-- 身體（矮胖型，深橙軍裝） -->
  <rect x="7" y="12" width="18" height="14" fill="#8C4A00"/>
  <!-- 左肩高光 -->
  <rect x="7" y="12" width="5" height="7" fill="#A85800"/>
  <!-- 右側暗部 -->
  <rect x="21" y="12" width="4" height="14" fill="#6A3800"/>

  <!-- 頭盔（8×8，更明顯，有護目鏡） -->
  <rect x="12" y="4" width="8" height="8" fill="#8C4A00"/>
  <rect x="12" y="4" width="8" height="2" fill="#AA5C00"/>
  <rect x="12" y="4" width="2" height="8" fill="#AA5C00"/>
  <rect x="18" y="4" width="2" height="8" fill="#6A3800"/>
  <!-- 護目鏡（明顯反光條） -->
  <rect x="12" y="6" width="8" height="3" fill="#1A1200"/>
  <rect x="13" y="7" width="6" height="1" fill="#3A2800"/>
  <!-- 護目鏡高光 -->
  <rect x="13" y="6" width="2" height="1" fill="#604000"/>
  <rect x="19" y="6" width="1" height="1" fill="#604000"/>

  <!-- 衝鋒槍（擺在大腿上，橫向） -->
  <rect x="6" y="22" width="20" height="3" fill="#252525"/>
  <rect x="6" y="22" width="20" height="1" fill="#383838"/>
  <!-- 槍托 -->
  <rect x="22" y="20" width="4" height="5" fill="#1E1E1E"/>
  <!-- 彈匣（向下） -->
  <rect x="12" y="25" width="4" height="4" fill="#1A1A1A"/>

  <!-- 下肢（蹲伏，大腿展開） -->
  <rect x="7" y="23" width="7" height="4" fill="#6A3800"/>
  <rect x="18" y="23" width="7" height="4" fill="#6A3800"/>

  <!-- 戰術背心細節 -->
  <rect x="10" y="14" width="2" height="3" fill="#7A4000"/>
  <rect x="14" y="13" width="4" height="2" fill="#7A4000"/>
  <rect x="20" y="15" width="2" height="3" fill="#6A3400"/>
</svg>
