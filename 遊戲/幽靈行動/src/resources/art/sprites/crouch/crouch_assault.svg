<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" width="32" height="32">
  <!-- 突擊手蹲伏 TCG 風 — 正面，32x32，頭盔 + 衝鋒槍側出 -->

  <!-- 頭盔 -->
  <rect x="8" y="2" width="16" height="12" fill="#0A0A0A"/>
  <rect x="9" y="3" width="14" height="10" fill="#2A1800"/>
  <rect x="11" y="4" width="10" height="5" fill="#8A3200"/>
  <rect x="11" y="4" width="4" height="2" fill="#E8600A"/>
  <!-- 戰術面罩 -->
  <rect x="10" y="8" width="12" height="4" fill="#1A0C00"/>
  <rect x="11" y="9" width="2" height="2" fill="#2A1400"/>
  <rect x="15" y="9" width="2" height="2" fill="#2A1400"/>
  <rect x="19" y="9" width="2" height="2" fill="#2A1400"/>
  <!-- 頭盔下沿 -->
  <rect x="9" y="13" width="14" height="1" fill="#1A0C00"/>

  <!-- 頸部 -->
  <rect x="13" y="14" width="6" height="3" fill="#1E1000"/>

  <!-- 衝鋒槍（左側伸出，最醒目） -->
  <rect x="1" y="17" width="10" height="5" fill="#0A0A0A"/>
  <rect x="2" y="18" width="8" height="3" fill="#282828"/>
  <rect x="2" y="18" width="4" height="3" fill="#1E1E1E"/>
  <!-- 彈匣 -->
  <rect x="5" y="21" width="4" height="6" fill="#222"/>
  <!-- 瞄準器 -->
  <rect x="4" y="16" width="4" height="2" fill="#E8600A"/>

  <!-- 身體（壓縮版，戰術背心） -->
  <rect x="9" y="16" width="18" height="14" fill="#0A0A0A"/>
  <rect x="10" y="17" width="16" height="12" fill="#2A1800"/>
  <rect x="12" y="18" width="12" height="9" fill="#381E00"/>
  <!-- 胸甲中線 -->
  <rect x="15" y="18" width="2" height="9" fill="#1A0C00"/>
  <!-- 胸甲高光 -->
  <rect x="12" y="18" width="5" height="3" fill="#8A3200"/>
  <!-- MOLLE 彈匣袋 -->
  <rect x="12" y="22" width="5" height="5" fill="#1E1000"/>
  <rect x="19" y="22" width="5" height="5" fill="#1E1000"/>
  <!-- 橙色臂章 -->
  <rect x="10" y="19" width="2" height="4" fill="#E8600A"/>

  <!-- 右臂 -->
  <rect x="27" y="17" width="4" height="10" fill="#0A0A0A"/>
  <rect x="28" y="18" width="3" height="9" fill="#2A1800"/>
</svg>
