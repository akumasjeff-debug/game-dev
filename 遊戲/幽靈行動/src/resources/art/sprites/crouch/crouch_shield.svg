<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" width="32" height="32">
  <!-- 盾兵蹲伏 TCG 風 — 正面，32x32，頭盔壓低 + 大盾掩護 -->

  <!-- 頭盔 -->
  <rect x="8" y="2" width="16" height="12" fill="#0A0A0A"/>
  <rect x="9" y="3" width="14" height="10" fill="#1A2D5A"/>
  <rect x="11" y="4" width="10" height="5" fill="#2255BB"/>
  <rect x="11" y="4" width="4" height="2" fill="#4488FF"/>
  <!-- 護目鏡 -->
  <rect x="10" y="8" width="5" height="3" fill="#0D1F44"/>
  <rect x="17" y="8" width="5" height="3" fill="#0D1F44"/>
  <rect x="11" y="9" width="2" height="1" fill="#4488FF"/>
  <rect x="18" y="9" width="2" height="1" fill="#4488FF"/>
  <!-- 頭盔下沿 -->
  <rect x="9" y="13" width="14" height="1" fill="#0D1830"/>

  <!-- 頸部 -->
  <rect x="13" y="14" width="6" height="3" fill="#1A2840"/>

  <!-- 大盾（左側掩護，主特徵） -->
  <rect x="1" y="14" width="8" height="14" fill="#0A0A0A"/>
  <rect x="2" y="15" width="6" height="12" fill="#0F2A7A"/>
  <rect x="2" y="15" width="2" height="12" fill="#1844A8"/>
  <rect x="2" y="19" width="6" height="2" fill="#2255BB"/>
  <rect x="2" y="23" width="6" height="2" fill="#2255BB"/>
  <rect x="3" y="21" width="3" height="3" fill="#4488FF"/>

  <!-- 身體（壓縮版） -->
  <rect x="9" y="16" width="18" height="14" fill="#0A0A0A"/>
  <rect x="10" y="17" width="16" height="12" fill="#1A2D5A"/>
  <rect x="12" y="18" width="12" height="9" fill="#1D3368"/>
  <!-- 胸甲中線 -->
  <rect x="15" y="18" width="2" height="9" fill="#0F1D40"/>
  <!-- 胸甲高光 -->
  <rect x="12" y="18" width="5" height="3" fill="#2255BB"/>
  <!-- 識別鉚釘 -->
  <rect x="12" y="23" width="2" height="2" fill="#4488FF"/>

  <!-- 右臂 -->
  <rect x="27" y="17" width="4" height="10" fill="#0A0A0A"/>
  <rect x="28" y="18" width="3" height="9" fill="#1A2840"/>
</svg>
