<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" width="32" height="32">
  <!-- 爆破手蹲伏 TCG 風 — 正面，32x32，頭盔 + 警告條紋 -->

  <!-- 頭盔 -->
  <rect x="8" y="2" width="16" height="12" fill="#0A0A0A"/>
  <rect x="9" y="3" width="14" height="10" fill="#3A0A0A"/>
  <rect x="11" y="4" width="10" height="5" fill="#8A1A1A"/>
  <rect x="11" y="4" width="4" height="2" fill="#CC2222"/>
  <!-- 護目鏡（整條） -->
  <rect x="10" y="7" width="12" height="4" fill="#1E0808"/>
  <rect x="11" y="8" width="2" height="2" fill="#CC2222"/>
  <rect x="19" y="8" width="2" height="2" fill="#CC2222"/>
  <!-- 警告條紋（頭盔底部） -->
  <rect x="9" y="11" width="14" height="3" fill="#DDAA00"/>
  <rect x="9" y="11" width="2" height="3" fill="#1A0A0A"/>
  <rect x="13" y="11" width="2" height="3" fill="#1A0A0A"/>
  <rect x="17" y="11" width="2" height="3" fill="#1A0A0A"/>
  <rect x="21" y="11" width="2" height="3" fill="#1A0A0A"/>
  <!-- 頭盔下沿 -->
  <rect x="9" y="13" width="14" height="1" fill="#200808"/>

  <!-- 頸部 -->
  <rect x="13" y="14" width="6" height="3" fill="#280808"/>

  <!-- 引爆器（左側，主道具） -->
  <rect x="1" y="16" width="8" height="12" fill="#0A0A0A"/>
  <rect x="2" y="17" width="6" height="10" fill="#5A1010"/>
  <!-- 螢幕 -->
  <rect x="2" y="18" width="5" height="4" fill="#001A00"/>
  <rect x="3" y="19" width="3" height="2" fill="#00CC00"/>
  <!-- 紅色引爆按鈕 -->
  <rect x="2" y="24" width="3" height="2" fill="#EE0000"/>
  <rect x="3" y="25" width="1" height="1" fill="#FF4444"/>

  <!-- 身體（壓縮版，深紅重甲） -->
  <rect x="9" y="16" width="18" height="14" fill="#0A0A0A"/>
  <rect x="10" y="17" width="16" height="12" fill="#3A0A0A"/>
  <rect x="12" y="18" width="12" height="9" fill="#4A0E0E"/>
  <!-- 胸甲中線 -->
  <rect x="15" y="18" width="2" height="9" fill="#200808"/>
  <!-- 胸甲高光 -->
  <rect x="12" y="18" width="5" height="3" fill="#8A1A1A"/>
  <!-- 炸藥條（胸口） -->
  <rect x="12" y="22" width="12" height="3" fill="#DDAA00"/>
  <rect x="13" y="23" width="2" height="1" fill="#CC2222"/>
  <rect x="17" y="23" width="2" height="1" fill="#CC2222"/>
  <rect x="21" y="23" width="2" height="1" fill="#CC2222"/>
  <!-- 識別臂章（紅色） -->
  <rect x="10" y="19" width="2" height="4" fill="#CC2222"/>

  <!-- 右臂 -->
  <rect x="27" y="17" width="4" height="10" fill="#0A0A0A"/>
  <rect x="28" y="18" width="3" height="9" fill="#3A0A0A"/>
</svg>
