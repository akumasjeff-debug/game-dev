<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" shape-rendering="crispEdges">
  <!-- 紅色爆破手蹲伏姿態（俯視角，32×32） -->

  <!-- 陰影 -->
  <rect x="5" y="26" width="22" height="3" fill="#1A0000" opacity="0.4"/>

  <!-- 身體（寬壯體型，深紅軍裝） -->
  <rect x="6" y="12" width="20" height="14" fill="#7A1515"/>
  <!-- 左肩高光 -->
  <rect x="6" y="12" width="6" height="7" fill="#921A1A"/>
  <!-- 右側暗部 -->
  <rect x="22" y="12" width="4" height="14" fill="#5C0F0F"/>
  <!-- 防爆背心紋路 -->
  <rect x="10" y="13" width="12" height="2" fill="#6A1212"/>
  <rect x="10" y="17" width="12" height="2" fill="#6A1212"/>
  <rect x="10" y="21" width="12" height="2" fill="#6A1212"/>

  <!-- 頭盔（8×8，防爆頭盔，更圓） -->
  <rect x="12" y="4" width="8" height="8" fill="#7A1515"/>
  <rect x="12" y="4" width="8" height="2" fill="#961A1A"/>
  <rect x="12" y="4" width="2" height="8" fill="#961A1A"/>
  <rect x="18" y="4" width="2" height="8" fill="#5C0F0F"/>
  <!-- 面罩 -->
  <rect x="13" y="6" width="6" height="3" fill="#1A0808"/>
  <rect x="14" y="7" width="4" height="2" fill="#2A1010"/>

  <!-- 火箭筒（橫放在身體右側） -->
  <rect x="24" y="10" width="6" height="14" fill="#5A3000"/>
  <rect x="24" y="10" width="6" height="2" fill="#724000"/>
  <rect x="28" y="10" width="2" height="14" fill="#3A2000"/>
  <!-- 火箭筒口（前端） -->
  <rect x="24" y="10" width="6" height="3" fill="#2A1800"/>
  <rect x="25" y="11" width="4" height="1" fill="#1A0E00"/>

  <!-- 下肢（蹲伏，寬腳距） -->
  <rect x="6" y="23" width="8" height="4" fill="#5C0F0F"/>
  <rect x="18" y="23" width="8" height="4" fill="#5C0F0F"/>

  <!-- 炸藥包細節（左腰） -->
  <rect x="4" y="15" width="4" height="6" fill="#8B2500"/>
  <rect x="4" y="16" width="4" height="1" fill="#AA2E00"/>
  <!-- 引線 -->
  <rect x="5" y="14" width="1" height="3" fill="#FFAA00"/>
</svg>
