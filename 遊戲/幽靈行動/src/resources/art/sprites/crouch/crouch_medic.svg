<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" width="32" height="32">
  <!-- 醫療兵蹲伏 TCG 風 — 正面，32x32，頭盔 + 紅十字可見 -->

  <!-- 頭盔 -->
  <rect x="8" y="2" width="16" height="12" fill="#0A0A0A"/>
  <rect x="9" y="3" width="14" height="10" fill="#1A3A1A"/>
  <rect x="11" y="4" width="10" height="5" fill="#2A7A2A"/>
  <rect x="11" y="4" width="4" height="2" fill="#44CC44"/>
  <!-- 頭盔紅十字 -->
  <rect x="14" y="4" width="4" height="1" fill="#EE3333"/>
  <rect x="15" y="3" width="2" height="3" fill="#EE3333"/>
  <!-- 護目鏡 -->
  <rect x="10" y="8" width="5" height="3" fill="#0A2A0A"/>
  <rect x="17" y="8" width="5" height="3" fill="#0A2A0A"/>
  <rect x="11" y="9" width="2" height="1" fill="#44CC44"/>
  <rect x="18" y="9" width="2" height="1" fill="#44CC44"/>
  <!-- 頭盔下沿 -->
  <rect x="9" y="13" width="14" height="1" fill="#0A1E0A"/>

  <!-- 頸部 -->
  <rect x="13" y="14" width="6" height="3" fill="#162816"/>

  <!-- 醫療包（左側，最醒目特徵） -->
  <rect x="1" y="16" width="8" height="12" fill="#0A0A0A"/>
  <rect x="2" y="17" width="6" height="10" fill="#C8C830"/>
  <!-- 醫療包紅十字 -->
  <rect x="3" y="20" width="4" height="1" fill="#EE1111"/>
  <rect x="4" y="19" width="2" height="3" fill="#EE1111"/>

  <!-- 身體（壓縮版） -->
  <rect x="9" y="16" width="18" height="14" fill="#0A0A0A"/>
  <rect x="10" y="17" width="16" height="12" fill="#1A3A1A"/>
  <rect x="12" y="18" width="12" height="9" fill="#1E4C1E"/>
  <!-- 胸甲中線 -->
  <rect x="15" y="18" width="2" height="9" fill="#0F280F"/>
  <!-- 胸甲高光 -->
  <rect x="12" y="18" width="5" height="3" fill="#2A7A2A"/>
  <!-- 胸口紅十字 -->
  <rect x="13" y="22" width="6" height="2" fill="#EE3333"/>
  <rect x="15" y="21" width="2" height="4" fill="#EE3333"/>

  <!-- 右臂 -->
  <rect x="27" y="17" width="4" height="10" fill="#0A0A0A"/>
  <rect x="28" y="18" width="3" height="9" fill="#162816"/>
</svg>
