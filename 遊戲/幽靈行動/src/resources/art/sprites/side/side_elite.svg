<svg viewBox="0 0 28 42" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- 精英兵 — 側視角，面朝左，深橙紅重甲，護肩突出 -->

  <!-- 頭盔（重型，半面遮罩）-->
  <rect x="5"  y="0"  width="16" height="2"  fill="#7A2800"/>
  <rect x="3"  y="2"  width="18" height="9"  fill="#7A2800"/>
  <!-- 面罩（下半）-->
  <rect x="3"  y="8"  width="6"  height="4"  fill="#5A1E00"/>
  <!-- 護目鏡（橙紅反光）-->
  <rect x="3"  y="3"  width="5"  height="3"  fill="#CC4400"/>
  <rect x="3"  y="4"  width="3"  height="2"  fill="#FF6620"/>
  <!-- 頭盔頂高光 -->
  <rect x="5"  y="0"  width="16" height="2"  fill="#CC4400"/>
  <!-- 後護板 -->
  <rect x="19" y="4"  width="2"  height="7"  fill="#5A1E00"/>

  <!-- 脖子 -->
  <rect x="11" y="11" width="5"  height="2"  fill="#7A2800"/>

  <!-- 護肩（左側，突出）-->
  <rect x="3"  y="12" width="6"  height="6"  fill="#CC4400"/>
  <rect x="2"  y="13" width="8"  height="4"  fill="#CC4400"/>
  <!-- 護肩邊緣 -->
  <rect x="2"  y="13" width="2"  height="4"  fill="#FF6620"/>

  <!-- 護肩（右側）-->
  <rect x="19" y="12" width="6"  height="6"  fill="#CC4400"/>
  <rect x="19" y="13" width="8"  height="4"  fill="#CC4400"/>
  <rect x="25" y="13" width="2"  height="4"  fill="#FF6620"/>

  <!-- 身體（重甲，寬壯）-->
  <rect x="7"  y="13" width="14" height="13" fill="#7A2800"/>
  <!-- 胸甲板 -->
  <rect x="8"  y="14" width="10" height="10" fill="#CC4400"/>
  <!-- 甲板線 -->
  <rect x="7"  y="19" width="14" height="2"  fill="#5A1E00"/>
  <rect x="13" y="14" width="2"  height="10" fill="#5A1E00"/>
  <!-- 腰甲 -->
  <rect x="7"  y="25" width="14" height="3"  fill="#5A1E00"/>

  <!-- 左臂（前側，持槍，朝左）-->
  <rect x="3"  y="18" width="5"  height="9"  fill="#7A2800"/>
  <!-- 右臂（後側）-->
  <rect x="20" y="18" width="5"  height="9"  fill="#7A2800"/>

  <!-- 腿部（寬壯）-->
  <rect x="8"  y="28" width="5"  height="7"  fill="#5A1E00"/>
  <rect x="14" y="28" width="5"  height="7"  fill="#5A1E00"/>
  <!-- 腿部甲板 -->
  <rect x="8"  y="29" width="5"  height="2"  fill="#CC4400"/>
  <rect x="14" y="29" width="5"  height="2"  fill="#CC4400"/>
  <!-- 腳（面朝左）-->
  <rect x="4"  y="35" width="9"  height="4"  fill="#3A1000"/>
  <rect x="11" y="35" width="8"  height="4"  fill="#3A1000"/>

  <!-- 突擊步槍（朝左，槍口指向左，更長更粗）-->
  <!-- 槍口消焰器 -->
  <rect x="0"  y="19" width="2"  height="3"  fill="#111"/>
  <!-- 槍身 -->
  <rect x="1"  y="20" width="10" height="3"  fill="#222"/>
  <!-- 槍托 -->
  <rect x="11" y="19" width="4"  height="5"  fill="#333"/>
  <!-- 彈匣（大型）-->
  <rect x="4"  y="23" width="4"  height="6"  fill="#2A2A2A"/>
  <!-- 瞄準鏡 -->
  <rect x="3"  y="18" width="6"  height="2"  fill="#444"/>
</svg>
