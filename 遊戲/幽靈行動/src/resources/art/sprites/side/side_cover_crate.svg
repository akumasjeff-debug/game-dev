<svg viewBox="0 0 40 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- 木箱掩體 — 側視角，40×32px -->

  <!-- 箱體主體 -->
  <rect x="1"  y="4"  width="38" height="26" fill="#8B5E3C"/>

  <!-- 頂面（稍亮，代表受光）-->
  <rect x="1"  y="4"  width="38" height="4"  fill="#A87040"/>

  <!-- 木板橫紋（四條）-->
  <rect x="1"  y="10" width="38" height="2"  fill="#6B4424"/>
  <rect x="1"  y="18" width="38" height="2"  fill="#6B4424"/>
  <rect x="1"  y="26" width="38" height="2"  fill="#6B4424"/>

  <!-- 木板縱紋（三條，分割面板）-->
  <rect x="13" y="4"  width="2"  height="26" fill="#6B4424"/>
  <rect x="25" y="4"  width="2"  height="26" fill="#6B4424"/>

  <!-- 邊框（暗色加粗邊）-->
  <rect x="0"  y="4"  width="2"  height="26" fill="#6B4424"/>
  <rect x="38" y="4"  width="2"  height="26" fill="#4A2E0A"/>
  <rect x="0"  y="4"  width="40" height="2"  fill="#6B4424"/>
  <rect x="0"  y="28" width="40" height="4"  fill="#4A2E0A"/>

  <!-- 角落鐵扣（左上）-->
  <rect x="1"  y="4"  width="4"  height="2"  fill="#555"/>
  <rect x="1"  y="4"  width="2"  height="6"  fill="#555"/>

  <!-- 角落鐵扣（右上）-->
  <rect x="35" y="4"  width="4"  height="2"  fill="#555"/>
  <rect x="37" y="4"  width="2"  height="6"  fill="#555"/>

  <!-- 角落鐵扣（左下）-->
  <rect x="1"  y="26" width="4"  height="2"  fill="#555"/>
  <rect x="1"  y="22" width="2"  height="6"  fill="#555"/>

  <!-- 角落鐵扣（右下）-->
  <rect x="35" y="26" width="4"  height="2"  fill="#555"/>
  <rect x="37" y="22" width="2"  height="6"  fill="#555"/>

  <!-- 中央鎖扣 -->
  <rect x="18" y="14" width="4"  height="3"  fill="#777"/>
  <rect x="19" y="17" width="2"  height="2"  fill="#555"/>

  <!-- 木紋細節（左板）-->
  <rect x="3"  y="12" width="8"  height="1"  fill="#9B6830"/>
  <rect x="4"  y="20" width="6"  height="1"  fill="#9B6830"/>

  <!-- 木紋細節（右板）-->
  <rect x="28" y="12" width="8"  height="1"  fill="#9B6830"/>
  <rect x="29" y="22" width="6"  height="1"  fill="#9B6830"/>

  <!-- 陰影（箱子底部投影）-->
  <rect x="3"  y="30" width="36" height="2"  fill="#2A1600" opacity="0.5"/>
</svg>
