<svg viewBox="0 0 32 48" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- 盾兵 — 側視角，面朝右，藍色重甲 -->

  <!-- 頭盔（側面，深藍護盔）-->
  <rect x="10" y="0"  width="14" height="2"  fill="#1A3A8C"/>
  <rect x="8"  y="2"  width="16" height="10" fill="#1A3A8C"/>
  <!-- 頭盔護目鏡 -->
  <rect x="18" y="4"  width="4"  height="3"  fill="#0A1F5C"/>
  <!-- 頭盔前緣高光 -->
  <rect x="22" y="2"  width="2"  height="10" fill="#2A5AD4"/>
  <!-- 頭盔頂高光 -->
  <rect x="10" y="0"  width="14" height="2"  fill="#2A5AD4"/>

  <!-- 脖子 -->
  <rect x="13" y="12" width="6"  height="2"  fill="#1A3A8C"/>

  <!-- 身體（重甲胸板）-->
  <rect x="10" y="14" width="14" height="16" fill="#1A3A8C"/>
  <!-- 胸甲高光 -->
  <rect x="11" y="15" width="6"  height="8"  fill="#2A5AD4"/>
  <!-- 胸甲分割線 -->
  <rect x="10" y="22" width="14" height="2"  fill="#0F2260"/>

  <!-- 左臂（持盾，在左/後側）-->
  <rect x="6"  y="14" width="4"  height="12" fill="#1A3A8C"/>
  <!-- 右臂（持槍，在右/前側）-->
  <rect x="24" y="14" width="4"  height="10" fill="#1A3A8C"/>

  <!-- 大盾牌（左手，側視像長板）-->
  <rect x="0"  y="10" width="6"  height="22" fill="#1A3A8C"/>
  <rect x="1"  y="11" width="4"  height="20" fill="#2A5AD4"/>
  <!-- 盾牌中央鉚釘 -->
  <rect x="2"  y="19" width="2"  height="4"  fill="#4A7AE4"/>
  <!-- 盾牌橫紋 -->
  <rect x="1"  y="15" width="4"  height="2"  fill="#3A6ACC"/>
  <rect x="1"  y="25" width="4"  height="2"  fill="#3A6ACC"/>

  <!-- 腿部 -->
  <rect x="11" y="30" width="6"  height="8"  fill="#0F2260"/>
  <rect x="17" y="30" width="6"  height="8"  fill="#0F2260"/>
  <!-- 腳 -->
  <rect x="10" y="38" width="8"  height="4"  fill="#0A1840"/>
  <rect x="17" y="38" width="8"  height="4"  fill="#0A1840"/>

  <!-- 突擊步槍（右手，槍口朝右）-->
  <rect x="28" y="18" width="4"  height="3"  fill="#111"/>
  <!-- 槍身 -->
  <rect x="22" y="20" width="10" height="3"  fill="#222"/>
  <!-- 彈匣（向下）-->
  <rect x="26" y="23" width="3"  height="5"  fill="#2A2A2A"/>
  <!-- 槍托 -->
  <rect x="22" y="21" width="3"  height="4"  fill="#333"/>
</svg>
