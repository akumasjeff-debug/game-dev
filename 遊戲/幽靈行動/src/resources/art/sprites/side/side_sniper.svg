<svg viewBox="0 0 36 48" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- 狙擊手 — 側視角，面朝右，棕色吉利服，長管狙擊槍 -->

  <!-- 吉利服布條（背部，多層半透明，最底層）-->
  <rect x="3"  y="8"  width="4"  height="14" fill="#2D4A1E" opacity="0.7"/>
  <rect x="2"  y="10" width="3"  height="10" fill="#3A5A28" opacity="0.5"/>
  <rect x="4"  y="12" width="3"  height="8"  fill="#4A3820" opacity="0.6"/>
  <rect x="1"  y="14" width="4"  height="6"  fill="#2D4A1E" opacity="0.5"/>
  <!-- 吉利布條（腰部延伸）-->
  <rect x="2"  y="24" width="5"  height="8"  fill="#2D4A1E" opacity="0.6"/>
  <rect x="3"  y="26" width="4"  height="6"  fill="#3A5A28" opacity="0.4"/>

  <!-- 頭盔（小型，深棕）-->
  <rect x="10" y="0"  width="12" height="2"  fill="#4A3820"/>
  <rect x="8"  y="2"  width="14" height="8"  fill="#4A3820"/>
  <!-- 面罩（覆蓋大部分臉）-->
  <rect x="17" y="4"  width="6"  height="7"  fill="#3A2A14"/>
  <!-- 護目鏡（綠色，前端）-->
  <rect x="19" y="4"  width="4"  height="3"  fill="#1A6622"/>
  <rect x="20" y="5"  width="3"  height="2"  fill="#33FF44"/>
  <!-- 頭盔帶 -->
  <rect x="8"  y="9"  width="14" height="2"  fill="#2D2010"/>
  <!-- 吉利布條（頭部，稀疏）-->
  <rect x="9"  y="1"  width="2"  height="4"  fill="#2D4A1E" opacity="0.6"/>
  <rect x="11" y="0"  width="2"  height="3"  fill="#3A5A28" opacity="0.5"/>

  <!-- 脖子 -->
  <rect x="13" y="11" width="5"  height="2"  fill="#4A3820"/>

  <!-- 身體（吉利服，暗綠底）-->
  <rect x="9"  y="13" width="13" height="14" fill="#2D4A1E"/>
  <!-- 吉利外套覆蓋 -->
  <rect x="10" y="14" width="10" height="11" fill="#4A3820" opacity="0.8"/>
  <!-- 吉利網紋（暗色條紋）-->
  <rect x="10" y="16" width="10" height="2"  fill="#2D4A1E" opacity="0.7"/>
  <rect x="10" y="20" width="10" height="2"  fill="#2D4A1E" opacity="0.7"/>
  <!-- 彈藥帶（腰部）-->
  <rect x="9"  y="26" width="13" height="2"  fill="#3A2A14"/>
  <!-- 工具包（腰側）-->
  <rect x="7"  y="25" width="3"  height="4"  fill="#4A3820"/>

  <!-- 左臂（後側）-->
  <rect x="6"  y="13" width="4"  height="10" fill="#2D4A1E"/>
  <!-- 右臂（前側，持槍）-->
  <rect x="22" y="13" width="4"  height="10" fill="#2D4A1E"/>
  <!-- 右手前伸（扶槍）-->
  <rect x="25" y="17" width="4"  height="3"  fill="#3A2A14"/>

  <!-- 腿部 -->
  <rect x="11" y="28" width="5"  height="9"  fill="#3A2A14"/>
  <rect x="16" y="28" width="5"  height="9"  fill="#3A2A14"/>
  <!-- 腳 -->
  <rect x="10" y="37" width="7"  height="4"  fill="#2A1A08"/>
  <rect x="16" y="37" width="7"  height="4"  fill="#2A1A08"/>
  <!-- 地面陰影 -->
  <ellipse cx="16" cy="44" rx="10" ry="2" fill="#000000" opacity="0.25"/>

  <!-- 狙擊槍（長管，斜向右上，約 36px）-->
  <!-- 槍管（細長，斜向右上）-->
  <rect x="26" y="10" width="2"  height="2"  fill="#0A0A0A"/>
  <rect x="25" y="12" width="2"  height="2"  fill="#111"/>
  <rect x="24" y="14" width="2"  height="2"  fill="#111"/>
  <rect x="23" y="16" width="3"  height="3"  fill="#1A1A1A"/>
  <!-- 槍身主體 -->
  <rect x="22" y="18" width="4"  height="3"  fill="#222"/>
  <rect x="18" y="19" width="6"  height="4"  fill="#2A2A2A"/>
  <!-- 瞄準鏡 -->
  <rect x="20" y="17" width="6"  height="2"  fill="#333"/>
  <rect x="21" y="16" width="4"  height="2"  fill="#444"/>
  <rect x="22" y="15" width="2"  height="2"  fill="#555"/>
  <!-- 槍托 -->
  <rect x="14" y="19" width="5"  height="5"  fill="#333"/>
  <!-- 彈匣 -->
  <rect x="19" y="23" width="3"  height="5"  fill="#222"/>
  <!-- 消音器（槍口，更長）-->
  <rect x="26" y="8"  width="2"  height="3"  fill="#1A1A1A"/>
</svg>
