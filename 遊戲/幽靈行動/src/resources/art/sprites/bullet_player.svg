<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" width="16" height="16">
  <!-- 玩家曳光彈 — 縱向飛行（向上），尖端朝上，後段拖尾 -->

  <!-- 外層光暈（半透明黃，營造發光感） -->
  <rect x="5" y="1" width="6" height="13" fill="#FFE066" opacity="0.25"/>
  <rect x="6" y="0" width="4" height="15" fill="#FFEE88" opacity="0.35"/>

  <!-- 拖尾（後段漸淡的曳光，向下延伸） -->
  <rect x="7" y="11" width="2" height="3" fill="#FFB020" opacity="0.55"/>
  <rect x="7" y="13" width="2" height="2" fill="#FF8800" opacity="0.30"/>

  <!-- 彈體外殼（黃銅本體） -->
  <rect x="6" y="4" width="4" height="8" fill="#D4A017"/>
  <!-- 彈體左側暗面 -->
  <rect x="6" y="4" width="1" height="8" fill="#A87A0E"/>
  <!-- 彈體右側高光 -->
  <rect x="9" y="4" width="1" height="8" fill="#FFD84A"/>

  <!-- 彈頭（銀色尖端，朝上） -->
  <rect x="7" y="2" width="2" height="2" fill="#F4F4F4"/>
  <rect x="7" y="1" width="2" height="1" fill="#FFFFFF"/>
  <!-- 彈頭高光點 -->
  <rect x="8" y="2" width="1" height="1" fill="#FFFFFF"/>

  <!-- 熾熱核心（中央亮白，曳光燃燒感） -->
  <rect x="7" y="5" width="2" height="4" fill="#FFF4C0" opacity="0.8"/>
</svg>
