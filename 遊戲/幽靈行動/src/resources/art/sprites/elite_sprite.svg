<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- 精英 — 俯視，面朝北，橙色系重甲精英兵 -->

  <!-- 落地陰影（比普通兵大） -->
  <ellipse cx="32" cy="57" rx="18" ry="5" fill="#000" opacity="0.35"/>

  <!-- 腿（粗壯裝甲腿） -->
  <rect x="22" y="50" width="8"  height="7" fill="#6A3200"/>
  <rect x="34" y="50" width="8"  height="7" fill="#6A3200"/>
  <!-- 護膝 -->
  <rect x="23" y="50" width="6"  height="3" fill="#8B4500"/>
  <rect x="35" y="50" width="6"  height="3" fill="#8B4500"/>

  <!-- 身體（寬厚裝甲，橙色） -->
  <rect x="20" y="24" width="24" height="28" fill="#7A3800"/>
  <!-- 胸甲分格 -->
  <rect x="31" y="24" width="2"  height="28" fill="#5A2800"/>
  <!-- 重型胸甲板 -->
  <rect x="22" y="26" width="20" height="16" fill="#E05010"/>
  <!-- 胸甲細節條 -->
  <rect x="22" y="30" width="20" height="2"  fill="#CC4500"/>
  <rect x="22" y="36" width="20" height="2"  fill="#CC4500"/>
  <!-- 胸甲中央徽章 -->
  <rect x="29" y="28" width="6"  height="6"  fill="#FF7030"/>
  <rect x="30" y="29" width="4"  height="4"  fill="#FFAA60"/>

  <!-- 左臂（有護甲板） -->
  <rect x="14" y="26" width="6"  height="14" fill="#7A3800"/>
  <rect x="14" y="28" width="6"  height="6"  fill="#CC4500"/>
  <!-- 右臂 -->
  <rect x="44" y="26" width="6"  height="14" fill="#7A3800"/>
  <rect x="44" y="28" width="6"  height="6"  fill="#CC4500"/>

  <!-- 突擊步槍（右側，比普通兵大） -->
  <rect x="48" y="18" width="5"  height="20" fill="#222"/>
  <rect x="48" y="38" width="5"  height="6"  fill="#2A2A2A"/>
  <!-- 彈匣（大型） -->
  <rect x="50" y="36" width="5"  height="8"  fill="#1A1A1A"/>
  <!-- 槍管 -->
  <rect x="49" y="12" width="3"  height="8"  fill="#111"/>

  <!-- 頭盔（重型，俯視頂部，橙邊框） -->
  <rect x="22" y="8"  width="20" height="18" fill="#5A2800"/>
  <!-- 頭盔前緣高光 -->
  <rect x="24" y="8"  width="16" height="3"  fill="#E05010"/>
  <!-- 護目鏡（橙色鏡片） -->
  <rect x="25" y="12" width="5"  height="5"  fill="#FF7020"/>
  <rect x="34" y="12" width="5"  height="5"  fill="#FF7020"/>
  <!-- 頭盔後遮 -->
  <rect x="22" y="24" width="20" height="3"  fill="#4A2000"/>
</svg>
