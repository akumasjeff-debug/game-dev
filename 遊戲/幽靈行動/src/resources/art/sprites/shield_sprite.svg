<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- 盾兵 — 俯視正上方，面朝北，左手大盾為最大特徵 -->

  <!-- 落地陰影 -->
  <ellipse cx="34" cy="56" rx="18" ry="5" fill="#000" opacity="0.35"/>

  <!-- 大盾（左側，最寬最顯眼的區塊） -->
  <rect x="4"  y="20" width="12" height="28" fill="#1A44AA"/>
  <rect x="6"  y="22" width="8"  height="24" fill="#2255BB"/>
  <!-- 盾牌橫紋 -->
  <rect x="6"  y="26" width="8"  height="4"  fill="#4477CC"/>
  <rect x="6"  y="34" width="8"  height="4"  fill="#4477CC"/>
  <!-- 盾牌中央鉚釘 -->
  <rect x="9"  y="31" width="4"  height="4"  fill="#6699DD"/>

  <!-- 左臂 -->
  <rect x="16" y="28" width="4"  height="12" fill="#1A2840"/>

  <!-- 身體（寬壯裝甲）-->
  <rect x="20" y="24" width="24" height="28" fill="#1E3050"/>
  <!-- 胸甲分格線 -->
  <rect x="31" y="24" width="2"  height="28" fill="#162440"/>
  <!-- 肩甲 -->
  <rect x="18" y="24" width="6"  height="8"  fill="#243860"/>
  <rect x="40" y="24" width="6"  height="8"  fill="#243860"/>

  <!-- 頭盔（俯視看到頭盔頂部，深藍） -->
  <rect x="22" y="8"  width="20" height="18" fill="#162040"/>
  <!-- 頭盔前緣（朝上方，代表臉/瞄準方向） -->
  <rect x="24" y="8"  width="16" height="4"  fill="#2255BB"/>
  <!-- 頭盔護目鏡縫線 -->
  <rect x="26" y="12" width="4"  height="4"  fill="#1A1A2A"/>
  <rect x="34" y="12" width="4"  height="4"  fill="#1A1A2A"/>

  <!-- 右臂 -->
  <rect x="44" y="28" width="4"  height="10" fill="#1A2840"/>

  <!-- 短衝鋒槍（右側，緊貼身體） -->
  <rect x="48" y="26" width="8"  height="4"  fill="#222"/>
  <rect x="48" y="30" width="6"  height="8"  fill="#333"/>
  <!-- 彈匣 -->
  <rect x="50" y="38" width="4"  height="6"  fill="#2A2A2A"/>

  <!-- 腿（兩塊，俯視只見腳尖） -->
  <rect x="22" y="50" width="8"  height="6"  fill="#0E1A2E"/>
  <rect x="34" y="50" width="8"  height="6"  fill="#0E1A2E"/>
</svg>
