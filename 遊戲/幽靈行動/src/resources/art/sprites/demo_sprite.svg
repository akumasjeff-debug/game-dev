<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- 爆破手 — 俯視，超大炸藥背包往上突出，黃黑警告條紋最顯眼 -->

  <!-- 落地陰影（背包讓整體更寬） -->
  <ellipse cx="32" cy="56" rx="18" ry="5" fill="#000" opacity="0.35"/>

  <!-- 炸藥背包（最大特徵，黃黑警告條紋，佔畫面上方大塊） -->
  <rect x="18" y="2"  width="28" height="20" fill="#111100"/>
  <!-- 黃黑警告條紋 -->
  <rect x="18" y="2"  width="28" height="4"  fill="#DDAA00"/>
  <rect x="18" y="6"  width="28" height="4"  fill="#111100"/>
  <rect x="18" y="10" width="28" height="4"  fill="#DDAA00"/>
  <rect x="18" y="14" width="28" height="4"  fill="#111100"/>
  <rect x="18" y="18" width="28" height="4"  fill="#DDAA00"/>
  <!-- 背包扣環 -->
  <rect x="28" y="0"  width="8"  height="4"  fill="#888"/>
  <!-- 引線接頭 -->
  <rect x="22" y="0"  width="4"  height="6"  fill="#DDAA00"/>
  <rect x="38" y="0"  width="4"  height="6"  fill="#DDAA00"/>

  <!-- 肩帶 -->
  <rect x="20" y="20" width="6"  height="6"  fill="#1A1A08"/>
  <rect x="38" y="20" width="6"  height="6"  fill="#1A1A08"/>

  <!-- 寬壯身體 -->
  <rect x="18" y="24" width="28" height="24" fill="#201E10"/>
  <!-- 防火護臂 -->
  <rect x="18" y="25" width="6"  height="12" fill="#181808"/>
  <rect x="40" y="25" width="6"  height="12" fill="#181808"/>

  <!-- 頭盔（寬，有護目鏡） -->
  <rect x="20" y="16" width="24" height="10" fill="#1A1A10"/>
  <!-- 黃色護目鏡橫跨臉 -->
  <rect x="20" y="16" width="24" height="5"  fill="#DDAA00"/>
  <!-- 護目鏡鏡片分隔 -->
  <rect x="31" y="16" width="2"  height="5"  fill="#AA8800"/>
  <!-- 護目鏡亮面 -->
  <rect x="21" y="17" width="9"  height="3"  fill="#FFCC33" opacity="0.8"/>
  <rect x="34" y="17" width="9"  height="3"  fill="#FFCC33" opacity="0.8"/>

  <!-- 短管散彈槍（左手持，横向） -->
  <rect x="4"  y="28" width="16" height="6"  fill="#2A2A2A"/>
  <rect x="4"  y="29" width="5"  height="4"  fill="#222"/>
  <!-- 槍管口 -->
  <rect x="0"  y="29" width="6"  height="4"  fill="#1A1A1A"/>

  <!-- 腰帶炸藥包 -->
  <rect x="20" y="44" width="6"  height="5"  fill="#2A2A14"/>
  <rect x="30" y="45" width="5"  height="5"  fill="#2A2A14"/>
  <rect x="39" y="44" width="6"  height="5"  fill="#2A2A14"/>
  <!-- 炸藥引線 -->
  <rect x="22" y="43" width="2"  height="2"  fill="#DDAA00"/>
  <rect x="40" y="43" width="2"  height="2"  fill="#DDAA00"/>

  <!-- 腿（粗短） -->
  <rect x="20" y="50" width="10" height="6"  fill="#10100A"/>
  <rect x="34" y="50" width="10" height="6"  fill="#10100A"/>
</svg>
