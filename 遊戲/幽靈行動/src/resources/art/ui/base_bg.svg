  <rect x="30"  y="520" width="340" height="1"   fill="#2A5080" opacity="0.6"/>
  <rect x="30"  y="580" width="340" height="1"   fill="#2A5080" opacity="0.6"/>
  <rect x="30"  y="640" width="340" height="1"   fill="#2A5080" opacity="0.6"/>
