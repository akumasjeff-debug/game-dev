  <ellipse cx="850" cy="400" rx="300" ry="420" fill="#2244AA" opacity="0.2"/>
  <!-- 次發光（較亮核心）-->
  <ellipse cx="850" cy="380" rx="180" ry="260" fill="#2244AA" opacity="0.15"/>
  <!-- 螢幕輪廓（方形，模擬顯示器）-->
  <rect x="640" y="140" width="380" height="480" fill="#0D1F38" opacity="0.6"/>
  <rect x="640" y="140" width="380" height="2"   fill="#2244AA" opacity="0.5"/>
  <rect x="640" y="618" width="380" height="2"   fill="#2244AA" opacity="0.5"/>
  <rect x="640" y="140" width="2"   height="480" fill="#2244AA" opacity="0.5"/>
  <rect x="1018" y="140" width="2"  height="480" fill="#2244AA" opacity="0.5"/>
  <!-- 螢幕內容（掃描線效果）-->
  <rect x="642" y="200" width="376" height="2"   fill="#2244AA" opacity="0.2"/>
  <rect x="642" y="260" width="376" height="2"   fill="#2244AA" opacity="0.2"/>
  <rect x="642" y="320" width="376" height="2"   fill="#2244AA" opacity="0.2"/>
  <rect x="642" y="380" width="376" height="2"   fill="#2244AA" opacity="0.2"/>
  <rect x="642" y="440" width="376" height="2"   fill="#2244AA" opacity="0.2"/>
  <rect x="642" y="500" width="376" height="2"   fill="#2244AA" opacity="0.2"/>
  <rect x="642" y="560" width="376" height="2"   fill="#2244AA" opacity="0.2"/>
  <!-- 螢幕資料線條（模擬數據顯示）-->
  <rect x="660" y="180" width="200" height="8"   fill="#2244AA" opacity="0.4"/>
  <rect x="660" y="230" width="280" height="6"   fill="#1A3388" opacity="0.5"/>
  <rect x="660" y="280" width="180" height="6"   fill="#1A3388" opacity="0.4"/>
  <rect x="660" y="340" width="240" height="6"   fill="#1A3388" opacity="0.4"/>
