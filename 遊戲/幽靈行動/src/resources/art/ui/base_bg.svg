  <rect x="700" y="700" width="280" height="2"   fill="#2244AA" opacity="0.4"/>
  <rect x="700" y="898" width="280" height="2"   fill="#2244AA" opacity="0.4"/>

  <!-- 操作台輪廓（底部，高 240px）-->
  <rect x="0"   y="1680" width="1080" height="240" fill="#0D1F38"/>
  <!-- 操作台面板線 -->
  <rect x="0"   y="1680" width="1080" height="3"   fill="#1A3050"/>
  <!-- 操作台按鈕/螢幕分區 -->
  <rect x="40"  y="1700" width="180" height="120" fill="#0A1828" opacity="0.8"/>
  <rect x="40"  y="1700" width="180" height="2"   fill="#2244AA" opacity="0.5"/>
  <rect x="260" y="1700" width="260" height="120" fill="#0A1828" opacity="0.8"/>
  <rect x="260" y="1700" width="260" height="2"   fill="#2244AA" opacity="0.5"/>
  <rect x="560" y="1700" width="200" height="120" fill="#0A1828" opacity="0.8"/>
  <rect x="560" y="1700" width="200" height="2"   fill="#2244AA" opacity="0.5"/>
  <rect x="800" y="1700" width="240" height="120" fill="#0A1828" opacity="0.8"/>
  <rect x="800" y="1700" width="240" height="2"   fill="#2244AA" opacity="0.5"/>
  <!-- 操作台小按鈕 -->
  <rect x="60"  y="1840" width="20"  height="20"  fill="#1A3050"/>
  <rect x="90"  y="1840" width="20"  height="20"  fill="#1A3050"/>
  <rect x="120" y="1840" width="20"  height="20"  fill="#1A3050"/>
  <rect x="60"  y="1870" width="20"  height="20"  fill="#1A3050"/>
  <rect x="90"  y="1870" width="20"  height="20"  fill="#00AACC" opacity="0.4"/>
  <rect x="120" y="1870" width="20"  height="20"  fill="#1A3050"/>
  <!-- 操作台鍵盤區 -->
  <rect x="340" y="1840" width="160" height="60"  fill="#0A1525" opacity="0.9"/>
  <!-- 頂部極暗漸層（空間縱深感）-->
  <rect x="0"   y="0"   width="1080" height="120" fill="#050810" opacity="0.6"/>
