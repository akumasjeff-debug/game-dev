  <rect x="30"  y="756" width="340" height="2"   fill="#2A5080" opacity="0.7"/>
  <rect x="30"  y="280" width="2"   height="480" fill="#2A5080" opacity="0.7"/>
  <rect x="368" y="280" width="2"   height="480" fill="#2A5080" opacity="0.7"/>
  <!-- 地圖標題條 -->
  <rect x="30"  y="240" width="340" height="42"  fill="#1E3A5F" opacity="0.5"/>

  <!-- 右側螢幕發光效果 -->
